name: CI

# Runs on every PR and every push to main, BUT individual jobs short-
# circuit unless their relevant paths changed (see the `changes` job).
# A `ci-passed` rollup job is the single check to require in branch
# protection — it's green if all relevant jobs passed OR were skipped
# (irrelevant), and red if anything actually failed.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter calls the Files API to detect changed paths

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: self-hosted
    outputs:
      python: ${{ steps.f.outputs.python }}
      docs: ${{ steps.f.outputs.docs }}
      gif_plan: ${{ steps.f.outputs.gif_plan }}
    steps:
      - uses: actions/checkout@v6
      - id: f
        uses: dorny/paths-filter@v4
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'tools/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/site/**'
              - 'docs/content-source/**'
              - '.github/workflows/ci.yml'
            gif_plan:
              - 'tools/gif_plan/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv run --extra dev ruff check src/ tests/

  typecheck:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv run --extra dev pyright src/

  test:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      # `tools/gif_plan` is a standalone tool with its own gated job
      # below — exclude it here so it doesn't run on unrelated Python
      # changes. `--ignore-glob` (anchored to the dir segment) is used
      # rather than `--ignore=tools/gif_plan`, which `testpaths` defeats.
      # `make test` locally still runs it via testpaths.
      - run: PYTHONPATH=tests/stubs uv run --extra dev pytest --cov=src/led_ticker --cov-report=term-missing "--ignore-glob=*/gif_plan/*"

  gif-plan-test:
    needs: changes
    if: needs.changes.outputs.gif_plan == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: PYTHONPATH=tests/stubs uv run --extra dev pytest tools/gif_plan/

  docs-lint:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install Node deps
        working-directory: docs/site
        run: pnpm install --frozen-lockfile
      - name: Lint (prettier --check + astro check)
        working-directory: docs/site
        run: pnpm run lint

  # Single rollup that branch protection can require. Passes iff every
  # upstream job is success or skipped; fails if any upstream failed
  # or was cancelled.
  ci-passed:
    needs: [changes, lint, typecheck, test, gif-plan-test, docs-lint]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Verify all required jobs passed (or skipped)
        env:
          # `changes` MUST succeed — if it failed we don't know what
          # changed and skipping downstream jobs is unsafe. Skipped
          # is acceptable for the others (means no relevant change).
          CHANGES_RESULT: ${{ needs.changes.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          GIF_PLAN_TEST_RESULT: ${{ needs.gif-plan-test.result }}
          DOCS_LINT_RESULT: ${{ needs.docs-lint.result }}
        run: |
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "Job 'changes' result: $CHANGES_RESULT — refusing to declare CI green."
            exit 1
          fi
          for job in lint:"$LINT_RESULT" typecheck:"$TYPECHECK_RESULT" test:"$TEST_RESULT" gif-plan-test:"$GIF_PLAN_TEST_RESULT" docs-lint:"$DOCS_LINT_RESULT"; do
            name="${job%%:*}"
            result="${job#*:}"
            case "$result" in
              success|skipped) ;;
              *) echo "Job '$name' result: $result"; exit 1 ;;
            esac
          done
          echo "All required jobs passed or were skipped — CI green."
