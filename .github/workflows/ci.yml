name: CI

# Runs on every PR and every push to main, BUT individual jobs short-
# circuit unless their relevant paths changed (see the `changes` job).
# A `ci-passed` rollup job is the single check to require in branch
# protection — it's green if all relevant jobs passed OR were skipped
# (irrelevant), and red if anything actually failed.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# SECURITY NOTE — self-hosted runner on a (soon) public repo
#
# These workflows run on a SELF-HOSTED runner (a VM — not the production
# Pi). On a PUBLIC repo the risk is that an untrusted FORK pull request
# runs arbitrary code on that runner (compute abuse, host/network pivot).
# GitHub already WITHHOLDS repo `secrets.*` from fork PRs, so the residual
# risk is runner *execution*, not secret theft.
#
# REQUIRED before the repo is made public:
#   Settings → Actions → General → "Fork pull request workflows from
#   outside collaborators" → **Require approval for all outside
#   collaborators**. Untrusted fork PRs then run NO workflow until a
#   maintainer approves; approval is given precisely so CI runs on the
#   vetted code — so the jobs below intentionally do NOT skip forks (and
#   a blanket skip would also fail the required `ci-passed` rollup, which
#   demands `changes` succeed). The jobs here use no secrets.
#
# Stronger isolation, if wanted later: per-job `environment:` gates, or a
# `workflow_run:` split that runs untrusted PR code only on GitHub-hosted
# runners. (docs-deploy.yml additionally skips its deploy step on forks —
# it needs secrets that forks don't get.)
#
# Do not make the repo public without the approval setting above.

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter calls the Files API to detect changed paths

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: self-hosted
    outputs:
      python: ${{ steps.f.outputs.python }}
      docs: ${{ steps.f.outputs.docs }}
      gif_plan: ${{ steps.f.outputs.gif_plan }}
      docker: ${{ steps.f.outputs.docker }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: f
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'tools/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/site/**'
              - 'docs/content-source/**'
              - '.github/workflows/ci.yml'
            gif_plan:
              - 'tools/gif_plan/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
            docker:
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'src/**'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv run --extra dev ruff check src/ tests/
      - run: uv run --extra dev ruff format --check src/ tests/

  typecheck:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv run --extra dev pyright src/

  test:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      # `tools/gif_plan` is a standalone tool with its own gated job
      # below — exclude it here so it doesn't run on unrelated Python
      # changes. `--ignore-glob` (anchored to the dir segment) is used
      # rather than `--ignore=tools/gif_plan`, which `testpaths` defeats.
      # `make test` locally still runs it via testpaths.
      - run: uv run --extra dev pytest --cov=src/led_ticker --cov-report=term-missing "--ignore-glob=*/gif_plan/*"

  gif-plan-test:
    needs: changes
    if: needs.changes.outputs.gif_plan == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv run --extra dev pytest tools/gif_plan/

  docs-lint:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install Node deps
        working-directory: docs/site
        run: pnpm install --frozen-lockfile
      - name: Lint (prettier --check + astro check)
        working-directory: docs/site
        run: pnpm run lint
      - name: Build + verify llms.txt export
        working-directory: docs/site
        run: pnpm run build && pnpm run check:llms

  docker-build:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # tags needed so scripts/compute-version.sh resolves a real version
      - name: Build Docker image
        run: |
          docker build --no-cache -t led-ticker-ci-test \
            --build-arg SETUPTOOLS_SCM_PRETEND_VERSION="$(sh scripts/compute-version.sh)" .
      - name: Clean up test image
        if: always()
        run: docker rmi led-ticker-ci-test || true

  # Single rollup that branch protection can require. Passes iff every
  # upstream job is success or skipped; fails if any upstream failed
  # or was cancelled.
  ci-passed:
    needs: [changes, lint, typecheck, test, gif-plan-test, docs-lint, docker-build]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Verify all required jobs passed (or skipped)
        env:
          # `changes` MUST succeed — if it failed we don't know what
          # changed and skipping downstream jobs is unsafe. Skipped
          # is acceptable for the others (means no relevant change).
          CHANGES_RESULT: ${{ needs.changes.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          GIF_PLAN_TEST_RESULT: ${{ needs.gif-plan-test.result }}
          DOCS_LINT_RESULT: ${{ needs.docs-lint.result }}
          DOCKER_BUILD_RESULT: ${{ needs.docker-build.result }}
        run: |
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "Job 'changes' result: $CHANGES_RESULT — refusing to declare CI green."
            exit 1
          fi
          for job in lint:"$LINT_RESULT" typecheck:"$TYPECHECK_RESULT" test:"$TEST_RESULT" gif-plan-test:"$GIF_PLAN_TEST_RESULT" docs-lint:"$DOCS_LINT_RESULT" docker-build:"$DOCKER_BUILD_RESULT"; do
            name="${job%%:*}"
            result="${job#*:}"
            case "$result" in
              success|skipped) ;;
              *) echo "Job '$name' result: $result"; exit 1 ;;
            esac
          done
          echo "All required jobs passed or were skipped — CI green."
