name: docs-deploy

# Single pipeline for both production and preview deploys to Cloudflare Pages.
#
#   push to main → production deploy (branch=main)
#   pull_request → preview deploy (branch=<pr-head>)
#
# Cloudflare's automatic Git-triggered builds are turned OFF in the
# Pages project's Build → Branch control settings, so this workflow is
# the only way deploys reach Cloudflare. One pipeline = one place to
# debug, one set of env / pnpm / uv versions to keep aligned.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "tools/render_demo/**"
      - ".github/workflows/docs-deploy.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "docs/**"
      - "tools/render_demo/**"
      - ".github/workflows/docs-deploy.yml"

permissions:
  contents: read
  pull-requests: write
  deployments: write

concurrency:
  group: docs-deploy-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # `actions/setup-python` doesn't ship a manifest entry for
      # Debian 13 (Trixie) on x64 as of this writing. Skip it —
      # `uv sync` reads `.python-version` (3.13) and installs the
      # right interpreter via uv's own Python distribution, which
      # works on any glibc Linux regardless of distro version.
      - name: Install Python deps
        run: uv sync

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Enable corepack
        run: corepack enable

      - name: Install Node deps
        working-directory: docs/site
        run: pnpm install --frozen-lockfile

      - name: Build site (renders demo gifs first)
        working-directory: docs/site
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        # Dependabot PRs (and PRs from forks) don't get repo secrets,
        # so wrangler can't auth. Skip the deploy step on those — the
        # build above still validated the change. To enable previews
        # on Dependabot PRs, also add CLOUDFLARE_API_TOKEN +
        # CLOUDFLARE_ACCOUNT_ID under repo Settings → Secrets and
        # variables → Dependabot (separate from the Actions tab).
        if: github.actor != 'dependabot[bot]'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          # workingDirectory points at the package where wrangler is
          # installed via pnpm — without this the action runs at repo
          # root where there's no package.json and pnpm errors out.
          workingDirectory: docs/site
          # On push-to-main this deploys as production; on a PR it
          # deploys as a preview tagged with the PR's branch name.
          command: pages deploy dist --project-name=led-ticker --branch=${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Post or update preview-URL comment on PR
        # Only on PR runs where the deploy actually happened (skipped
        # on Dependabot, push-to-main, etc.). The script finds an
        # existing comment by hidden marker and edits it in place if
        # found, so each new commit on a PR updates the same comment
        # rather than spamming new ones.
        if: github.event_name == 'pull_request' && steps.deploy.outcome == 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        with:
          script: |
            const marker = '<!-- docs-preview-comment -->';
            const body = [
              marker,
              '📚 **Docs preview deployed**',
              '',
              `- Branch alias (sticky to this PR): ${process.env.ALIAS_URL}`,
              `- This commit: ${process.env.DEPLOY_URL}`,
              '',
              '_Updated automatically as new commits land._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
