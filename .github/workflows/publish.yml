name: publish

# Publishes `led-ticker-core` to PyPI via OIDC Trusted Publishing when a GitHub
# Release is published. Runs on GitHub-hosted runners (NOT self-hosted) and
# is gated behind the `release` environment (required reviewer).
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # OIDC token for Trusted Publishing — no API tokens

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release   # manual approval gate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # hatch-vcs derives the version from the tag
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Guard — derived version is an exact-tag match (fail before publish)
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          V="$(uvx --from setuptools-scm python -m setuptools_scm)"
          echo "release tag: $TAG | derived version: $V"
          # An exact-tag release derives a clean X.Y.Z and the tag is v<that>.
          # A typo tag (missing 'v'), wrong target commit, or off-tag release
          # derives a .devN+<local> version PyPI would reject AFTER approval.
          [ "$TAG" = "v$V" ] || { echo "::error::Tag $TAG != v$V — not an exact-tag release. Refusing to publish."; exit 1; }
      - name: Guard — version order matches history order (fail before publish)
        run: |
          set -euo pipefail
          # Monotonic + ancestry: the new version must be strictly greater
          # than every released version AND descend from the previous latest.
          # Born from the v4.16.1-after-v4.17.0 incident (2026-07-16); see
          # scripts/release_guard.py and the spec it cites.
          python3 scripts/release_guard.py "${{ github.event.release.tag_name }}"
      - name: Build sdist + wheel
        run: rm -rf dist && uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
