repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright src/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      # pytest pre-push hook removed — CI runs the full suite on
      # every PR (.github/workflows/ci.yml). Local devs can still run
      # it manually with `make test` while iterating.
