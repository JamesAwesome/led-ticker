# Docker Compose for led-ticker.
# Pi 5 / bigsign defaults. For the Pi 4 sign, override RGBMATRIX_REF to "main".
#
# Usage:
#   docker compose up -d --build       # build (or rebuild) and start detached
#   docker compose logs -f             # tail logs
#   docker compose restart             # restart after editing config
#   docker compose down                # stop and remove
#
# Files (relative to this compose file's directory):
#   ./config/config.toml     # display + playlist config
#   ./.env                   # API keys (WEATHERAPI_KEY etc.)
#                            # — also auto-loaded by compose for var interpolation
#
# Pi 4 build:
#   RGBMATRIX_REF=main IMAGE_TAG=led-ticker:pi4 docker compose up -d --build

services:
  led-ticker:
    image: ${IMAGE_TAG:-led-ticker:pi5}
    build:
      context: .
      args:
        RGBMATRIX_REPO: ${RGBMATRIX_REPO:-https://github.com/jamesawesome/rpi-rgb-led-matrix.git}
        RGBMATRIX_REF: ${RGBMATRIX_REF:-pi5_support}
    container_name: led-ticker
    restart: unless-stopped
    privileged: true        # needed for GPIO access on the HAT
    network_mode: host      # outbound API calls (weather, RSS, MLB, etc.)
    volumes:
      - ./config:/code/config:ro
    env_file:
      - path: ./.env
        required: false     # repo may not have .env if no API keys are needed
