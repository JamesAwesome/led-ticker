# led-ticker configuration
# Copy this to config.toml and customize for your setup.

[display]
rows = 16
cols = 32
chain = 5
brightness = 60
slowdown_gpio = 2
gpio_mapping = "adafruit-hat"

[title]
delay = 5

# --- Transitions ---
# Global defaults for transitions between widgets and sections.
# Available types: cut, push_left, push_right, push_up, push_down,
#                  color_flash, wipe_left, wipe_right, wipe_up, wipe_down,
#                  dissolve, split, nyancat, nyancat_reverse,
#                  push_alternating, wipe_alternating, nyancat_alternating
# Optional: transition_color = [R, G, B]  (custom color for flash/wipe)
# Available easing: linear, ease_out, ease_in_out

[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = "dissolve"

# --- Playlist ---
# Each [[playlist.section]] displays in order, then the whole playlist loops.

[[playlist.section]]
mode = "forever_scroll"
loop_count = 1

[playlist.section.title]
type = "message"
text = "#DevOps News"
color = "random"

[[playlist.section.widget]]
type = "message"
text = "May the Rabbit always be with you!"

[[playlist.section.widget]]
type = "message"
text = "Always be your bunny best!"

# --- Countdowns ---

[[playlist.section]]
mode = "forever_scroll"
loop_count = 2

[playlist.section.title]
type = "message"
text = "Count Downs"
color = "random"

[[playlist.section.widget]]
type = "countdown"
message = "Days Until Spring"
countdown_date = 2026-03-20

[[playlist.section.widget]]
type = "countdown"
message = "Days Until Summer"
countdown_date = 2026-06-20

