[display]
rows = 16
cols = 32
chain = 5
brightness = 60
slowdown_gpio = 2
gpio_mapping = "adafruit-hat"

[title]
delay = 5

[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = "dissolve"

# --- Messages ---

[[playlist.section]]
mode = "forever_scroll"
loop_count = 1

[playlist.section.title]
type = "message"
text = "#DevOps News"
color = "random"

[[playlist.section.widget]]
type = "message"
text = "May the Rabbit always be with you!"

[[playlist.section.widget]]
type = "message"
text = "Always be your bunny best!"

# --- Weather ---

[[playlist.section]]
mode = "swap"
transition = "wipe_left"
loop_count = 1

[playlist.section.title]
type = "message"
text = "Weather"
color = "random"

[[playlist.section.widget]]
type = "weather"
message = "NYC"
location = "New York"
units = "imperial"

[[playlist.section.widget]]
type = "weather"
message = "PHL"
location = "Philadelphia"
units = "imperial"

[[playlist.section.widget]]
type = "weather"
message = "MKE"
location = "Milwaukee"
units = "imperial"

[[playlist.section.widget]]
type = "weather"
message = "MSP"
location = "Minneapolis"
units = "imperial"

[[playlist.section.widget]]
type = "weather"
message = "DC"
location = "Washington DC"
units = "imperial"

# --- Countdowns ---

[[playlist.section]]
mode = "swap"
transition = "color_flash"
loop_count = 1

[playlist.section.title]
type = "message"
text = "Count Downs"
color = "random"

[[playlist.section.widget]]
type = "countdown"
message = "Days Until Summer"
countdown_date = 2026-06-20

# --- Nintendo ---

[[playlist.section]]
mode = "forever_scroll"
loop_count = 1

[playlist.section.title]
type = "message"
text = "Nintendo Life"
color = "random"

[[playlist.section.widget]]
type = "rss_feed"
feed_url = "https://www.nintendolife.com/feeds/news"
update_interval = 3000
