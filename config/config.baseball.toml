# Baseball testing config — tests baseball transition
# Usage: cp config/config.baseball.toml config/config.toml

[display]
rows = 16
cols = 32
chain_length = 5
brightness = 60
gpio_slowdown = 2
hardware_mapping = "adafruit-hat"

[title]
delay = 3

[transitions]
between_sections = {type = "baseball_alternating", duration = 2.0}

# --- baseball (long text) ---
[[playlist.section]]
mode = "swap"
transition = "baseball"
transition_duration = 2.0
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "BASEBALL start"

[[playlist.section.widget]]
type = "message"
text = "A wizard quickly jinxed the gnomes before they could cast any powerful spells on the sleeping villagers nearby"

[[playlist.section.widget]]
type = "message"
text = "baseball DONE"

# --- baseball (short text) ---
[[playlist.section]]
mode = "swap"
transition = "baseball"
transition_duration = 2.0
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "Short text test"

[[playlist.section.widget]]
type = "message"
text = "Also short"

[[playlist.section.widget]]
type = "message"
text = "baseball short DONE"

# --- baseball_reverse ---
[[playlist.section]]
mode = "swap"
transition = "baseball_reverse"
transition_duration = 2.0
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "Reverse test"

[[playlist.section.widget]]
type = "message"
text = "Play ball!"

# --- restart ---
[[playlist.section]]
mode = "swap"
hold_time = 3
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "--- RESTARTING ---"
