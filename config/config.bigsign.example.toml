# led-ticker bigsign configuration
# 8× P3 32×64 panels in a 2×4 vertical-serpentine layout → 64×256 logical canvas.
# Driven by a Raspberry Pi 5 + Adafruit RGB Matrix HAT.
#
# Copy to config.toml on the bigsign Pi and customize.

[display]
rows = 32
cols = 64
chain = 8
parallel = 1

# Remap each panel to its physical position. Chain enters at the bottom-right
# panel and climbs each column bottom-to-top (1↑2 in column 4), then jumps
# diagonally to the bottom of the next column to its left and climbs again
# (3↑4 in column 3, 5↑6 in column 2, 7↑8 in column 1). All panels installed
# upright (no 180° rotations). See /hardware/bigsign/ for the full diagram.
# Format:
#   Remap:WIDTH,HEIGHT|x,yORIENT|... (one entry per panel in chain order)
# Orientations: n=normal, s=180°, e=270°, w=90°, x=discard.
# If your top-row panels are physically flipped 180°, swap each top-row 'n'
# below for 's' (e.g. "192,0n" → "192,0s").
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3  # bumped from 2 to pair with rp1_rio=1; raise to 4-5 if flicker
gpio_mapping = "adafruit-hat"
default_scale = 4  # 4× scaling fills the 64-tall canvas

# --- Performance tuning ---
pwm_bits = 8              # 11 (default) → 8 ≈ 8× faster refresh, slightly worse color
show_refresh = true       # log measured refresh Hz to stderr
rp1_rio = 1               # Pi 5: RIO mode (faster, more CPU). Bumps slowdown_gpio above
# pwm_lsb_nanoseconds = 130 # raise to 200+ if colors look wrong
# no_hardware_pulse = false # almost always leave false; CPU-fallback is ~5× slower

[title]
delay = 5

[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = "dissolve"

# --- Playlist ---

[[playlist.section]]
mode = "forever_scroll"
loop_count = 1
# scale defaults to display.default_scale (4)

[playlist.section.title]
type = "message"
text = "#DevOps News"
color = "random"

[[playlist.section.widget]]
type = "message"
text = "May the Rabbit always be with you!"

[[playlist.section.widget]]
type = "message"
text = "Always be your bunny best!"

# --- Countdowns at scale=2 (letterboxed for a different look) ---

[[playlist.section]]
mode = "forever_scroll"
loop_count = 2
scale = 2  # 2× → 32px tall content centered with 16px black bands

[playlist.section.title]
type = "message"
text = "Count Downs"
color = "random"

[[playlist.section.widget]]
type = "countdown"
message = "Days Until Summer"
countdown_date = 2026-06-20

[[playlist.section.widget]]
type = "countdown"
message = "Days Until Fall"
countdown_date = 2026-09-22

# ---------------------------------------------------------------------------
# GIF playback example
#
# `mode = "gif"` plays an animated GIF at the panel's native physical
# resolution (256×64), bypassing the ScaledCanvas wrapper. Frame timing
# comes from the GIF's own metadata; `loop_count` controls how many
# complete passes play before the next section runs.
#
# `fit` options (default "pillarbox"):
#   pillarbox — scale by height, center horizontally with black pillars
#   letterbox — scale by width, center vertically with black bars
#   stretch   — fill the whole panel, distorting aspect ratio
#   crop      — scale to cover both axes, center-crop the excess
#
# `path` is resolved relative to this config file's directory. Drop GIFs
# under `<config_dir>/assets/` and reference by relative path.
# ---------------------------------------------------------------------------

# [[playlist.section]]
# mode = "gif"
# loop_count = 2
#
# [[playlist.section.widget]]
# type = "gif"
# path = "assets/example.gif"
# fit = "pillarbox"
