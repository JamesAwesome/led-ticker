# ── Plugin dependencies ───────────────────────────────────────────────
# Requires these led-ticker plugins. Install via
# config/requirements-plugins.txt (copy requirements-plugins.example.txt)
# and rebuild before running:
#   led-ticker-feeds     feeds.rss, feeds.weather (commented example)
#   led-ticker-baseball  baseball.scores
# Built-in widgets (message/clock/image/gif/two_row), color/border/emoji
# flair, and the foundational transitions need no plugins.
# ──────────────────────────────────────────────────────────────────────

# led-ticker bigsign configuration — 256×64 canvas
#
# 8× P3 32×64 panels in a 2×4 vertical-serpentine layout = 256×64 logical.
# Driven by a Raspberry Pi 5 through an Adafruit RGB Matrix HAT.
#
# Copy this to config.toml on the bigsign Pi and adjust the playlist for your
# content. Full config-options reference:
#   https://docs.ledticker.dev/reference/config-options/

[display]
rows = 32
cols = 64
chain_length = 8
parallel = 1

# pixel_mapper_config tells the rgbmatrix library how each panel's position in the
# data chain_length maps to its physical (x, y) on the finished canvas. The bigsign
# chain_length enters at the bottom-right panel, climbs each column bottom-to-top,
# then jumps diagonally to the bottom of the next column to its left. All
# panels are installed upright (no 180° rotations). See the chain_length diagram and
# instructions for deriving your own mapper string at:
#   https://docs.ledticker.dev/hardware/bigsign/
#
# Format: Remap:WIDTH,HEIGHT|x,yORIENT|... (one entry per panel in chain_length order)
# Orientations: n=normal, s=180°, e=270°, w=90°, x=discard.
# If your top-row panels are physically flipped 180°, swap each top-row 'n'
# for 's' (e.g. "192,0n" → "192,0s").
pixel_mapper_config = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60

# default_scale = 4 means every widget draws at the standard 16-tall logical
# canvas, and the ScaledCanvas wrapper expands every pixel to a 4×4 real block
# to fill the 64-tall panel. Widget code never sees the 256×64 panel directly
# — all drawing is in logical-pixel coordinates.
default_scale = 4

hardware_mapping = "adafruit-hat"
# hot_reload = true    # live-reload config.toml edits without a restart (default on; set false to disable)

# Pi 5 RP1 GPIO tuning.
#
# RIO (Registered IO) mode is the rgbmatrix library default on Pi 5 — faster
# refresh, more CPU than PIO mode. The Pi 5 has cores to spare and the bigger
# panel benefits from the extra Hz. To force PIO (low CPU), set rp1_pio = 1.
#
# gpio_slowdown = 3 is appropriate for RIO mode. The Pi 4 default of 2 is too
# aggressive; raise to 4–5 if you still see flicker.
#
# pwm_bits = 8 drops from the 11-bit default, buying roughly 8× faster
# refresh at a small color-depth cost. Barely noticeable for text and pixel
# art; only relevant if you're displaying photos with smooth gradients.
gpio_slowdown = 3
pwm_bits = 8
show_refresh_rate = true  # log measured refresh Hz to stderr; remove once stable

# --- Optional: brightness schedule (uncomment + edit to use) ---
# [display.schedule]
# enabled = true
# timezone = "America/New_York"   # set this! defaults to the Pi's system time (often UTC)
#
# [[display.schedule.windows]]
# start = "07:00"
# end = "18:00"
# brightness = 100
#
# [[display.schedule.windows]]
# start = "18:00"
# end = "23:00"
# brightness = 40
#
# [[display.schedule.windows]]
# start = "23:00"            # wraps past midnight
# end = "07:00"
# brightness = 0             # dark — panel off overnight

[title]
delay = 5

# Global transition defaults. Full transition catalogue and per-family tuning
# lives at https://docs.ledticker.dev/transitions/.
[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = "dissolve"

# --- Playlist ---
# Each [[playlist.section]] displays in order, then the whole playlist loops.
# Sections, modes, and timing knobs: https://docs.ledticker.dev/concepts/sections-and-modes/

[[playlist.section]]
mode = "forever_scroll"
loop_count = 1
# scale inherits from display.default_scale (4)

[playlist.section.title]
type = "message"
text = "#DevOps News"
font_color = "random"

[[playlist.section.widget]]
type = "message"
text = "May the Rabbit always be with you!"

[[playlist.section.widget]]
type = "message"
text = "Always be your bunny best!"

# --- Countdowns at scale=2 ---
# Dropping to scale=2 gives 32px-tall content centered with 16px black bands
# top and bottom — a visual change of pace between sections.

[[playlist.section]]
mode = "forever_scroll"
loop_count = 2
scale = 2

[playlist.section.title]
type = "message"
text = "Count Downs"
font_color = "random"

[[playlist.section.widget]]
type = "countdown"
text = "Days Until Summer"
countdown_date = 2026-06-20

[[playlist.section.widget]]
type = "countdown"
text = "Days Until Fall"
countdown_date = 2026-09-22

# Live RSS headlines from Nintendo Life — a known-stable feed for the demo.
# Swap feed_url for any RSS/Atom URL of your own.

[[playlist.section]]
mode = "forever_scroll"
loop_count = 1

[playlist.section.title]
type = "message"
text = "Nintendo Life"
font_color = "random"

[[playlist.section.widget]]
type = "feeds.rss"
feed_url = "https://www.nintendolife.com/feeds/news"
update_interval = 3000

# Crypto prices via the led-ticker-crypto plugin (crypto.coingecko).
# See https://github.com/JamesAwesome/led-ticker-crypto for install + config.

# MLB scores via the free MLB Stats API — no API key. Replace "PHI" with
# your team code.
#
# The baseball.scores widget is the `led-ticker-baseball` plugin. To install
# it, add it to config/requirements-plugins.txt (copy the tracked .example,
# which already lists it) and rebuild — see https://docs.ledticker.dev/plugins/ .

[[playlist.section]]
mode = "swap"
transition = "scroll"
transition_duration = 4.0
loop_count = 0

[[playlist.section.widget]]
type = "baseball.scores"
team = "PHI"
timezone = "America/New_York"
final_hold_hours = 6

# --- GIF / image playback (optional) ---
# The gif widget plays an animated GIF or static image at native physical
# resolution (256×64), using the same fit/text-overlay knobs as the image
# widget. Full reference: https://docs.ledticker.dev/widgets/gif/
#
# `path` resolves relative to this config file's directory. Drop assets
# under `<config_dir>/assets/` and reference by relative path.
#
# [[playlist.section]]
# mode = "swap"
# loop_count = 2
#
# [[playlist.section.widget]]
# type = "gif"
# path = "assets/phoenix.gif"
# fit = "pillarbox"

# --- Weather (optional) ---
# Requires WEATHERAPI_KEY in .env (https://www.weatherapi.com/).
# location can be a city name, zip code, or "lat,lon".
#
# [[playlist.section]]
# mode = "swap"
# loop_count = 1
#
# [[playlist.section.widget]]
# type = "feeds.weather"
# text = "NYC"
# location = "New York"
# units = "imperial"

# Busy light — a corner dot that lights up while a local file exists. The
# dot composites over every section and transition. On the 64-tall bigsign,
# size = 4 is nearly invisible — use ~8-10 physical px. Under Docker, point
# file_path at the bind-mounted config dir (the container's ~ is unreachable
# from the host) and toggle config/.busy on the host:
# [busy_light]
# enabled = true
# file_path = "/code/config/.busy"   # in-container; toggle host config/.busy
# poll_interval = 5.0
# corner = "top_right"       # top_left | top_right | bottom_left | bottom_right
# color = [255, 0, 0]        # 3 ints, each 0-255
# size = 8                    # dot side in physical px (bigsign is 64 tall)
