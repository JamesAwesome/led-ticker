# requires-plugins: none

# led-ticker bigsign config — Firebird Yoga tutorial destination
#
# This is the config the five-chapter tutorial walks you toward building.
# It demonstrates messages with rainbow font + rainbow border, an image
# widget with hi-res inline emoji on a two-row text overlay, transitions,
# and the per-section scale knob — all on a 256×64 bigsign.
#
# Hardware: Pi 5 + 8× P3 32×64 panels in a 2×4 vertical-serpentine layout.
# Full bigsign build guide: https://docs.ledticker.dev/hardware/bigsign/

# ---------------------------------------------------------------------------
# Display block
#
# These Pi-only knobs (pixel_mapper_config, gpio_slowdown, pwm_bits) are
# ignored by the laptop renderer — you can leave them in place and they do
# no harm when running `make render-demo` locally.
# ---------------------------------------------------------------------------

[display]
rows = 32
cols = 64
chain_length = 8
parallel = 1
pixel_mapper_config = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"
brightness = 60
default_scale = 4
hardware_mapping = "adafruit-hat"
gpio_slowdown = 3
pwm_bits = 8

[title]
delay = 0

[transitions]
default = "wipe_left"
duration = 0.5
between_sections = "dissolve"

# ---------------------------------------------------------------------------
# Section 1 — welcome card (swap)
#
# Per-character rainbow font_color + a chasing rainbow border around the
# panel perimeter. Both effects share the same hue formula so they feel
# like one coherent animation rather than two competing ones.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 2.5

[[playlist.section.widget]]
type = "message"
text = "Welcome to Firebird Yoga"
font_color = "rainbow"
border = "rainbow"

# ---------------------------------------------------------------------------
# Section 2 — brand card (swap, per-section scale = 2)
#
# Phoenix image with a two-row text overlay: held handle on top + scrolling
# promo on the bottom. scale = 2 overrides the display's default_scale = 4
# so the logical canvas is 128 px wide — wide enough to fit the
# ":instagram: @firebirdyoga.demo" handle next to the hi-res Instagram sprite
# (which renders at 32×32 real px when the band can accommodate it).
#
# Layout math:
#   - content_height = 32 × scale = 2 → 64 real px (full panel height, at
#     the ceiling — no breathing room above/below, which is fine here
#     because the image fills the panel anyway).
#   - top_row_height = 16 logical = 32 real px → fits the 16-logical-tall
#     hi-res Instagram sprite (32 real px / scale = 16 logical).
#   - bottom_row_height = 32 - 16 = 16 logical = 32 real px → fits
#     Inter-Bold @ 22 px line-height.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
scale = 2
content_height = 32
loop_count = 1
hold_time = 5.0

[[playlist.section.widget]]
type = "image"
path = "assets/phoenix_transparent.png"
fit = "pillarbox"
image_align = "center"
hold_time = 4.0
scroll_speed_ms = 35
top_text = ":instagram: @firebirdyoga.demo"
top_row_height = 16
top_font = "Inter-Bold"
top_font_size = 16
top_color = [225, 48, 108]
bottom_text = "Vinyasa · yin · hot power · restorative · slow flow · all levels"
bottom_font = "Inter-Bold"
bottom_font_size = 22
bottom_color = [255, 244, 214]   # cream

# ---------------------------------------------------------------------------
# Section 3 — quick info messages (swap)
#
# Held messages with rainbow border on the headline — same border + font
# composition pattern as Section 1, applied to the second-section opener
# so each section's first widget gets the visual punch.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 2.5

[[playlist.section.widget]]
type = "message"
text = "Beginner Series starts soon"
font_color = [180, 220, 180]
border = "rainbow"

[[playlist.section.widget]]
type = "message"
text = "Open daily 10am – 8pm"
font_color = [120, 220, 255]

[[playlist.section.widget]]
type = "message"
text = "All levels · Drop-ins welcome"
font_color = [255, 220, 0]
