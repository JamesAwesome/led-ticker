# led-ticker configuration — smallsign starter (160×16 canvas)
#
# 5× chained 32×16 panels = 160×16 logical canvas. Driven by a Raspberry Pi 4
# through an Adafruit RGB Matrix bonnet. No pixel_mapper_config needed — panels are a
# single horizontal chain_length, left-to-right.
#
# Copy this to config.toml and adjust the playlist sections for your content.
# Full config-options reference: https://docs.ledticker.dev/reference/config-options/

[display]
rows = 16
cols = 32
chain_length = 5
brightness = 60
gpio_slowdown = 2      # mandatory on Pi 4 — bump to 3+ if you see flicker
hardware_mapping = "adafruit-hat"

[title]
delay = 5

# --- Transitions ---
# Global transition defaults. Full transition catalogue and per-family tuning
# lives at https://docs.ledticker.dev/transitions/. The values below give a
# 0.5-sec wipe between widgets within a section and a dissolve between sections
# — readable on a 160×16 smallsign without being distracting.

[transitions]
default = "wipe_alternating"
duration = 0.5
easing = "ease_out"
between_sections = "dissolve"

# --- Playlist ---
# Each [[playlist.section]] displays in order, then the whole playlist loops.
# Sections, modes, and timing knobs: https://docs.ledticker.dev/concepts/sections-and-modes/

# Welcome / brand messages.

[[playlist.section]]
mode = "forever_scroll"
loop_count = 1

[playlist.section.title]
type = "message"
text = "#DevOps News"
font_color = "random"

[[playlist.section.widget]]
type = "message"
text = "May the Rabbit always be with you!"

[[playlist.section.widget]]
type = "message"
text = "Always be your bunny best!"

# Counts down to any date. Message + remaining days scroll across the panel.

[[playlist.section]]
mode = "forever_scroll"
loop_count = 2

[playlist.section.title]
type = "message"
text = "Count Downs"
font_color = "random"

[[playlist.section.widget]]
type = "countdown"
text = "Days Until Spring"
countdown_date = 2026-03-20

[[playlist.section.widget]]
type = "countdown"
text = "Days Until Summer"
countdown_date = 2026-06-20

# Live RSS headlines from Nintendo Life — a known-stable feed for the demo.
# Swap feed_url for any RSS/Atom URL of your own; update_interval is seconds
# between fetches.

[[playlist.section]]
mode = "forever_scroll"
loop_count = 1

[playlist.section.title]
type = "message"
text = "Nintendo Life"
font_color = "random"

[[playlist.section.widget]]
type = "rss_feed"
feed_url = "https://www.nintendolife.com/feeds/news"
update_interval = 3000

# Crypto prices via Coinbase — no API key required.

[[playlist.section]]
mode = "forever_scroll"
loop_count = 2

[playlist.section.title]
type = "message"
text = "Cryptocurrency/USD"

[[playlist.section.widget]]
type = "coinbase"
symbol = "BTC"
currency = "USD"

[[playlist.section.widget]]
type = "coinbase"
symbol = "ETH"
currency = "USD"

# MLB scores via the free MLB Stats API — no API key. Shows current series,
# live game updates, upcoming matchups for the teams you pick.
# Replace "PHI" with your team code.

[[playlist.section]]
mode = "swap"
transition = "scroll"
transition_duration = 4.0
loop_count = 0

[[playlist.section.widget]]
type = "mlb"
team = "PHI"
timezone = "America/New_York"
final_hold_hours = 6   # hours to show final score before moving on

# Top-N teams by record plus tracked teams. Shows "Opens [date]" during
# offseason / spring training.

[[playlist.section]]
mode = "swap"
transition = "baseball_alternating"
transition_duration = 2.0
hold_time = 6
loop_count = 1

[[playlist.section.widget]]
type = "mlb_standings"
teams = ["NYM", "PHI"]
top_n = 3

# Pool water temperature from the pool_monitor InfluxDB server.
# Requires INFLUXDB_URL / INFLUXDB_TOKEN / INFLUXDB_ORG / INFLUXDB_BUCKET in .env.
# Cycles four screens: title → "Pool 24h" (current + today HI/LO) →
# "Pool 7D AVG" (week mean + week HI/LO) → "Pool Season HI/LO" (year-to-date).

[[playlist.section]]
mode = "swap"
transition = "scroll"
transition_duration = 2.0
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "pool"
title = "POOL TEMPS"
# sensor_id = "12345"   # optional. Without it the widget aggregates GLOBALLY
                        # across every sensor matching `_field=temperature_C`
                        # in the bucket — fine for single-sensor setups but
                        # may pick up ambient/heater readings on multi-sensor
                        # buckets. Set sensor_id to pin one sensor.
units = "imperial"
update_interval = 300
stale_after = 900
# Optional: tint the prefix labels ("Pool 24h" / "Pool 7D" / "Pool Season")
# and separators. Defaults to white. Use [r,g,b] e.g. [130, 220, 255] for
# an icy cyan that fits the pool theme.
# label_color = [130, 220, 255]
# layout = "two_row"   # optional: stacks "POOL 24H" / "POOL 7D AVG" / etc on top and the
#                      # headline value on bottom. Best for bigsign / longboi. See:
#                      # https://docs.ledticker.dev/widgets/pool/#layouts

# --- Weather (optional) ---
# Requires WEATHERAPI_KEY in .env (https://www.weatherapi.com/).
# location can be a city name, zip code, or "lat,lon".
#
# [[playlist.section]]
# mode = "swap"
# loop_count = 1
#
# [playlist.section.title]
# type = "message"
# text = "Weather"
# font_color = "random"
#
# [[playlist.section.widget]]
# type = "weather"
# text = "NYC"
# location = "New York"
# units = "imperial"

# Busy light — a persistent corner dot that lights up while a local file
# exists. The dot composites over every section and transition. (Real
# calendar/Slack sources are a future addition behind the same overlay.)
#
# DOCKER (the usual deploy): `~/.busy` is the CONTAINER's home, which your
# host can't reach. Point file_path at the bind-mounted config dir instead
# and toggle the file on the host:
#   file_path = "/code/config/.busy"   # in-container path (./config:/code/config:ro)
#   touch config/.busy   # ON     rm config/.busy   # OFF
# Bare-metal (no Docker): file_path = "~/.busy"; toggle ~/.busy directly.
#
# [busy_light]
# enabled = true
# file_path = "/code/config/.busy"
# poll_interval = 5.0
# corner = "top_right"       # top_left | top_right | bottom_left | bottom_right
# color = [255, 0, 0]        # 3 ints, each 0-255
# size = 4                    # dot side in physical px: ~4 on the 16-tall
#                             # smallsign, ~8-10 on the 64-tall bigsign/longboi
