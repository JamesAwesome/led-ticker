# led-ticker configuration — smallsign starter (160×16 canvas)
#
# 5× chained 32×16 panels = 160×16 logical canvas. Driven by a Raspberry Pi 4
# through an Adafruit RGB Matrix bonnet. No pixel_mapper needed — panels are a
# single horizontal chain, left-to-right.
#
# Copy this to config.toml and adjust the playlist sections for your content.
# Full config-options reference: https://led-ticker.pages.dev/reference/config-options/

[display]
rows = 16
cols = 32
chain = 5
brightness = 60
slowdown_gpio = 2      # mandatory on Pi 4 — bump to 3+ if you see flicker
gpio_mapping = "adafruit-hat"

[title]
delay = 5

# --- Transitions ---
# Global transition defaults. Full transition catalogue and per-family tuning
# lives at https://led-ticker.pages.dev/transitions/. The values below give a
# 0.5-sec wipe between widgets within a section and a dissolve between sections
# — readable on a 160×16 smallsign without being distracting.

[transitions]
default = "wipe_alternating"
duration = 0.5
easing = "ease_out"
between_sections = "dissolve"

# --- Playlist ---
# Each [[playlist.section]] displays in order, then the whole playlist loops.
# Sections, modes, and timing knobs: https://led-ticker.pages.dev/concepts/sections-and-modes/

[[playlist.section]]
mode = "forever_scroll"
loop_count = 1

[playlist.section.title]
type = "message"
text = "#DevOps News"
color = "random"

[[playlist.section.widget]]
type = "message"
text = "May the Rabbit always be with you!"

[[playlist.section.widget]]
type = "message"
text = "Always be your bunny best!"

# --- Countdowns ---
# Counts down to any date. Message + remaining days scroll across the panel.

[[playlist.section]]
mode = "forever_scroll"
loop_count = 2

[playlist.section.title]
type = "message"
text = "Count Downs"
color = "random"

[[playlist.section.widget]]
type = "countdown"
message = "Days Until Spring"
countdown_date = 2026-03-20

[[playlist.section.widget]]
type = "countdown"
message = "Days Until Summer"
countdown_date = 2026-06-20

# --- RSS Feeds ---
# Pulls headlines from any RSS/Atom feed. update_interval is how often (in
# seconds) the feed is re-fetched. Uncomment and point at your favorite feed.
#
# [[playlist.section]]
# mode = "forever_scroll"
# loop_count = 1
#
# [playlist.section.title]
# type = "message"
# text = "Nintendo Life"
# color = "random"
#
# [[playlist.section.widget]]
# type = "rss_feed"
# feed_url = "https://www.nintendolife.com/feeds/news"
# update_interval = 3000

# --- Crypto Prices ---
# Live prices via Coinbase. No API key required.
#
# [[playlist.section]]
# mode = "forever_scroll"
# loop_count = 2
#
# [playlist.section.title]
# type = "message"
# text = "Cryptocurrency/USD"
#
# [[playlist.section.widget]]
# type = "coinbase"
# symbol = "BTC"
# currency = "USD"
#
# [[playlist.section.widget]]
# type = "coinbase"
# symbol = "ETH"
# currency = "USD"

# --- MLB Scores ---
# Free MLB Stats API — no key needed. Shows current series scores, live game
# updates, and upcoming matchups for the teams you pick.
#
# [[playlist.section]]
# mode = "swap"
# transition = "scroll"
# transition_duration = 4.0
# loop_count = 0
#
# [[playlist.section.widget]]
# type = "mlb"
# team = "PHI"
# timezone = "America/New_York"
# final_hold_hours = 6   # hours to show final score before moving on (default: 6)

# --- MLB Standings ---
# Top-N teams by record plus any teams you're tracking. Shows "Opens [date]"
# during offseason / spring training.
#
# [[playlist.section]]
# mode = "swap"
# transition = "baseball_alternating"
# transition_duration = 2.0
# hold_time = 6
# loop_count = 1
#
# [[playlist.section.widget]]
# type = "mlb_standings"
# teams = ["NYM", "PHI"]
# top_n = 3

# --- Weather ---
# Requires WEATHERAPI_KEY in .env (https://www.weatherapi.com/).
# location can be a city name, zip code, or "lat,lon".
#
# [[playlist.section]]
# mode = "swap"
# loop_count = 1
#
# [playlist.section.title]
# type = "message"
# text = "Weather"
# color = "random"
#
# [[playlist.section.widget]]
# type = "weather"
# message = "NYC"
# location = "New York"
# units = "imperial"
