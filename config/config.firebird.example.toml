# requires-plugins: led-ticker-flair
# Install via config/requirements-plugins.txt (or the web UI Store), then restart.
# See https://docs.ledticker.dev/plugins/

# Firebird Yoga — store-window display config (Pi 5 bigsign).
#
# Hung in a building window at street level, viewable from across the street.
# 8× P3 32×64 panels in 2×4 vertical-serpentine = 256×64 logical.
# Brand: Beloved Sans + Inter, flame / ember / amber / cream / dusk palette.
# Site: https://firebirdyoga.demo  •  IG: @firebirdyoga.demo
#
# Far-viewing distance ⇒ all text uses hires fonts at 24-32px (no BDF).

# ---------------------------------------------------------------------------
# Display + RP1 performance tuning (matches config.bigsign.example.toml)
# ---------------------------------------------------------------------------

[display]
rows = 32
cols = 64
chain_length = 8
parallel = 1
pixel_mapper_config = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
gpio_slowdown = 3
hardware_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
show_refresh_rate = true

[title]
delay = 5

# Warm, energizing transitions matching the breath-and-flight brand voice.
# `wipe_alternating` cycles through directions using brand-colored sweep
# lines; `pokeball.alternating` is the section divider — a fun cue that
# something new is starting.
[transitions]
default = "wipe_alternating"
duration = 0.8
easing = "ease_in_out"
between_sections = "pokeball.alternating"
# Brand-tinted wipe color pool: flame, amber, dusk, cream
transition_colors = [[255, 92, 38], [255, 183, 3], [99, 60, 138], [255, 244, 214]]

# ---------------------------------------------------------------------------
# Brand color palette (Firebird Yoga — phoenix-warm)
#
#   flame  = [255,  92,  38]   FF5C26 — primary
#   ember  = [214,  40,  57]   D62839 — accent
#   amber  = [255, 183,   3]   FFB703 — highlight
#   cream  = [255, 244, 214]   FFF4D6 — warm white / body text
#   dusk   = [ 99,  60, 138]   633C8A — cool contrast (gradients, wipes)
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Section 1 — Logo hero (full-panel banner with rainbow border)
#
# Uses phoenix.png — the Firebird logo mark (220×220, square).
# pillarbox fit centers the square sprite with black bars left/right;
# rainbow border frames it.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 6.0
transition = "dissolve"
transition_duration = 1.0

[[playlist.section.widget]]
type = "image"
path = "assets/phoenix.png"
fit = "pillarbox"
image_align = "center"
hold_time = 6.0
border = {style = "rainbow", thickness = 2, speed = 3, char_offset = 5}

# ---------------------------------------------------------------------------
# Section 2 — "FIREBIRD YOGA" double rainbow hold
#
# Static hold at large size with rainbow per-char text AND rainbow border
# chasing around the perimeter — two rainbows.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 5.0
transition = "dissolve"
transition_duration = 0.8

[[playlist.section.widget]]
type = "message"
text = "FIREBIRD YOGA"
font = "beloved-sans-bold"
font_size = 26
font_threshold = 80
font_color = "rainbow"
border = {style = "rainbow", thickness = 2, speed = 4, char_offset = 6}

# ---------------------------------------------------------------------------
# Section 3 — Storefront scroll
#
# phoenix_transparent.png pillarboxed on the left; the storefront phrases
# walk BEHIND the logo (text_align="scroll" — image painted on top with
# skip-black, so text shows through the transparent regions of the
# logo and disappears behind the solid body itself). Per-char
# flame → amber gradient gives the warm ombre look.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 0.5

[[playlist.section.widget]]
type = "image"
path = "assets/phoenix_transparent.png"
fit = "pillarbox"
image_align = "left"
text = "Breathe Deep :heart: Flow Strong :heart_green: Rise Together"
text_align = "scroll"
scroll_speed_ms = 50
hold_time = 0.05   # min: text_loops drives the real duration
text_loops = 1
font = "beloved-sans-bold"
font_size = 28
font_threshold = 80
font_color = {style = "gradient", from = [255, 92, 38], to = [255, 183, 3]}

# ---------------------------------------------------------------------------
# Section 4 — Beginner Series promo  (with animated gif + rainbow border)
#
# phoenix_transparent.gif (220×220) pillarboxed on the left at scale=4
# native res; scrolling text walks across the panel with the rainbow border
# chasing around the perimeter.
# Transition pinned to pokeball.alternating per the user's request.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 8.0
transition = "pokeball.alternating"
transition_duration = 1.5

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix_transparent.gif"
fit = "pillarbox"
image_align = "left"
text = "BEGINNER SERIES :star: NOW ENROLLING :star: ALL LEVELS WELCOME"
text_align = "scroll"
scroll_speed_ms = 30
play_count = 0   # play through hold_time
font = "beloved-sans-bold"
font_size = 28
font_threshold = 80
font_color = [255, 92, 38]   # flame — warm and energizing
border = {style = "rainbow", thickness = 2, speed = 3, char_offset = 5}

# ---------------------------------------------------------------------------
# Section 5 — Candlelight Flow promo
#
# phoenix.webp (220×220) pillarboxed on the left. Inter-Bold
# at 26 reads cleanly across the street (more open shapes than Beloved
# Sans at this size). text_align="scroll_over" paints the animation first
# then the text — so the marquee walks IN FRONT of it,
# guaranteed visible regardless of frame brightness (no transparent regions).
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 6.0
transition = "nyancat.alternating"
transition_duration = 2.0

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix.webp"
fit = "pillarbox"
image_align = "left"
text = "CANDLELIGHT FLOW :star: NOW OPEN :star: ALL LEVELS"
text_align = "scroll_over"
scroll_speed_ms = 50
play_count = 0   # play through hold_time
font = "Inter-Bold"
font_size = 26
font_threshold = 128
font_color = [255, 244, 214]   # cream — high contrast on the video

# ---------------------------------------------------------------------------
# Section 6 — Classes we offer
#
# One class per beat. Cycles through: Vinyasa Flow, Yin, Hot Power,
# Restorative, Slow Flow, All Levels — using brand color rotation.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 2.5

[playlist.section.title]
type = "message"
text = "Classes"
font = "beloved-sans-bold"
font_size = 24
font_threshold = 80
font_color = [255, 92, 38]   # flame

[[playlist.section.widget]]
type = "message"
text = "Vinyasa Flow"
font = "beloved-sans-bold"
font_size = 30
font_threshold = 80
font_color = [255, 92, 38]    # flame

[[playlist.section.widget]]
type = "message"
text = "Yin"
font = "beloved-sans-bold"
font_size = 30
font_threshold = 80
font_color = [99, 60, 138]    # dusk

[[playlist.section.widget]]
type = "message"
text = "Hot Power"
font = "beloved-sans-bold"
font_size = 30
font_threshold = 80
font_color = [214, 40, 57]    # ember

[[playlist.section.widget]]
type = "message"
text = "Restorative"
font = "beloved-sans-bold"
font_size = 30
font_threshold = 80
font_color = [255, 244, 214]  # cream

[[playlist.section.widget]]
type = "message"
text = "Slow Flow"
font = "beloved-sans-bold"
font_size = 30
font_threshold = 80
font_color = [255, 183, 3]    # amber

[[playlist.section.widget]]
type = "message"
text = "All Levels Welcome"
font = "beloved-sans-bold"
font_size = 28
font_threshold = 80
font_color = [255, 92, 38]    # flame

# ---------------------------------------------------------------------------
# Section 7 — Welcoming / inclusion (combined scroll)
#
# All three phrases on one continuous marquee with a per-char
# ColorCycle so the whole line cycles through the brand palette as it scrolls.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 0.5
transition = "sailor_moon.alternating"
transition_duration = 2.0

[[playlist.section.widget]]
type = "message"
text = "Beginner Friendly  *  Drop-Ins Welcome  *  Every Body Welcome"
font = "beloved-sans-bold"
font_size = 28
font_threshold = 80
font_color = "color_cycle"

# ---------------------------------------------------------------------------
# Section 8 — IG handle two-row (storefront-window layout)
#
# scale=2 ⇒ 128 logical px wide so "@firebirdyoga.demo" fits on the held
# top row. content_height=24 gives 2 rows of breathing space between
# the two text bands. Inter-Bold for the handle (matches the IG look),
# Inter-Regular for the bottom promo line (lighter weight reads as
# secondary copy from across the street).
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
scale = 2
content_height = 24
loop_count = 1
hold_time = 4.0
transition = "dissolve"
transition_duration = 1.0

[[playlist.section.widget]]
type = "two_row"
top_text = ":instagram: @firebirdyoga.demo"
top_color = [225, 48, 108]   # IG brand magenta
top_align = "center"
top_font = "Inter-Bold"
top_font_size = 18
top_font_threshold = 128
bottom_text = "Now booking spring sessions — your first class is free."
bottom_color = [255, 244, 214]   # cream
bottom_align = "left"
bottom_font = "Inter-Regular"
bottom_font_size = 16
bottom_font_threshold = 128

[[playlist.section.widget]]
type = "two_row"
top_text = ":instagram: @firebirdyoga.demo"
top_color = [225, 48, 108]
top_align = "center"
top_font = "Inter-Bold"
top_font_size = 18
top_font_threshold = 128
bottom_text = "Beginner Series now enrolling — all levels welcome!"
bottom_color = [255, 183, 3]   # amber
bottom_align = "left"
bottom_font = "Inter-Regular"
bottom_font_size = 16
bottom_font_threshold = 128

[[playlist.section.widget]]
type = "two_row"
top_text = ":instagram: @firebirdyoga.demo"
top_color = [225, 48, 108]
top_align = "center"
top_font = "Inter-Bold"
top_font_size = 18
top_font_threshold = 128
bottom_text = "Vinyasa · yin · hot power · restorative · slow flow · all levels"
bottom_color = [255, 92, 38]   # flame
bottom_align = "left"
