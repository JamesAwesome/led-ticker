# GIF widget test config — Pi 5 bigsign.
#
# Cycles through every `fit` mode for the GIF widget so you can eyeball
# each one on real hardware. Uses `pika_wave.gif` (220×220 square) as
# the test asset for every section, so the differences are pure fit-
# mode variation.
#
# Sections:
#   1. pillarbox  — scale by height (64), center horizontally with
#                   black pillars (most common; preserves aspect)
#   2. stretch    — fill the whole 256×64 panel, distorting to 4:1
#   3. letterbox  — scale by width (256), center vertically with
#                   black bands top + bottom
#   4. crop       — scale to cover both axes, center-crop the excess
#                   (no black at all — fills panel by losing some of
#                   the source vertically)
#   5. pillarbox + loop_count=34 — same fit but ~20s playback (proves loop_count works)
#
# Transitions: dissolve between sections (sandwiches each GIF playback
# cleanly — entry transition composites against frame 0, exit composites
# against the last frame).
#
# Copy to config.toml on the bigsign Pi:
#   cp config/config.gif_test.example.toml config/config.toml
#
# On the Pi (Docker Compose):
#   docker compose up -d --build
#   docker compose logs -f

# ---------------------------------------------------------------------------
# Display + RP1 performance tuning (matches config.bigsign.example.toml)
# ---------------------------------------------------------------------------

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
show_refresh = true
rp1_rio = 1

[title]
delay = 0

[transitions]
default = "cut"
duration = 0.4
easing = "linear"
between_sections = "dissolve"

# ---------------------------------------------------------------------------
# Section 1 — pillarbox (default)
#
# Square 220×220 GIF scaled by height to 64. The result is 64×64 centered
# horizontally on the 256×64 panel, with ~96 cols of black on each side.
# This is what you want for square / portrait sources on the wide bigsign.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 17  # ~10s of playback (17 × 600ms per loop)
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave.gif"
fit = "pillarbox"

# ---------------------------------------------------------------------------
# Section 2 — stretch
#
# Same source distorted to 256×64. Pikachu becomes very wide and short —
# useful for visual confirmation that "stretch" actually fills the whole
# panel (no black bands anywhere) and to see how aggressively the panel's
# 4:1 aspect distorts a square source.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 17  # ~10s of playback (17 × 600ms per loop)
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave.gif"
fit = "stretch"

# ---------------------------------------------------------------------------
# Section 3 — letterbox
#
# Square source scaled by WIDTH to 256, then centered vertically. With a
# 220×220 source, scale-by-width would produce 256×256, but the renderer
# clamps the height to 64 and falls back to scale-by-height — so this
# visually matches `pillarbox` for square sources. The interesting case
# would be a wide (e.g. 16:9) GIF, which would actually letterbox with
# black bars top/bottom.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 17  # ~10s of playback (17 × 600ms per loop)
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave.gif"
fit = "letterbox"

# ---------------------------------------------------------------------------
# Section 4 — crop
#
# Square 220×220 source scaled to COVER 256×64 (so it scales to 256×256 and
# crops top + bottom to 64). Pikachu's middle horizontal band fills the
# panel — no black at all, but the top and bottom of the source are lost.
# Best for sources where the action is in the middle.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 17  # ~10s of playback (17 × 600ms per loop)
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave.gif"
fit = "crop"

# ---------------------------------------------------------------------------
# Section 5 — pillarbox, ~20 seconds (double the earlier ones)
#
# Same fit as Section 1 but loops 34× to play for ~20s. Confirms
# loop_count actually controls repetition by visibly running longer.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 34  # ~20s of playback
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave.gif"
fit = "pillarbox"

# ---------------------------------------------------------------------------
# Section 6 — pillarbox + static text in the RIGHT pillar
#
# Pikachu sits center-left in his ~64-wide pillarboxed band; "PIKACHU!"
# is held statically against the right edge. Text paints AFTER the gif
# each tick, so even if Pikachu's frame had pixels in that column the
# text would still win. Tick rate is 50 ms → smooth alongside the
# gif's 100 ms frames.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 17  # ~10s of playback
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave.gif"
fit = "pillarbox"
text = "PIKACHU!"
text_align = "right"
font_color = [255, 220, 50]

# ---------------------------------------------------------------------------
# Section 7 — pillarbox + static text in the LEFT pillar
#
# Same shape as Section 6 but anchored on the LEFT side of the panel.
# Useful for branding patterns where the logo lives to the left of an
# animated mascot.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 17  # ~10s of playback
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave.gif"
fit = "pillarbox"
text = "@brand"
text_align = "left"
font_color = [225, 48, 108]

# ---------------------------------------------------------------------------
# Section 8 — pillarbox + scrolling marquee text UNDER the gif
#
# The marquee scrolls right-to-left at 1 px / 50 ms (≈20 px/sec). Black
# pixels in the gif (i.e. the pillars) are made transparent each tick,
# so text only appears where Pikachu isn't — it visually "walks behind"
# him. Confirms the skip-black compositing path.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 34  # ~20s — long enough for marquee to traverse twice
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave.gif"
fit = "pillarbox"
text = "WELCOME TO THE STORE — OPEN DAILY 9 TO 9"
text_align = "scroll"
font_color = [255, 220, 50]
scroll_speed_ms = 50

# ---------------------------------------------------------------------------
# Section 9 — pride.gif filling the whole panel
#
# Source is 1000×700 (~10:7). On a 4:1 panel the only way to use the
# full screen without losing colors is `stretch` (pillarbox/letterbox
# would leave bands; crop would chop the top + bottom stripes off).
# Stripes will look squashed vertically — that's the panel aspect, not
# a bug.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 5  # ~5s of playback (loop is ~1s)
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pride.gif"
fit = "stretch"

# ---------------------------------------------------------------------------
# Section 10 — pride_trans.gif filling the whole panel
#
# Source is 498×280 (~16:9). Same stretch rationale as section 9.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 3  # ~4.4s of playback (loop is ~1.45s)
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pride_trans.gif"
fit = "stretch"
