# Plugin dependencies: none — built-in (core) widgets & transitions only.

# GIF widget test config — Pi 5 bigsign.
#
# Cycles through every `fit` mode for the GIF widget so you can eyeball
# each one on real hardware. Uses `phoenix.gif` (220×220 square) as
# the test asset for every section, so the differences are pure fit-
# mode variation.
#
# Sections:
#   1. pillarbox  — scale by height (64), center horizontally with
#                   black pillars (most common; preserves aspect)
#   2. stretch    — fill the whole 256×64 panel, distorting to 4:1
#   3. letterbox  — scale by width (256), center vertically with
#                   black bands top + bottom
#   4. crop       — scale to cover both axes, center-crop the excess
#                   (no black at all — fills panel by losing some of
#                   the source vertically)
#   5. pillarbox + loop_count=34 — same fit but ~20s playback (proves loop_count works)
#
# Transitions: dissolve between sections (sandwiches each GIF playback
# cleanly — entry transition composites against frame 0, exit composites
# against the last frame).
#
# Copy to config.toml on the bigsign Pi:
#   cp config/config.gif_test.example.toml config/config.toml
#
# On the Pi (Docker Compose):
#   docker compose up -d --build
#   docker compose logs -f

# ---------------------------------------------------------------------------
# Display + RP1 performance tuning (matches config.bigsign.example.toml)
# ---------------------------------------------------------------------------

[display]
rows = 32
cols = 64
chain_length = 8
parallel = 1
pixel_mapper_config = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
gpio_slowdown = 3
hardware_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
show_refresh_rate = true

[title]
delay = 0

[transitions]
default = "cut"
duration = 0.4
easing = "linear"
between_sections = "dissolve"

# ---------------------------------------------------------------------------
# Section 1 — pillarbox (default) + section title via mode = "slideshow"
#
# Square 220×220 GIF scaled by height to 64. The result is 64×64 centered
# horizontally on the 256×64 panel, with ~96 cols of black on each side.
# This is what you want for square / portrait sources on the wide bigsign.
#
# Uses `mode = "slideshow"` so a section title can run first — title displays
# (held + scrolled if it overflowed), dissolves into the gif, gif plays
# `loops = 17` times for ~10s of playback before the next section.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
loop_count = 1  # cycle the widget list once
hold_time = 2.0  # title hold before dissolve
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
text = "PHOENIX"
font_color = [255, 220, 50]

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix.gif"
fit = "pillarbox"
play_count = 17  # ~10s of playback (17 × 600ms per loop)

# ---------------------------------------------------------------------------
# Section 2 — stretch
#
# Same source distorted to 256×64. The phoenix becomes very wide and short —
# useful for visual confirmation that "stretch" actually fills the whole
# panel (no black bands anywhere) and to see how aggressively the panel's
# 4:1 aspect distorts a square source.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix.gif"
fit = "stretch"
play_count = 17  # ~10s of playback (17 × 600ms per loop)

# ---------------------------------------------------------------------------
# Section 3 — letterbox
#
# Square source scaled by WIDTH to 256, then centered vertically. With a
# 220×220 source, scale-by-width would produce 256×256, but the renderer
# clamps the height to 64 and falls back to scale-by-height — so this
# visually matches `pillarbox` for square sources. The interesting case
# would be a wide (e.g. 16:9) GIF, which would actually letterbox with
# black bars top/bottom.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix.gif"
fit = "letterbox"
play_count = 17  # ~10s of playback (17 × 600ms per loop)

# ---------------------------------------------------------------------------
# Section 4 — crop
#
# Square 220×220 source scaled to COVER 256×64 (so it scales to 256×256 and
# crops top + bottom to 64). The phoenix's middle horizontal band fills the
# panel — no black at all, but the top and bottom of the source are lost.
# Best for sources where the action is in the middle.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix.gif"
fit = "crop"
play_count = 17  # ~10s of playback (17 × 600ms per loop)

# ---------------------------------------------------------------------------
# Section 5 — pillarbox, ~20 seconds (double the earlier ones)
#
# Same fit as Section 1 but loops 34× to play for ~20s. Confirms
# loop_count actually controls repetition by visibly running longer.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix.gif"
fit = "pillarbox"
play_count = 34  # ~20s of playback

# ---------------------------------------------------------------------------
# Section 6 — pillarbox + static text in the RIGHT pillar
#
# Phoenix pinned to the LEFT edge (image_align="left") so the right
# ~192 cols are an unobstructed black pillar; "PHOENIX!" is held
# statically against the right edge. Text paints AFTER the gif each
# tick, so even if the phoenix's frame had pixels in that column the text
# would still win. Tick rate is 50 ms → smooth alongside the gif's
# 100 ms frames.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix.gif"
fit = "pillarbox"
image_align = "left"
text = "PHOENIX!"
text_align = "right"
font = "Inter-Bold"
font_size = 24
font_color = [255, 220, 50]
play_count = 17  # ~10s of playback

# ---------------------------------------------------------------------------
# Section 7 — pillarbox + static text in the LEFT pillar
#
# Mirror of Section 6: phoenix pinned RIGHT, "@brand" anchored LEFT.
# Useful for branding patterns where the logo / handle lives next to
# an animated sprite.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix.gif"
fit = "pillarbox"
image_align = "right"
text = "@brand"
text_align = "left"
font = "Inter-Regular"
font_size = 24
font_color = [225, 48, 108]
play_count = 17  # ~10s of playback

# ---------------------------------------------------------------------------
# Section 8 — TRANSPARENT phoenix + scrolling marquee text UNDER the gif
#
# The marquee scrolls right-to-left at 1 px / 50 ms (≈20 px/sec).
# `phoenix_transparent.gif` has a real alpha channel — its decoder
# composites onto black so transparent areas (around the phoenix)
# AND the pillars both read as (0,0,0). The skip-black path then makes
# text show through everywhere except the phoenix silhouette: the
# marquee walks BEHIND it, not just behind the pillars.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix_transparent.gif"
fit = "pillarbox"
text = "WELCOME TO THE STORE — OPEN DAILY 9 TO 9"
text_align = "scroll"
font_color = [255, 220, 50]
scroll_speed_ms = 50
play_count = 34  # ~20s — long enough for marquee to traverse twice

# ---------------------------------------------------------------------------
# Section 9 — pride.gif filling the whole panel
#
# Source is 1000×700 (~10:7). On a 4:1 panel the only way to use the
# full screen without losing colors is `stretch` (pillarbox/letterbox
# would leave bands; crop would chop the top + bottom stripes off).
# Stripes will look squashed vertically — that's the panel aspect, not
# a bug.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pride.gif"
fit = "stretch"
play_count = 5  # ~5s of playback (loop is ~1s)

# ---------------------------------------------------------------------------
# Section 10 — pride_trans.gif filling the whole panel
#
# Source is 498×280 (~16:9). Same stretch rationale as section 9.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pride_trans.gif"
fit = "stretch"
play_count = 3  # ~4.4s of playback (loop is ~1.45s)

# ---------------------------------------------------------------------------
# Section 11 — gif inside `mode = "slideshow"` with an optional title
#
# Demonstrates the slideshow-mode merge: gif widgets work exactly like any
# other widget in `mode = "slideshow"`. The title displays first (held +
# scrolled if it overflows) and then the section's `transition` runs
# into the gif. Per-visit `loops` are controlled by the widget's own
# `loops = N` field instead of the section's `loop_count` (which means
# "cycle the widget list N times" in slideshow mode).
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
loop_count = 1  # show the gif once
hold_time = 2.0  # title hold before transition
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
text = "PRIDE"
font_color = [255, 140, 0]

[[playlist.section.widget]]
type = "gif"
path = "assets/pride.gif"
fit = "stretch"
play_count = 5  # ~5s of playback inside the single visit

# ---------------------------------------------------------------------------
# Section 12 — TRANSPARENT phoenix pinned LEFT + scrolling marquee
#
# Same skip-black trick as section 8, but with the gif anchored to the
# left edge (`image_align = "left"`). The right ~192 cols are black
# pillar — text scrolls through that whole region AND through the
# transparent space around the phoenix on the left. Visually the phoenix
# sits in a corner while a much-longer marquee passes around it.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix_transparent.gif"
fit = "pillarbox"
image_align = "left"
text = "OPEN LATE TONIGHT — COME SAY HI"
text_align = "scroll"
font = "Inter-Bold"
font_size = 32
font_color = [120, 200, 255]
scroll_speed_ms = 50
play_count = 34  # ~20s

# ---------------------------------------------------------------------------
# Section 13 — TRANSPARENT phoenix pinned RIGHT + static title
#
# Demonstrates `mode = "slideshow"` with the transparent gif: section title
# "HELLO!" displays first, dissolves into the phoenix pinned to the right
# edge with "@brand" held statically in the left pillar. Confirms the
# transparent decode path also looks right when text is static (not
# scrolling) and the gif is offset to one edge.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 2.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
text = "HELLO!"
font_color = [255, 220, 50]

[[playlist.section.widget]]
type = "gif"
path = "assets/phoenix_transparent.gif"
fit = "pillarbox"
image_align = "right"
text = "@brand"
text_align = "left"
font_color = [225, 48, 108]
play_count = 17  # ~10s of playback

# ---------------------------------------------------------------------------
# Section 14 — pride_trans.gif as a full-screen BACKGROUND with BLACK
# (off) scrolling text ON TOP (`text_align = "scroll_over"`).
#
# Opposite of section 8's `scroll`: there text scrolls UNDER the gif,
# only visible through transparent / black areas. Here the gif paints
# first and the text scrolls over it — but font_color = (0, 0, 0)
# turns those LEDs OFF, so the letters read as a "knockout" cutout
# revealing the panel's unlit black through the bright flag colors.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pride_trans.gif"
fit = "stretch"
text = "TRANS RIGHTS ARE HUMAN RIGHTS"
text_align = "scroll_over"
font_color = [0, 0, 0]
font_size = 24  # bump up so the cutout is actually readable
scroll_speed_ms = 50
play_count = 14  # ~20s — enough for one full marquee pass + change

# ---------------------------------------------------------------------------
# Section 15 — chunky text + inline emoji over pride.gif
#
# Demonstrates `font_size = 48` (text painted via a ScaledCanvas wrapper
# at 4× block size, matching the rest of the bigsign's content) PLUS
# inline `:slug:` emoji rendering. Without font_size the BDF glyphs
# come out at native ~12px tall — barely visible from across a room.
# With font_size=48 the same font fills 75% of the panel height.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "slideshow"
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pride.gif"
fit = "stretch"
text = ":heart: HAPPY PRIDE :heart:"
text_align = "scroll_over"
font_color = [255, 255, 255]
font_size = 48
scroll_speed_ms = 50
play_count = 14  # ~14s of playback — long enough for the marquee to cross

# ---------------------------------------------------------------------------
# Sections 16 + 17 — Firebird Yoga brand: Beloved Sans Regular vs Bold
# (commented out; uncomment ONLY after dropping `beloved-sans.otf` and
# `beloved-sans-bold.otf` into `config/fonts/`)
#
# Transparent phoenix pinned LEFT; "Follow us! @firebirdyoga.demo"
# scrolls in the brand font through the right ~192px panel area and
# behind the phoenix's transparent halo. Identical text + layout in both
# sections so the only variable is the weight — eyeball the panel and
# decide which one ships.
#
# Threshold note: both weights use `font_threshold = 80`. Beloved Sans
# Regular's strokes are too thin to survive the default 128 (the left
# vertical of `n`/`u` clips out). Bold strokes survive 128 fine on
# their own, but mixing thresholds inside one family inverts the
# weight relationship — so for direct A/B comparison both go to 80.
# ---------------------------------------------------------------------------

