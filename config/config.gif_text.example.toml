# GIF + text combos — Pi 5 bigsign.
#
# A focused subset of `config.gif_test.example.toml`, demoing every
# major "gif with text" pattern in 5 sections so you can iterate on
# look + feel without sitting through every fit-mode permutation.
#
# Sections:
#   1. Static text + offset gif    — Pikachu LEFT, Inter-Bold "PIKACHU!" on the right
#   2. Scroll UNDER (transparent)  — BDF marquee, smart-default font_size (lores smoke)
#   3. Scroll OVER (knockout)      — Inter-Bold black-LED cutout through pride flag
#   4. Emoji + chunky text         — BDF :heart: HAPPY PRIDE :heart: @48 (lores+emoji smoke)
#   5. Animated WebP + scroll-over — kpop-dance.webp + Inter-Bold class signup pitch
#   6. Title + gif (mode = "swap") — "HELLO!" title → Inter-Regular @brand + Pikachu
#
# BDF smoke tests retained intentionally in §2 + §4:
#   §2 covers the `font_size = None` smart-default path (BDF resolves
#       to cell_h × _logical_scale = 48 at first paint, wraps at scale 4).
#   §4 covers the explicit-`font_size` BDF path (block_scale = 48 // 12 = 4)
#       plus inline emoji rendering through the wrapper.
# All other sections use HiresFont (Inter) — direct real-pixel rendering.
#
# Copy to config.toml on the bigsign Pi:
#   cp config/config.gif_text.example.toml config/config.toml
#
# On the Pi (Docker Compose):
#   docker compose up -d --build
#   docker compose logs -f

# ---------------------------------------------------------------------------
# Display + RP1 performance tuning (matches config.bigsign.example.toml)
# ---------------------------------------------------------------------------

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
show_refresh = true
rp1_rio = 1

[title]
delay = 0

[transitions]
default = "cut"
duration = 0.4
easing = "linear"
between_sections = "dissolve"

# ---------------------------------------------------------------------------
# Section 1 — Static text + offset gif
#
# Pikachu pinned to the LEFT edge (`image_align = "left"`); the right
# ~192 cols become an unobstructed black pillar with "PIKACHU!" held
# statically against the right edge. Text paints AFTER the gif each
# tick so it always wins on overlap.
#
# Text size: explicit `font = "Inter-Bold"` + `font_size = 24` keeps
# "PIKACHU!" sharp at ~24 real px tall × ~110 wide — sits cleanly in
# the right pillar. With default BDF on bigsign, omitting `font_size`
# defaults to panel-scale (cell_h × _logical_scale = 48), which would
# render "PIKACHU!" at ~192 wide and bleed into Pikachu's body. To get
# tiny native-12-px text on bigsign, opt in via HiresFont with
# `font_size = 12`.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 17  # ~10s of playback
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave.gif"
fit = "pillarbox"
image_align = "left"
text = "PIKACHU!"
text_align = "right"
font = "Inter-Bold"
font_size = 24
font_color = [255, 220, 50]

# ---------------------------------------------------------------------------
# Section 2 — Scroll UNDER (transparent gif) — BDF smart-default smoke
#
# `pika_wave_transparent.gif` decodes its alpha channel onto black, so
# everywhere outside Pikachu's silhouette reads as (0,0,0). With
# `text_align = "scroll"` the marquee paints first then the gif on top
# with skip-black — text shows through the pillars AND the area around
# Pikachu's body, walking behind his actual silhouette.
#
# Font: BDF default (FONT_DEFAULT 6×12), no explicit `font_size`. This
# exercises the smart-default path — at first paint the widget resolves
# `font_size = cell_h × _logical_scale = 12 × 4 = 48`, block_scale = 4,
# wraps the canvas at scale 4 so glyphs block-expand to fill ~75% of
# the panel height. If you ever delete this section, replace it with
# another BDF + no-font_size combo so the smart-default path keeps a
# smoke test.
#
# `text_loops = 2` makes the section hold here until the marquee has
# fully crossed the panel twice, regardless of `loop_count` — the gif
# keeps looping in the background to fill the time.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 1  # gif controls a 1-loop minimum; text_loops sets the real floor
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave_transparent.gif"
fit = "pillarbox"
text = "WELCOME TO THE STORE — OPEN DAILY 9 TO 9"
text_align = "scroll"
font_color = [255, 220, 50]
scroll_speed_ms = 50
text_loops = 2  # don't transition until the marquee has crossed twice

# ---------------------------------------------------------------------------
# Section 3 — Scroll OVER (knockout / cutout text) — HiresFont
#
# `pride_trans.gif` filling the panel + `text_align = "scroll_over"`
# (gif first, text on top). font_color = (0, 0, 0) writes pure black,
# which on LEDs is just OFF — so the marquee letters read as a
# knockout cutout through the bright flag stripes. The cutout works
# the same with hires fonts (the renderer paints lit pixels via
# SetPixel; black pixels stay off → off LEDs → cutout).
# Inter-Bold @ 28 gives a heavy stroke that reads cleanly at distance.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 14  # ~20s
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pride_trans.gif"
fit = "stretch"
text = "TRANS RIGHTS ARE HUMAN RIGHTS"
text_align = "scroll_over"
font = "Inter-Bold"
font_size = 28
font_color = [0, 0, 0]
scroll_speed_ms = 50

# ---------------------------------------------------------------------------
# Section 4 — Emoji + chunky text — BDF explicit-font_size smoke
#
# pride.gif backdrop with white ":heart: HAPPY PRIDE :heart:" scrolling
# over it. `:slug:` tokens render as inline pixel-art sprites (not as
# literal text). Explicit `font_size = 48` exercises the BDF block-
# expansion path: block_scale = 48 // 12 = 4, wrapper at scale 4 →
# glyphs fill ~75% of panel height. Inline emoji rides through the
# wrapper too — hires `:heart:` (32×32) fires the
# `isinstance(canvas, ScaledCanvas)` gate. If you ever delete this
# section, replace it with another BDF + explicit `font_size` + emoji
# combo so this path keeps a smoke test.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 14  # ~14s
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pride.gif"
fit = "stretch"
text = ":heart: HAPPY PRIDE :heart:"
text_align = "scroll_over"
font_color = [255, 255, 255]
font_size = 48
scroll_speed_ms = 50

# ---------------------------------------------------------------------------
# Section 5 — Animated WebP + scroll-over marquee
#
# `kpop-dance.webp` is a 540×400, 31-frame animated WebP. The decoder
# is format-agnostic (gif, webp, apng, multi-frame tiff) — it just
# calls Pillow's `Image.open` + `seek()`. Pillarbox preserves the
# dance's aspect ratio (~86 wide × 64 tall, ~85px black pillars on
# either side); `scroll_over` walks the marquee across the full
# panel width on top of the video. `text_loops = 1` holds the section
# until the announcement has crossed once regardless of how many
# times the dance loops underneath.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "gif"
loop_count = 1  # text_loops sets the real floor; webp keeps looping under it
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/kpop-dance.webp"
fit = "pillarbox"
text = "Sign up for our new K-Pop Dance Class!"
text_align = "scroll_over"
font = "Inter-Bold"
font_size = 24
font_color = [140, 20, 100]  # deep magenta — K-pop palette, dark for contrast
scroll_speed_ms = 50
text_loops = 1

# ---------------------------------------------------------------------------
# Section 6 — Title + gif via mode = "swap"
#
# Demonstrates the swap-mode merge: gif widgets work exactly like any
# other widget under `mode = "swap"`. The section title "HELLO!"
# displays first (held + scrolled if it overflowed), dissolves into
# the gif. Per-visit `loops` are controlled by the widget's own
# `loops` field; section.loop_count means "cycle the widget list N
# times" in swap mode (set to 1 here = single visit).
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 2.0  # title hold before dissolve
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
text = "HELLO!"
color = [255, 220, 50]

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave_transparent.gif"
fit = "pillarbox"
image_align = "right"
text = "@brand"
text_align = "left"
font = "Inter-Regular"
font_size = 24
font_color = [225, 48, 108]
loops = 17  # ~10s of playback
