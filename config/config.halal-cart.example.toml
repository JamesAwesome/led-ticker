# ===========================================================================
#  2 · THE GREETING — good morning / afternoon / night, live clock + temp
#      One always-on section; each widget carries its OWN schedule window so
#      exactly one greeting shows at any hour (windows cover the full day).
#      Deals in on flair.poker: rainbow card suits ripple the greeting onto
#      the panel (the cart's a gambler — it already runs a lottery draw).
# ===========================================================================
[[playlist.section]]
mode = "slideshow"
hold_time = 8
# Card-suit ripples wash the greeting in (needs led-ticker-flair >= 0.10.0).
entry_transition = "flair.poker"

[[playlist.section.widget]]
type = "message"
text = "GOOD MORNING ☀️ :clock.now: • :wx.cart:"
schedule = {start = "05:00", end = "11:00"}
font_color = {style = "shimmer", base = "gold", shimmer = "white", speed = 18.0, pause = 0.5}
font = "Inter-Bold"
font_size = 44
border = {style = "rainbow", thickness = 2, speed = 4, char_offset = 6}

