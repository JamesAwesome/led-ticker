# requires-plugins: led-ticker-flair, led-ticker-weather
# Install via config/requirements-plugins.txt (or the web UI Store), then restart.
# The greeting's live temperature needs WEATHERAPI_KEY in your .env (free tier:
# https://www.weatherapi.com/) — without it the :wx.cart: token just shows "…".
# See https://docs.ledticker.dev/plugins/
#
# ===========================================================================
#  HALAL CART — bigsign (Pi 5, 256×64)
# ===========================================================================
# An imitation NYC halal-cart LED sign. The whole point is FLASHING: saturated
# red + turmeric-gold + rainbow, glowing marquee bulbs, fireworks between every
# section, a fisheye banner, and a lottery-ball menu draw. Runs the way a
# Midtown cart sign does at 2am — loud, bright, never still.
#
# TWO MENUS ON ONE CART (visibility scheduling): like the real carts, mornings
# are a coffee cart — bacon egg and cheese, coffee, bagels, donuts — and from
# lunch through the late-night crowd it's the halal menu. AM sections carry
# schedule = {start = "05:00", end = "11:00"}; PM sections carry
# schedule = {start = "11:00", end = "05:00"} (start > end WRAPS overnight —
# the 2am shift). Even the lottery draw follows the shift; only OPEN 24 HOURS
# and the greeting run around the clock. The greeting (section 2) shows the
# OTHER granularity: one always-on section whose three widgets carry their own
# widget-level schedules — good morning / good afternoon / good night 🌙 —
# so exactly one greeting is visible at any hour.
#
# TACO TUESDAY MADNESS (day-of-week scheduling): Tuesdays the cart goes LOCO —
# breakfast burritos at sunrise, tacos + burritos + bowls from lunch through
# the 2am crowd, all delivered with the energy of an upstate used-car salesman
# who has gazed past the veil and kept right on selling — cosmic dread braided
# into the hard sell (aeons, the tide, IA! IA!), foretold and foil-wrapped.
# Every line leads with the taco, then the madness. Every regular menu section
# carries
# days = ["mon", "wed", "thu", "fri", "sat", "sun"] and each has a Tuesday
# twin (the "t" sections) with days = ["tue"]. Overnight wrap + days compose:
# the post-midnight tail of a wrapped window belongs to the day it STARTED,
# so the Tuesday PM sections run Tue 11:00 all the way to Wed 05:00, and the
# regular menu takes back over at Wednesday sunrise. The greeting and
# OPEN 24 HOURS stay up every day. Tuesday sections (except the draw, which
# keeps its fireworks) enter under flair.stickers with backing = "shadow" —
# a swarm of haloed tacos piles over the panel (the menu stays visible
# through the gaps), then peels away. The greeting deals in on flair.poker
# (card-suit ripples). Needs led-ticker-flair >= 0.10.0.
# Schedules evaluate on [display] timezone — set it, or a UTC Docker container
# flips your menus at the wrong hours (validate prints the resolved clock).
#
# Palette:  halal-red [230,40,30] · turmeric-gold [255,190,0] · cream [255,244,214]
#           taco-green [80,200,60] (Tuesday accent)
# Theme:    flashing, animation, rainbows, flair, scheduling, value tokens.
# ===========================================================================

# --- Display + RP1 tuning (matches config.bigsign.example.toml) --------------
[display]
rows = 32
cols = 64
chain_length = 8
parallel = 1
pixel_mapper_config = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"
brightness = 70
gpio_slowdown = 3
hardware_mapping = "adafruit-hat"
default_scale = 4
pwm_bits = 8
# The one clock every schedule below evaluates on. Without this, a Docker
# container's UTC clock serves the breakfast menu at dinnertime.
timezone = "America/New_York"

[title]
# 0 = no pre-roll pause before a marquee's first widget starts scrolling —
# the banners flow continuously (the sign is "never still"). Per-section
# start_hold can still override this for any section that wants a beat.
delay = 0

# Fireworks burst between every section (the big flashy reveal); a white
# color-flash punches between widgets inside a section.
[transitions]
default = "color_flash"
duration = 0.6
easing = "ease_in_out"
between_sections = "flair.fireworks"

# --- Value tokens for the greeting: live clock + temperature -----------------
# Referenced as :clock.now: / :wx.cart: inside widget text. The clock follows
# the same timezone as the schedules; weather polls every 15 min.
[[source]]
id = "clock.now"
type = "clock"
format = "%-I:%M %p"
timezone = "America/New_York"

[[source]]
id = "wx.cart"
type = "weather.current"
location = "New York, NY"
interval = 900
format = "{temp_f}°"

