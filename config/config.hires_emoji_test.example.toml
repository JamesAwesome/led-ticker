# Hi-res emoji test config — Pi 5 bigsign.
#
# Cycles through every hi-res emoji so you can eyeball each design on
# real hardware. Optimized for fast iteration: most sections show all
# icons of a category in a single row instead of one-per-message.
#
# Hi-res emojis are 32×32 physical sprites that paint directly to the
# bigsign's LEDs (bypassing ScaledCanvas's 4×4 block expansion). Slugs
# with a hi-res variant:
#   :moon: :instagram: :sun: :star: :email: :baseball: :flower: :taco:
#   :bunny: :heart: :pokeball: :cloud: :rain: :snow: :thunder: :fog:
# Heart rainbow variants:
#   :heart_red: :heart_orange: :heart_yellow: :heart_green:
#   :heart_blue: :heart_purple: :heart_pink:
# Pride flag variants:
#   :pride: (default rainbow) :pride_rainbow: :pride_bi: :pride_trans:
#   :pride_lesbian: :pride_ace: :pride_nb: :pride_demi:
# Cat color variants:
#   :cat: (default gray) :cat_gray: :cat_orange: :cat_white:
#   :cat_black: :cat_brown: :cat_cream:
#
# Mode is `swap` so each test message is its own held display unit.
#
# Copy to config.toml on the bigsign Pi:
#   cp config/config.hires_emoji_test.example.toml config/config.toml

# ---------------------------------------------------------------------------
# Display + RP1 performance tuning (matches config.bigsign.example.toml)
# ---------------------------------------------------------------------------

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
show_refresh = true
rp1_rio = 1

[title]
delay = 3

[transitions]
default = "cut"
duration = 0.4
easing = "linear"
between_sections = "dissolve"

# ---------------------------------------------------------------------------
# Section 0 — cat variants
#
# Hi-res row at the default scale=4. Low-res variants are exercised via
# the two_row layout below (scale=2 with the per-row 8-logical cap forces
# the hi-res→low-res fallback for the bottom row's emoji).
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 5.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "CATS HI"
color = [240, 180, 100]

[[playlist.section.widget]]
type = "message"
text = ":cat_gray::cat_orange::cat_white::cat_black::cat_brown::cat_cream:"
font_color = [255, 240, 200]

[[playlist.section]]
mode = "swap"
scale = 2
content_height = 20
loop_count = 1
hold_time = 5.0
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "two_row"
top_text = ":cat: cats lo-res"
top_color = [240, 180, 100]
top_align = "center"
bottom_text = ":cat_gray::cat_orange::cat_white::cat_black::cat_brown::cat_cream:"
bottom_color = [255, 240, 200]
bottom_align = "center"

# ---------------------------------------------------------------------------
# Section 1 — all 5 weather hi-res icons in ONE row
#
# Renders :cloud::rain::snow::thunder::fog: side-by-side. Each emoji is
# 8 logical wide + 2 padding = 10 logical, so 5 icons = 50 logical, fits
# comfortably on the 64-logical-wide bigsign canvas at scale=4.
#
# Hold for 6s so you can scan all five at once instead of waiting through
# a one-at-a-time cycle.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 6.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "WEATHER"
color = [200, 220, 255]

[[playlist.section.widget]]
type = "message"
text = ":cloud::rain::snow::thunder::fog:"
font_color = [255, 240, 200]

# ---------------------------------------------------------------------------
# Section 2 — all 5 non-weather hi-res icons in ONE row
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 6.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "MIX"
color = [255, 240, 200]

[[playlist.section.widget]]
type = "message"
text = ":moon::sun::star::instagram::email::baseball::flower::taco::bunny::heart::pokeball:"
font_color = [255, 240, 200]

# ---------------------------------------------------------------------------
# Section 3 — emojis WITH trailing text (real usage pattern)
#
# Catches regressions in cursor-advancement / measure_width — text
# following each emoji should sit with the standard EMOJI_PADDING gap.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 4.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "WITH TEXT"
color = [225, 48, 108]

[[playlist.section.widget]]
type = "message"
text = ":sun: sunny"
font_color = [255, 220, 80]

[[playlist.section.widget]]
type = "message"
text = ":rain: rainy"
font_color = [100, 160, 230]

[[playlist.section.widget]]
type = "message"
text = ":snow: snow!"
font_color = [220, 240, 255]

[[playlist.section.widget]]
type = "message"
text = ":thunder: storm"
font_color = [255, 220, 50]

# ---------------------------------------------------------------------------
# Section 4 — rainbow heart row
#
# Every :heart_*: variant lined up so all colors are visible at once.
# 7 emojis × (8 + 2) = 70 logical px → overflows 64-wide canvas, will
# scroll left then hold.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 5.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "HEARTS"
color = [255, 100, 130]

[[playlist.section.widget]]
type = "message"
text = ":heart_red::heart_orange::heart_yellow::heart_green::heart_blue::heart_purple::heart_pink:"
font_color = [255, 240, 200]

# ---------------------------------------------------------------------------
# Section 5 — pride flags row
#
# 7 pride flag variants in sequence. Like the HEARTS row, this overflows
# the canvas and exercises scroll-on-overflow.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 5.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "PRIDE"
color = [255, 140, 0]

[[playlist.section.widget]]
type = "message"
text = ":pride_rainbow::pride_bi::pride_trans::pride_lesbian::pride_ace::pride_nb::pride_demi:"
font_color = [255, 240, 200]

# ---------------------------------------------------------------------------
# Section 6 — cat color variants
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 5.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "CATS"
color = [240, 180, 100]

[[playlist.section.widget]]
type = "message"
text = ":cat_gray::cat_orange::cat_white::cat_black::cat_brown::cat_cream:"
font_color = [255, 240, 200]

# ---------------------------------------------------------------------------
# Section 7 — two-row layout test (hi-res falls back per row cap)
#
# At scale=2 the 32-physical hi-res sprite is 16 logical tall — exceeds
# the per-row cap (8 logical) — so two_row falls back to the 8×8 low-res
# version. Confirms that fallback path doesn't overflow.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
scale = 2
content_height = 20
loop_count = 1
hold_time = 4.0
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "two_row"
top_text = ":instagram: @brand"
top_color = [225, 48, 108]
top_align = "center"
bottom_text = ":bunny: bunny :star: star"
bottom_color = [255, 215, 0]
bottom_align = "center"
