# Hi-res emoji test config — Pi 5 bigsign.
#
# Cycles through every hi-res emoji (and one mixed-emoji message) so
# you can eyeball each design on real hardware. Use with the moonbunny
# brand palette but easy to repurpose.
#
# Hi-res emojis are 32×32 physical sprites that paint directly to the
# bigsign's LEDs (bypassing ScaledCanvas's 4×4 block expansion). Slugs
# with a hi-res variant: :moon: :instagram: :sun: :star: :email:
# Slugs WITHOUT a hi-res variant fall back to the 8×8 low-res sprite:
# :baseball: :taco: :flower: :cloud: :rain: :snow: :thunder: :fog:
#
# Mode is `swap` so each test message is its own held display unit.
# `content_height = 18` adds 2 rows of vertical breathing room — useful
# for two-row layouts and gives the centered single-row text some air.
#
# Copy to config.toml on the bigsign Pi:
#   cp config/config.hires_emoji_test.example.toml config/config.toml

# ---------------------------------------------------------------------------
# Display + RP1 performance tuning (matches config.bigsign.example.toml)
# ---------------------------------------------------------------------------

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
show_refresh = true
rp1_rio = 1

[title]
delay = 3

[transitions]
default = "cut"
duration = 0.4
easing = "linear"
between_sections = "dissolve"

# ---------------------------------------------------------------------------
# Section 1 — single hi-res emojis, one at a time
#
# Each message centers an 8-char label and the hi-res icon. Held for
# `hold_time` seconds, then dissolves to the next.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 4.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "HI-RES EMOJI"
color = [255, 240, 200]

[[playlist.section.widget]]
type = "message"
text = ":moon: moon"
font_color = [255, 220, 130]

[[playlist.section.widget]]
type = "message"
text = ":sun: sun"
font_color = [255, 220, 80]

[[playlist.section.widget]]
type = "message"
text = ":star: star"
font_color = [255, 215, 0]

[[playlist.section.widget]]
type = "message"
text = ":instagram: insta"
font_color = [255, 240, 200]

[[playlist.section.widget]]
type = "message"
text = ":email: email"
font_color = [255, 240, 200]

# ---------------------------------------------------------------------------
# Section 2 — side-by-side comparisons (multiple hi-res icons in one line)
#
# Tests that the layout system advances correctly past each hi-res
# sprite (logical_width=8 per emoji at scale=4). If any sprite renders
# at the wrong x position or overlaps text, this section makes it
# obvious.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 4.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "ROW TEST"
color = [180, 140, 230]

[[playlist.section.widget]]
type = "message"
text = ":sun: :moon: :star:"
font_color = [255, 240, 200]

[[playlist.section.widget]]
type = "message"
text = ":instagram: :email:"
font_color = [255, 150, 190]

# ---------------------------------------------------------------------------
# Section 3 — emojis WITH text (real-world usage pattern)
#
# Catches regressions in the cursor-advancement / measure_width path.
# The text following each emoji should sit cleanly to the right of the
# sprite with the standard EMOJI_PADDING (2 px) gap.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 4.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "EMOJI + TEXT"
color = [225, 48, 108]

[[playlist.section.widget]]
type = "message"
text = ":moon: Good night!"
font_color = [255, 240, 200]

[[playlist.section.widget]]
type = "message"
text = ":sun: Good morning"
font_color = [255, 220, 80]

[[playlist.section.widget]]
type = "message"
text = ":star: 5 stars"
font_color = [255, 215, 0]

[[playlist.section.widget]]
type = "message"
text = ":instagram: follow"
font_color = [255, 240, 200]

[[playlist.section.widget]]
type = "message"
text = ":email: contact"
font_color = [255, 240, 200]

# ---------------------------------------------------------------------------
# Section 4 — fallback check (low-res sprites that have NO hi-res variant)
#
# These should still render — through the regular 8×8 low-res path —
# even though they're on the bigsign. Confirms the auto-fallback works.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 4.0
transition = "dissolve"
transition_duration = 0.6

[playlist.section.title]
type = "message"
text = "LOW-RES FALLBACK"
color = [255, 240, 200]

[[playlist.section.widget]]
type = "message"
text = ":baseball: baseball"
font_color = [255, 255, 255]

[[playlist.section.widget]]
type = "message"
text = ":taco: taco"
font_color = [230, 160, 50]

[[playlist.section.widget]]
type = "message"
text = ":flower: flower"
font_color = [255, 150, 190]

[[playlist.section.widget]]
type = "message"
text = ":cloud: cloud"
font_color = [200, 200, 220]

[[playlist.section.widget]]
type = "message"
text = ":rain: rain"
font_color = [120, 180, 255]

# ---------------------------------------------------------------------------
# Section 5 — two-row layout test
#
# The two_row widget calls draw_with_emoji per row with explicit
# emoji_y values. Validates that hi-res sprites position correctly in
# both halves of a 20-tall logical canvas at scale=2.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
scale = 2
content_height = 20
loop_count = 1
hold_time = 4.0
transition = "dissolve"
transition_duration = 0.6

[[playlist.section.widget]]
type = "two_row"
top_text = ":moon: moonbunny :moon:"
top_color = [255, 220, 130]
top_align = "center"
bottom_text = "Hi-res emoji on the top row"
bottom_color = [255, 240, 200]
bottom_align = "left"

[[playlist.section.widget]]
type = "two_row"
top_text = ":instagram: @brand"
top_color = [225, 48, 108]
top_align = "center"
bottom_text = ":star: 5 stars from us :star:"
bottom_color = [255, 215, 0]
bottom_align = "center"
