# --- Lowres controls --------------------------------------------------------

# sailor_moon: no hi-res asset registered → renders as lowres Moon Stick wand.
[[playlist.section]]
mode = "swap"
hold_time = 2.0
loop_count = 2

  [playlist.section.transition]
  type = "sailor_moon"
  duration = 1.2

  [[playlist.section.widget]]
  type = "message"
  text = "sailor_moon (lowres)"
  font_color = [255, 150, 220]

# cut: baseline. Instant snap, no sprite.
[[playlist.section]]
mode = "swap"
hold_time = 2.0
loop_count = 2

  [playlist.section.transition]
  type = "cut"

  [[playlist.section.widget]]
  type = "message"
  text = "cut (baseline)"
  font_color = [255, 255, 255]
