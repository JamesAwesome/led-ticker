# ── Plugin dependencies ───────────────────────────────────────────────
# Requires these led-ticker plugins. Install via
# config/requirements-plugins.txt (copy requirements-plugins.example.txt)
# and rebuild before running:
#   led-ticker-flair     nyancat / pokeball / pacman / sailor_moon transitions (forward / .reverse / .alternating)
#   led-ticker-baseball  baseball.roll*
# Built-in widgets (message/clock/image/gif/two_row), color/border/emoji
# flair, and the foundational transitions need no plugins.
# ──────────────────────────────────────────────────────────────────────

# led-ticker hi-res transitions smoke test config
#
# Pokeball sections are first so you see them right away. Each section
# is a short TickerMessage so the *transition* is what you're watching.
#
# The baseball.roll* sections need the `led-ticker-baseball` plugin (add it to
# config/requirements-plugins.txt — the tracked .example already lists it).
#
# Run: led-ticker --config config/config.hires_transitions_test.example.toml

[display]
rows = 32
cols = 64
chain_length = 8
parallel = 1
pixel_mapper_config = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"
brightness = 60
gpio_slowdown = 3
hardware_mapping = "adafruit-hat"
default_scale = 4
pwm_bits = 8

[title]
delay = 2

[transitions]
default = "cut"
duration = 0.6
between_sections = "cut"

# --- Pacman family (currently lowres-only — preview before deciding on hires) ---

[[playlist.section]]
mode = "swap"
hold_time = 2.0
loop_count = 2

  [playlist.section.transition]
  type = "pacman.forward"
  duration = 1.5

  [[playlist.section.widget]]
  type = "message"
  text = "pacman LTR"
  font_color = [255, 220, 0]

[[playlist.section]]
mode = "swap"
hold_time = 2.0
loop_count = 2

  [playlist.section.transition]
  type = "pacman.reverse"
  duration = 1.5

  [[playlist.section.widget]]
  type = "message"
  text = "pacman RTL"
  font_color = [255, 100, 100]

[[playlist.section]]
mode = "swap"
hold_time = 2.0
loop_count = 2

  [playlist.section.transition]
  type = "pacman.alternating"
  duration = 1.5

  [[playlist.section.widget]]
  type = "message"
  text = "pacman alternating"
  font_color = [180, 255, 180]

  [[playlist.section.widget]]
  type = "message"
  text = "pacman alternating"
  font_color = [180, 180, 255]

