# led-ticker hi-res transitions smoke test config
#
# Pokeball sections are first so you see them right away. Each section
# is a short TickerMessage so the *transition* is what you're watching.
#
# Run: led-ticker --config config/config.hires_transitions_test.example.toml

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"
brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4
pwm_bits = 8
rp1_rio = 1

[title]
delay = 2

[transitions]
default = "cut"
duration = 0.6
between_sections = "cut"

# --- Baseball family --------------------------------------------------------

[[playlist.section]]
mode = "swap"
hold_time = 2.0
loop_count = 2

  [playlist.section.transition]
  type = "baseball"
  duration = 1.5

  [[playlist.section.widget]]
  type = "message"
  text = "baseball LTR"
  font_color = [255, 255, 255]

[[playlist.section]]
mode = "swap"
hold_time = 2.0
loop_count = 2

  [playlist.section.transition]
  type = "baseball_reverse"
  duration = 1.5

  [[playlist.section.widget]]
  type = "message"
  text = "baseball RTL"
  font_color = [200, 220, 255]

[[playlist.section]]
mode = "swap"
hold_time = 2.0
loop_count = 2

  [playlist.section.transition]
  type = "baseball_alternating"
  duration = 1.5

  [[playlist.section.widget]]
  type = "message"
  text = "baseball alternating"
  font_color = [180, 200, 255]

  [[playlist.section.widget]]
  type = "message"
  text = "baseball alternating"
  font_color = [255, 180, 200]

