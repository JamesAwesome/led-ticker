# Infini-scroll config — no transitions, content scrolls one at a time
# Usage: cp config/config.infini_scroll.toml config/config.toml

[display]
rows = 16
cols = 32
chain = 5
brightness = 60
slowdown_gpio = 2
gpio_mapping = "adafruit-hat"

[title]
delay = 5

# --- Messages ---

[[playlist.section]]
mode = "infini_scroll"
loop_count = 1

[playlist.section.title]
type = "message"
text = "#DevOps News"
color = "random"

[[playlist.section.widget]]
type = "message"
text = "May the Rabbit always be with you!"

[[playlist.section.widget]]
type = "message"
text = "Always be your bunny best!"

# --- Weather ---

[[playlist.section]]
mode = "infini_scroll"
loop_count = 1

[playlist.section.title]
type = "message"
text = "Weather"
color = "random"

[[playlist.section.widget]]
type = "weather"
text = "New York"
location = "New York"
units = "imperial"

