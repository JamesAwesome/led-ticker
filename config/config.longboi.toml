# ── Plugin dependencies ───────────────────────────────────────────────
# Requires these led-ticker plugins. Install via
# config/requirements-plugins.txt (copy requirements-plugins.example.txt)
# and rebuild before running:
#   led-ticker-weather   weather.current
#   led-ticker-rss       rss.feed
#   led-ticker-flair     nyancat / pokeball / pacman / sailor_moon / stickers /
#                        poker / fireworks / spinout / fairy transitions
#   led-ticker-baseball  baseball.scores/standings/statcast/attendance/promotions,
#                        baseball.roll*, :baseball.ball:
#   led-ticker-stocks    stocks.ticker
#   led-ticker-flight    flight.overhead
#   led-ticker-pool      pool.monitor
# Built-in widgets (message/clock/image/gif/two_row), color/border/emoji
# flair, and the foundational transitions need no plugins.
# ──────────────────────────────────────────────────────────────────────

# led-ticker configuration — longboi (512×64 canvas)
#
# 4× Muen P2 128×64 panels chained horizontally = 512×64 physical.
# Driven by a Raspberry Pi 5 through an Adafruit RGB Matrix Bonnet (3211).
# No pixel_mapper_config needed — single horizontal chain_length, left-to-right.
#
# These panels use 1/32 scan with an FM6126A (or compatible) driver IC.
# panel_type = "FM6126A" sends the required initialization sequence at startup;
# without it the driver powers up in a bad state and the bottom half of each
# panel renders mirrored or garbled.
#
# default_scale = 4 means all widgets draw at a logical 128×16 canvas and the
# ScaledCanvas wrapper expands every pixel to a 4×4 real block on the 64-tall
# panel. Same layout model as bigsign; hires fonts, hires emoji, and hires
# sprite transitions (pokeball, baseball.roll, nyancat) all activate automatically.

[display]
rows = 64
cols = 128
chain_length = 4
brightness = 60
default_scale = 4
hardware_mapping = "adafruit-hat"
panel_type = "FM6126A"
# Muen P2 panels wire HUB75 G-pin → Red LED, R-pin → Blue LED, B-pin → Green LED.
led_rgb_sequence = "BRG"

# Pi 5 RP1 RIO backend (the library default; faster refresh, slightly
# more CPU than PIO). RIO requires row_address_type = 0 (default) — do
# not set row_address_type = 1. Raise gpio_slowdown if flicker persists.
gpio_slowdown = 5
pwm_bits = 7     # 7-bit PWM: tuned for camera; default is 11
limit_refresh_rate_hz = 100   # caps refresh to stabilise image on camera

[title]
delay = 5

[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = {type = "nyancat.alternating", duration = 4.0}

