# ── Plugin dependencies ───────────────────────────────────────────────
# Requires these led-ticker plugins. Install via
# config/requirements-plugins.txt (copy requirements-plugins.example.txt)
# and rebuild before running:
#   led-ticker-baseball  baseball.scores, baseball.roll*, :baseball.ball:
# Built-in widgets (message/clock/image/gif/two_row), color/border/emoji
# flair, and the foundational transitions need no plugins.
# ──────────────────────────────────────────────────────────────────────

# MLB scores testing config
# Requires the `led-ticker-baseball` plugin (baseball.scores/baseball.standings
# widgets + baseball.roll* transition). Add it to config/requirements-plugins.txt
# — the tracked .example already lists it.
# Usage: cp config/config.mlb.toml config/config.toml

[display]
rows = 16
cols = 32
chain_length = 5
brightness = 60
gpio_slowdown = 2
hardware_mapping = "adafruit-hat"

[title]
delay = 5

[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = {type = "baseball.roll_alternating", duration = 2.0}

# --- MLB Scores (slideshow mode) ---

[[playlist.section]]
mode = "slideshow"
transition = "baseball.roll_alternating"
transition_duration = 2.0
hold_time = 6
loop_count = 0

[playlist.section.title]
type = "message"
text = ":baseball.ball: MLB Scores"
font_color = "random"

[[playlist.section.widget]]
type = "baseball.scores"
team = "PHI"
timezone = "America/New_York"

[[playlist.section.widget]]
type = "baseball.scores"
team = "NYM"
timezone = "America/New_York"
