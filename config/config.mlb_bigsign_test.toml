# MLB hires smoketest — bigsign (256×64 canvas)
#
# Exercises the mlb and mlb_standings widgets at scale=4 (hires path).
# Both layout modes (ticker + scoreboard) are covered.
# Usage: cp config/config.mlb_bigsign_test.toml config/config.toml

[display]
rows = 32
cols = 64
chain_length = 8
parallel = 1
pixel_mapper_config = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"
brightness = 60
default_scale = 4
hardware_mapping = "adafruit-hat"
gpio_slowdown = 3
rp1_rio = 1
pwm_bits = 8

[title]
delay = 5

[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = {type = "baseball_alternating", duration = 3.2, transition_fps = 40}

# --- MLB Scores (ticker layout) ---

[[playlist.section]]
mode = "swap"
transition = "baseball_alternating"
transition_duration = 3.2
transition_fps = 40
hold_time = 8
loop_count = 0

[playlist.section.title]
type = "message"
text = ":baseball: MLB Scores :baseball:"
font = "Inter-Regular"
font_size = 32
font_threshold = 80
font_color = "random"

[[playlist.section.widget]]
type = "mlb"
team = "PHI"
timezone = "America/New_York"
font = "Inter-Regular"
font_size = 32
font_threshold = 80

[[playlist.section.widget]]
type = "mlb"
team = "NYM"
timezone = "America/New_York"
font = "Inter-Regular"
font_size = 32
font_threshold = 80

[[playlist.section.widget]]
type = "mlb"
team = "LAD"
timezone = "America/Los_Angeles"
font = "Inter-Regular"
font_size = 32
font_threshold = 80

[[playlist.section.widget]]
type = "mlb"
team = "NYY"
timezone = "America/New_York"
font = "Inter-Regular"
font_size = 32
font_threshold = 80

