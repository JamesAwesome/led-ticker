# MLB scores infini_scroll config — each game scrolls fully before next
# Usage: cp config/config.mlb_infini.toml config/config.toml

[display]
rows = 16
cols = 32
chain = 5
brightness = 60
slowdown_gpio = 2
gpio_mapping = "adafruit-hat"

[title]
delay = 5

# --- MLB Scores (infini_scroll) ---

[[playlist.section]]
mode = "infini_scroll"
loop_count = 0

[playlist.section.title]
type = "message"
text = "MLB Scores"
font_color = "random"

[[playlist.section.widget]]
type = "mlb"
team = "PHI"
timezone = "America/New_York"

[[playlist.section.widget]]
type = "mlb"
team = "NYM"
timezone = "America/New_York"
