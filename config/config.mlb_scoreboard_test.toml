# ── Plugin dependencies ───────────────────────────────────────────────
# Requires these led-ticker plugins. Install via
# config/requirements-plugins.txt (copy requirements-plugins.example.txt)
# and rebuild before running:
#   led-ticker-baseball  baseball.scores, baseball.standings, baseball.roll*, :baseball.ball:
# Built-in widgets (message/clock/image/gif/two_row), color/border/emoji
# flair, and the foundational transitions need no plugins.
# ──────────────────────────────────────────────────────────────────────

# MLB scoreboard layout test config — longboi (512×64 canvas, logical 128×16)
#
# Tests layout = "scoreboard" mode at hires scale=4.
# Requires the `led-ticker-baseball` plugin (baseball.scores/baseball.standings
# widgets + baseball.roll* transition; see config/requirements-plugins.txt.example).
# Usage: cp config/config.mlb_scoreboard_test.toml config/config.toml

[display]
rows = 64
cols = 128
chain_length = 4
brightness = 60
default_scale = 4
hardware_mapping = "adafruit-hat"
panel_type = "FM6126A"
led_rgb_sequence = "BRG"
gpio_slowdown = 5
pwm_bits = 7
limit_refresh_rate_hz = 100

[title]
delay = 5

[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = {type = "baseball.roll_alternating", duration = 3.2, transition_fps = 40}

# --- MLB Scoreboard ---

[[playlist.section]]
mode = "swap"
transition = "baseball.roll_alternating"
transition_duration = 3.2
transition_fps = 40
hold_time = 8
loop_count = 1

[playlist.section.title]
type = "message"
text = ":baseball.ball: MLB Scoreboard :baseball.ball:"
font = "Inter-Regular"
font_size = 32
font_threshold = 80
font_color = "random"

[[playlist.section.widget]]
type = "baseball.scores"
team = "PHI"
layout = "scoreboard"
timezone = "America/New_York"
font = "Inter-Regular"
font_size = 32
font_threshold = 80
small_font = "Inter-Regular"
small_font_size = 20
small_font_threshold = 80

[[playlist.section.widget]]
type = "baseball.scores"
team = "NYM"
layout = "scoreboard"
timezone = "America/New_York"
font = "Inter-Regular"
font_size = 32
font_threshold = 80
small_font = "Inter-Regular"
small_font_size = 20
small_font_threshold = 80

[[playlist.section.widget]]
type = "baseball.scores"
team = "LAD"
layout = "scoreboard"
timezone = "America/Los_Angeles"
font = "Inter-Regular"
font_size = 32
font_threshold = 80
small_font = "Inter-Regular"
small_font_size = 20
small_font_threshold = 80

# --- MLB Standings ---

[[playlist.section]]
mode = "swap"
transition = "push_left"
transition_duration = 0.5
hold_time = 30
loop_count = 1

[playlist.section.title]
type = "message"
text = ":baseball.ball: MLB Standings :baseball.ball:"
font = "Inter-Regular"
font_size = 32
font_threshold = 80
font_color = "random"

[[playlist.section.widget]]
type = "baseball.standings"
font = "Inter-Regular"
font_size = 32
font_threshold = 80
