# ---------------------------------------------------------------------------
# Section 3 — Current promotion
#
# Update the headline as registrations open / events change. The `loop_count`
# is bumped to 3 so this rotates more often than the steady-state sections.
# ---------------------------------------------------------------------------

[[playlist.section]]
