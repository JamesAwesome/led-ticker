# Moon Bunny Aerial — store-window display config for the Pi 5 bigsign.
#
# 8× P3 32×64 panels in a 2×4 vertical-serpentine layout → 64×256 logical canvas.
# Brand colors pulled from moonbunnyaerial.com (soft pink, lavender, cream).
# Site: https://www.moonbunnyaerial.com  •  IG: @moonbunnyaerial  •
# info@moonbunnyaerial.com
#
# Copy to config.toml on the bigsign Pi: `cp config/config.moonbunny.example.toml config/config.toml`

# ---------------------------------------------------------------------------
# Display + RP1 performance tuning (matches config.bigsign.example.toml)
# ---------------------------------------------------------------------------

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
show_refresh = true
rp1_rio = 1

[title]
delay = 5

# Soft dissolves between sections suit the brand's gentle aesthetic better
# than push transitions. Keep within-section transitions snappy.
[transitions]
default = "push_left"
duration = 0.5
easing = "ease_in_out"
between_sections = "dissolve"

# ---------------------------------------------------------------------------
# Brand color palette (RGB, eyeballed for LED display warmth)
# Reference these in widget `font_color = [...]` lines below.
#
#   moon_pink     = [255, 150, 190]    soft brand pink — primary
#   lavender      = [180, 140, 230]    moonlight purple — secondary
#   cream         = [255, 240, 200]    warm white — backgrounds / titles
#   magenta       = [225,  48, 108]    Instagram brand pink — for IG copy
#   sky           = [120, 180, 255]    cool accent — for variety
#
# Tip: at brightness=60, very dark colors disappear — keep RGB > 100 for
# readable text.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Section 1 — Hero / brand
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "forever_scroll"
loop_count = 2

[playlist.section.title]
type = "message"
text = "MOON BUNNY AERIAL"
color = [255, 150, 190]   # moon_pink

[[playlist.section.widget]]
type = "message"
text = "Aerial for Every Body"
font_color = [255, 240, 200]   # cream

[[playlist.section.widget]]
type = "message"
text = "Find Your Strength * Find Your Community"
font_color = [180, 140, 230]   # lavender

# ---------------------------------------------------------------------------
# Section 2 — What we offer
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "forever_scroll"
loop_count = 2

[playlist.section.title]
type = "message"
text = "Classes for All"
color = [180, 140, 230]   # lavender

[[playlist.section.widget]]
type = "message"
text = "Kids and Adult Classes - All Levels!"
font_color = [255, 240, 200]

[[playlist.section.widget]]
type = "message"
text = "Try Something New * Get Stronger * Build Choreo"
font_color = [255, 150, 190]

[[playlist.section.widget]]
type = "message"
text = "Beginner Friendly :flower: Family Friendly :star: Every Body Friendly"
