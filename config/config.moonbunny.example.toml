# Moon Bunny Aerial — store-window display config (Pi 5 bigsign).
#
# Hung in a building window at street level, viewable from across the street.
# 8× P3 32×64 panels in 2×4 vertical-serpentine = 256×64 logical.
# Brand: Beloved Sans + Inter, lavender / pink / sky / cream palette.
# Site: https://www.moonbunnyaerial.com  •  IG: @moonbunnyaerial
#
# Far-viewing distance ⇒ all text uses hires fonts at 24-32px (no BDF).

# ---------------------------------------------------------------------------
# Display + RP1 performance tuning (matches config.bigsign.example.toml)
# ---------------------------------------------------------------------------

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
show_refresh = true
rp1_rio = 1

[title]
delay = 5

# Playful, animated transitions matching the warm/empowering brand voice.
# `wipe_alternating` cycles through directions using brand-colored sweep
# lines; `pokeball_alternating` is the section divider — a fun cue that
# something new is starting.
[transitions]
default = "wipe_alternating"
duration = 0.8
easing = "ease_in_out"
between_sections = "pokeball_alternating"
# Brand-tinted wipe color pool: lavender, pink, sky, cream
transition_colors = [[189, 169, 234], [255, 176, 240], [124, 173, 232], [254, 255, 204]]

# ---------------------------------------------------------------------------
# Brand color palette (from brand_guide.png)
#
#   lavender_primary = [189, 169, 234]   BDA9EA — the brand's signature lavender
#   pink             = [255, 176, 240]   FFB0F0 — soft pink accent
#   sky              = [124, 173, 232]   7CADE8 — cool blue accent
#   navy             = [10,  74, 137]    0A4A89 — deep blue (high contrast)
#   teal             = [11, 126, 135]    0B7E87 — secondary depth
#   cream            = [254, 255, 204]   FEFFCC — warm white, body text
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Section 1 — Logo hero (full-panel banner with rainbow border)
#
# Uses logo_banner_color.png — already laid out as horizontal lockup:
# moon icon + "MOON BUNNY AERIAL" + "AERIAL FOR EVERYBODY" tagline.
# letterbox fit means tiny black bars top/bottom; rainbow border frames it.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 6.0
transition = "dissolve"
transition_duration = 1.0

[[playlist.section.widget]]
type = "image"
path = "assets/logo_banner_color.png"
fit = "letterbox"
hold_seconds = 6.0
border = {style = "rainbow", thickness = 2, speed = 3, char_offset = 5}

# ---------------------------------------------------------------------------
# Section 2 — Brand voice
#
# Beloved Sans Bold @ 28px reads from across the street. Lavender + pink
# alternate as the headline color. Each line gets its own widget so the
# transition fires between them.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 2
hold_time = 3.5

[[playlist.section.widget]]
type = "message"
text = "Find Your Strength"
font = "beloved-sans-bold"
font_size = 28
font_threshold = 80
font_color = [189, 169, 234]   # lavender_primary

[[playlist.section.widget]]
type = "message"
text = "Find Your Community"
font = "beloved-sans-bold"
font_size = 28
font_threshold = 80
font_color = [255, 176, 240]   # pink

[[playlist.section.widget]]
