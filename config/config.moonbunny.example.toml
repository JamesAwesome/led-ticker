# ---------------------------------------------------------------------------
# Section 4 — Follow us
#
# Inline emoji slugs render pixel art icons (8x8) inline with text. The
# Instagram icon ships in its iconic magenta; the envelope ships in white.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "forever_scroll"
