# pika_wave_transparent.gif (220×220) pillarboxed on the left at scale=4
# native res; scrolling text "KIDS SUMMER CAMPS — NOW ENROLLING" walks
# across the panel with the rainbow border chasing around the perimeter.
# Transition pinned to pokeball_alternating per the user's request.
# ---------------------------------------------------------------------------

