# Moon Bunny Aerial — store-window display config (Pi 5 bigsign).
#
# Hung in a building window at street level, viewable from across the street.
# 8× P3 32×64 panels in 2×4 vertical-serpentine = 256×64 logical.
# Brand: Beloved Sans + Inter, lavender / pink / sky / cream palette.
# Site: https://www.moonbunnyaerial.com  •  IG: @moonbunnyaerial
#
# Far-viewing distance ⇒ all text uses hires fonts at 24-32px (no BDF).

# ---------------------------------------------------------------------------
# Display + RP1 performance tuning (matches config.bigsign.example.toml)
# ---------------------------------------------------------------------------

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
show_refresh = true
rp1_rio = 1

[title]
delay = 5

# Playful, animated transitions matching the warm/empowering brand voice.
# `wipe_alternating` cycles through directions using brand-colored sweep
# lines; `pokeball_alternating` is the section divider — a fun cue that
# something new is starting.
[transitions]
default = "wipe_alternating"
duration = 0.8
easing = "ease_in_out"
between_sections = "pokeball_alternating"
# Brand-tinted wipe color pool: lavender, pink, sky, cream
transition_colors = [[189, 169, 234], [255, 176, 240], [124, 173, 232], [254, 255, 204]]

# ---------------------------------------------------------------------------
# Brand color palette (from brand_guide.png)
#
#   lavender_primary = [189, 169, 234]   BDA9EA — the brand's signature lavender
#   pink             = [255, 176, 240]   FFB0F0 — soft pink accent
#   sky              = [124, 173, 232]   7CADE8 — cool blue accent
#   navy             = [10,  74, 137]    0A4A89 — deep blue (high contrast)
#   teal             = [11, 126, 135]    0B7E87 — secondary depth
#   cream            = [254, 255, 204]   FEFFCC — warm white, body text
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Section 1 — Logo hero (full-panel banner with rainbow border)
#
# Uses logo_banner_color.png — already laid out as horizontal lockup:
# moon icon + "MOON BUNNY AERIAL" + "AERIAL FOR EVERYBODY" tagline.
# letterbox fit means tiny black bars top/bottom; rainbow border frames it.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 6.0
transition = "dissolve"
transition_duration = 1.0
scale = 2                # without this, content_height = 16 logical max
content_height = 32      # 32 × scale 2 = 64 real = full panel height (at ceiling)

[[playlist.section.widget]]
type = "gif"
path = "assets/logo_rainbow.gif"
fit = "letterbox"
image_align = "left"
top_text = "Moon Bunny "
top_row_height = 16      # 16 × scale 2 = 32 real → just fits Inter-Bold @ 25 (line-height 32)
top_font = "Inter-Bold"
top_font_size = 25
top_color = "rainbow"
top_align = "right"

bottom_text = "Aerial For Everybody "
bottom_font = "Inter-Bold"
bottom_font_size = 19
bottom_color = "rainbow"
bottom_align = "right"

gif_loops = 21
border = {style = "rainbow", thickness = 2, speed = 3, char_offset = 5}

# ---------------------------------------------------------------------------
# Section 2 — "MOONBUNNY" double rainbow hold
#
# Static hold at large size with rainbow per-char text AND rainbow border
# chasing around the perimeter — two rainbows. The :moon: + :bunny:
# emoji slugs render the hires moon and bunny sprites at native scale.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 30.0
transition = "dissolve"
transition_duration = 0.8

[[playlist.section.widget]]
type = "message"
text = ":moon: :bunny:"
font = "beloved-sans-bold"
font_size = 26
font_threshold = 80
font_color = "rainbow"
border = {style = "rainbow", thickness = 2, speed = 4, char_offset = 6}

# ---------------------------------------------------------------------------
# Section 3 — "Find Your" combined scroll
#
# logo_moon_only.png pillarboxed on the left; the three brand phrases
# walk BEHIND the moon (text_align="scroll" — image painted on top with
# skip-black, so text shows through the transparent regions of the
# moon's halo and disappears behind the moon body itself). Per-char
# lavender → pink gradient gives the ombre look.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "forever_scroll"
start_hold = 0.0
loop_count = 4
transition = "sailor_moon"
transition_duration = 2.0
separator = " :heart_blue: "

[[playlist.section.widget]]
type = "message"
text = "Find Your Strength  :heart:  Find Your Community  :heart_green:  Aerial for Everybody"
font = "Inter-Bold"
font_size = 48
font_color = {style = "gradient", from = [189, 169, 234], to = [255, 176, 240]}
border = {style = "constant", color = [255, 176, 240], thickness = 2}

# ---------------------------------------------------------------------------
# Section 3 — Kids Summer Camps  (with Pikachu wave + rainbow border)
#
# pika_wave_transparent.gif (220×220) pillarboxed on the left at scale=4
# native res; scrolling text "KIDS SUMMER CAMPS — NOW ENROLLING" walks
# across the panel with the rainbow border chasing around the perimeter.
# Transition pinned to pokeball_alternating per the user's request.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 8.0
transition = "pokeball_alternating"
transition_duration = 1.5

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave_transparent.gif"
fit = "pillarbox"
image_align = "left"
text = "KIDS SUMMER CAMPS  :star:  NOW ENROLLING  :star:  ALL AGES WELCOME"
text_wrap = true
text_align = "scroll"
text_separator = " :star: "
scroll_speed_ms = 30
text_loops = 8
font = "Inter-Bold"
font_size = 48
font_threshold = 80
font_color = [255, 176, 240]   # pink — pops against pikachu yellow
border = {style = "rainbow", thickness = 2, speed = 3, char_offset = 5}

# ---------------------------------------------------------------------------
# Section 4 — K-pop dance class (promo)
#
# kpop-dance.webp (540×400 ≈ 1.35:1) pillarboxed on the left. Inter-Bold
# at 26 reads cleanly across the street (more open shapes than Beloved
# Sans at this size). text_align="scroll_over" paints the video first
# then the text — so the marquee walks IN FRONT of the dance footage,
# guaranteed visible regardless of frame brightness (kpop-dance.webp
# has no transparent regions).
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "forever_scroll"
start_hold = 0.0
loop_count = 4
transition = "nyancat_alternating"
transition_duration = 2.0
separator = " * "
separator_font = "hunters_kpop"
separator_font_size = 62
separator_color = [225, 48, 108]

[[playlist.section.widget]]
type = "message"
text = "K-POP DANCE CLASS  *  NOW OPEN  *  ALL LEVELS"
font = "hunters_kpop"
font_size = 62
font_threshold = 128
font_color = {style = "gradient", from = [225, 48, 108], to = [120, 90, 220]}
border = {style = "constant", color = [120, 90, 220], thickness = 2}

