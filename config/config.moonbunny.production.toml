#
# One discipline per beat. Cycles through: Aerial Silks, Lyra, Flow Props,
# Ballet, Dance, All Levels — using brand color rotation.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 4
hold_time = 3.0

[playlist.section.title]
type = "message"
text = "Classes"
font = "Inter-Bold"
font_size = 48
color = [189, 169, 234]   # lavender

[[playlist.section.widget]]
type = "message"
text = "Aerial Silks"
font = "Inter-Bold"
font_size = 48
font_color = [255, 176, 240]   # pink

[[playlist.section.widget]]
type = "message"
text = "Lyra"
font = "Inter-Bold"
font_size = 48
font_color = [124, 173, 232]   # sky

[[playlist.section.widget]]
type = "message"
text = "Flow Props"
font = "Inter-Bold"
font_size = 48
font_color = [254, 255, 204]   # cream

[[playlist.section.widget]]
type = "message"
text = "Ballet"
font = "Inter-Bold"
font_size = 48
font_color = [255, 176, 240]   # pink

[[playlist.section.widget]]
type = "message"
text = "Dance"
font = "Inter-Bold"
font_size = 48
font_color = [124, 173, 232]   # sky

[[playlist.section.widget]]
type = "message"
text = "All Levels"
font = "Inter-Bold"
font_size = 48
font_color = [254, 255, 204]   # cream

# ---------------------------------------------------------------------------
# Section 6 — Welcoming / inclusion (combined scroll)
#
# All three phrases on one continuous marquee with a per-char
# pink → cream → lavender ColorCycle so the whole line cycles
# through the brand palette as it scrolls.
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 1
transition = "sailor_moon_alternating"
transition_duration = 0.6

[[playlist.section.widget]]
type = "gif"
path = "assets/pride_trans.gif"
fit = "stretch"
text = "Beginner Friendly - Kid Friendly - Everybody Friendly"
text_align = "scroll_over"
text_wrap = true
text_separator = " - "
text_loops = 10
font = "best_love"
font_size = 42
font_color = [0, 0, 0]
scroll_speed_ms = 50

# ---------------------------------------------------------------------------
# Section 7 — IG handle two-row (storefront-window layout)
#
# scale=2 ⇒ 128 logical px wide so "@moonbunnyaerial" fits on the held
# top row. content_height=20 gives 2 rows of breathing space between
# the two text bands. Inter-Bold for the handle (matches the IG look),
# Inter-Regular for the bottom promo line (lighter weight reads as
# secondary copy from across the street).
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "swap"
loop_count = 3
transition = "cut"
transition_duration = 1.0
scale = 2                # without this, content_height = 16 logical max
content_height = 32      # 32 × scale 2 = 64 real = full panel height (at ceiling)

[[playlist.section.widget]]
type = "two_row"
top_text = ":instagram: @moonbunnyaerial"
top_color = [225, 48, 108]   # IG brand magenta
top_align = "center"
top_font = "Inter-Bold"
top_font_size = 22
top_font_threshold = 128
bottom_text = "Now booking spring classes — all levels welcome!"
bottom_text_loops = 3
bottom_text_scroll = "scroll_through"
bottom_color = [254, 255, 204]
bottom_align = "left"
bottom_font = "Inter-Regular"
bottom_font_size = 24
bottom_font_threshold = 128

[[playlist.section.widget]]
type = "two_row"
top_text = ":instagram: @moonbunnyaerial"
top_color = [225, 48, 108]
top_align = "center"
top_font = "Inter-Bold"
top_font_size = 22
top_font_threshold = 128
bottom_text = "Kids Summer Camps now enrolling — sign up today!"
