bottom_text_scroll = "scroll_through"
bottom_color = [189, 169, 234]
bottom_align = "left"
bottom_font = "Inter-Regular"
bottom_font_size = 24
bottom_font_threshold = 128

# ---------------------------------------------------------------------------
# Section 8 — Connect (combined scroll: site + email + IG handle)
# ---------------------------------------------------------------------------

[[playlist.section]]
mode = "forever_scroll"
start_hold = 0.0
loop_count = 4
hold_time = 0.5
