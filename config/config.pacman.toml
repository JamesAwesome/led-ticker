# ── Plugin dependencies ───────────────────────────────────────────────
# Requires these led-ticker plugins. Install via
# config/requirements-plugins.txt (copy requirements-plugins.example.txt)
# and rebuild before running:
#   led-ticker-flair  pacman.forward / .reverse / .alternating
# Built-in widgets (message/clock/image/gif/two_row), color/border/emoji
# flair, and the foundational transitions need no plugins.
# ──────────────────────────────────────────────────────────────────────

# Pac-Man testing config — tests pacman transition
# Usage: cp config/config.pacman.toml config/config.toml

[display]
rows = 16
cols = 32
chain_length = 5
brightness = 60
gpio_slowdown = 2
hardware_mapping = "adafruit-hat"

[title]
delay = 3

[transitions]
between_sections = {type = "pacman.alternating", duration = 3.0}

# --- pacman (long text) ---
[[playlist.section]]
mode = "swap"
transition = "pacman.forward"
transition_duration = 3.0
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "PACMAN start"

[[playlist.section.widget]]
type = "message"
text = "A wizard quickly jinxed the gnomes before they could cast any powerful spells on the sleeping villagers nearby"

[[playlist.section.widget]]
type = "message"
text = "pacman DONE"

# --- pacman (short text) ---
[[playlist.section]]
mode = "swap"
transition = "pacman.forward"
transition_duration = 3.0
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "Waka waka waka"

[[playlist.section.widget]]
type = "message"
text = "Power pellet!"

# --- pacman_reverse ---
[[playlist.section]]
mode = "swap"
transition = "pacman.reverse"
transition_duration = 3.0
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "Reverse chase"

[[playlist.section.widget]]
type = "message"
text = "Run ghosts run!"

# --- restart ---
[[playlist.section]]
mode = "swap"
hold_time = 3
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "--- RESTARTING ---"
