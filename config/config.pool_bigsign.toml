# Pool widget — bigsign (256×64) hardware testing config (two_row layout)
#
# The pool widget is now the `led-ticker-pool` plugin (type = "pool.monitor").
# Install it for this config to work (the repo Dockerfile already does this):
#   pip install "git+https://github.com/JamesAwesome/led-ticker-pool.git@main"
# (the repo's Dockerfile already installs it; entry-point auto-registers it).
#
# 8× P3 32×64 panels in a 2×4 vertical-serpentine = 256×64 logical.
# Driven by a Raspberry Pi 5 through an Adafruit RGB Matrix HAT.
#
# Single section, single pool widget in two_row mode. Cycles 4
# screens: title → today → 7-day → season. 7-day and season each
# show HI/LO combined on the bottom row (e.g. "84/72F"). Hi-res
# Inter-Bold sized per the moonbunny.production reference (top
# label smaller, bottom value larger). Section-level `scale = 2`
# + `content_height = 32` doubles real pixels per logical row so
# the larger font sizes fit without overflowing per-row bands.
# Cyan label_color matches longboi/smallsign for visual consistency.
#
# Usage:
#   cp config/config.pool_bigsign.toml config/config.toml
#   # Make sure .env defines INFLUXDB_TOKEN (and URL/ORG/BUCKET if not default):
#   #   INFLUXDB_URL=http://pool_monitor:8086
#   #   INFLUXDB_ORG=pool
#   #   INFLUXDB_BUCKET=pool_temps
#   #   INFLUXDB_TOKEN=...
#   docker compose up

[display]
rows = 32
cols = 64
chain_length = 8
parallel = 1

# Vertical-serpentine mapping. See https://docs.ledticker.dev/hardware/bigsign/
pixel_mapper_config = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
default_scale = 4

hardware_mapping = "adafruit-hat"

# Pi 5 RP1 tuning (matches config.bigsign.example.toml).
gpio_slowdown = 3
pwm_bits = 8
show_refresh_rate = true

[[playlist.section]]
mode = "swap"
# Drop to scale = 2 + content_height = 32 (matches moonbunny.production
# pattern): doubles real pixels per logical row so Inter-Bold at
# 19/25 fits the per-row bands. At default_scale = 4 with
# content_height = 16, the bands are only 8 logical rows / 32 real,
# which can't fit Inter-Bold at sizes above ~16 without overflowing
# the font's line-height budget.
scale = 2
content_height = 32   # 32 × scale 2 = 64 real = full panel height
hold_time = 5
loop_count = 0        # infinite — soak test

[[playlist.section.widget]]
type = "pool.monitor"
title = "POOL TEMPS"
units = "imperial"
update_interval = 60   # fast: prove the background fetch fires every minute
# sensor_id = "12345"  # optional; omit to use cross-sensor global aggregate
stale_after = 14400  # 4 hours
layout = "two_row"
# Inter-Bold sized per moonbunny.production:
#   bottom_font_size = 25 → line-height ~32 real, fits the 32-real
#                            bottom band at top_row_height = 16
#                            (symmetric default split).
#   top_font_size    = 19 → line-height ~24 real, smaller label
#                            reads as secondary above the value.
font = "Inter-Bold"
font_size = 25   # base size; bottom inherits, top_font_size overrides
font_threshold = 80
top_font_size = 19
# label_color tints "POOL 24H" / "POOL 7D" / "POOL SEASON" prefix labels.
label_color = [130, 220, 255]
