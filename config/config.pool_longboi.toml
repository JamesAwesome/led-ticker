# Pool widget — longboi hardware testing config
#
# The pool widget is now the `led-ticker-pool` plugin (type = "pool.monitor").
# Install it for this config to work (the repo Dockerfile already does this):
#   pip install "git+https://github.com/JamesAwesome/led-ticker-pool.git@main"
# (the repo's Dockerfile already installs it; entry-point auto-registers it).
#
# Longboi = 4× Muen P2 128×64 panels chained horizontally = 512×64 physical.
# Driven by a Raspberry Pi 5 through an Adafruit RGB Matrix Bonnet (3211).
# No pixel_mapper_config — single horizontal chain, left to right.
#
# Display block matches config.longboi.toml verbatim — same panel_type init
# (FM6126A), same BRG wiring, same Pi 5 RP1 tuning. Single section, single
# pool widget, infinite loop — soak-test the title → today → 7-day → season
# cycle and watch the `pool: ...` INFO log confirm update() is firing.
#
# Usage:
#   cp config/config.pool_longboi.toml config/config.toml
#   # Make sure .env defines INFLUXDB_TOKEN (and URL/ORG/BUCKET if not default):
#   #   INFLUXDB_URL=http://pool_monitor:8086
#   #   INFLUXDB_ORG=pool
#   #   INFLUXDB_BUCKET=pool_temps
#   #   INFLUXDB_TOKEN=...
#   docker compose up

[display]
rows = 64
cols = 128
chain_length = 4
brightness = 60
default_scale = 4
hardware_mapping = "adafruit-hat"
panel_type = "FM6126A"
# Muen P2 panels wire HUB75 G-pin → Red LED, R-pin → Blue LED, B-pin → Green LED.
led_rgb_sequence = "BRG"

# Pi 5 RP1 RIO backend (matches config.longboi.toml).
gpio_slowdown = 5
rp1_rio = 1
pwm_bits = 7
limit_refresh_rate_hz = 100
show_refresh_rate = true

[[playlist.section]]
mode = "swap"
hold_time = 5
loop_count = 0  # infinite — soak test

[[playlist.section.widget]]
type = "pool.monitor"
title = "POOL TEMPS"
units = "imperial"
update_interval = 60   # fast: prove the background fetch fires every minute
# sensor_id = "12345"  # optional; omit to use the only/first sensor in the bucket
stale_after = 14400  # 4 hours
# Hires text — sized for a dedicated full-panel display on longboi's 512×64.
# font_size = 32 fills half the panel height (32 real px on a 64-tall panel)
# so the temperature value is legible from across the pool. Matches the
# "single widget gets a big size" convention; raise to 48 if you want it
# bigger still (the Season HI ../LO .. screen is the longest at ~14 chars
# and stays under 512px wide even at 32).
font = "Inter-Regular"
font_size = 32
font_threshold = 80
# Icy cyan for the "Pool 24h" / "Pool 7D" / "Pool Season" prefix labels
# and separators. Default is white — tweak the RGB to taste (raise the
# blue channel for cooler, raise the red for more lavender).
label_color = [130, 220, 255]
