# ── Plugin dependencies ───────────────────────────────────────────────
# Requires these led-ticker plugins. Install via
# config/requirements-plugins.txt (copy requirements-plugins.example.txt)
# and rebuild before running:
#   led-ticker-pool  pool.monitor
# Built-in widgets (message/clock/image/gif/two_row), color/border/emoji
# flair, and the foundational transitions need no plugins.
# ──────────────────────────────────────────────────────────────────────

# Pool widget — smallsign hardware testing config
#
# The pool widget is the `led-ticker-pool` plugin (type = "pool.monitor").
# Install it by adding the led-ticker-pool line from
# config/requirements-plugins.example.txt to config/requirements-plugins.txt and
# rebuilding; entry-point discovery auto-registers it.
# `led-ticker plugins` should then list the `pool` namespace and `pool.monitor`
# widget. No [plugins] block is needed — entry-point discovery is on by default.
#
# 160×16 logical canvas, 5× 32×16 panels chained, default_scale = 1.
# Single section, single pool widget, infinite loop — soak-test the
# title → today → 7-day → season cycle and watch the periodic INFO log
# ("pool: N stories ...") confirm update() is firing.
#
# Usage:
#   cp config/config.pool_smallsign.toml config/config.toml
#   # Make sure .env defines INFLUXDB_TOKEN (and URL/ORG/BUCKET if not default):
#   #   INFLUXDB_URL=http://pool_monitor:8086
#   #   INFLUXDB_ORG=pool
#   #   INFLUXDB_BUCKET=pool_temps
#   #   INFLUXDB_TOKEN=...
#   docker compose up

[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60
gpio_slowdown = 2
hardware_mapping = "adafruit-hat"

[[playlist.section]]
mode = "swap"
hold_time = 5
loop_count = 0  # infinite — soak test

[[playlist.section.widget]]
type = "pool.monitor"
title = "POOL TEMPS"
units = "imperial"
update_interval = 60   # fast: prove the background fetch fires every minute
# sensor_id = "12345"  # optional; omit to use the only/first sensor in the bucket
stale_after = 14400  # 4 hours
# Icy cyan for the "Pool 24h" / "Pool 7D" / "Pool Season" prefix labels
# and separators. Matches the longboi config — default is white if omitted.
label_color = [130, 220, 255]
# Note: no `font` knob here. Smallsign uses default_scale=1 and the default
# BDF font fits the 16-tall panel cleanly. Bumping to hires Inter would
# cost CPU without a visible gain at this size. The longest screen is
# "Pool Season HI 95  LO 72" (~24 chars × 6 px BDF = 144 px) which fits
# the 160-wide panel with center=True; no scroll needed.
