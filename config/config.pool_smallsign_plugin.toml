# Pool widget — smallsign hardware testing config (PLUGIN variant)
#
# Identical to config.pool_smallsign.toml except the widget type is
# `pool.monitor` (the extracted led-ticker-pool plugin) instead of the built-in
# `pool`. Use this to validate the extracted plugin on real hardware against a
# real InfluxDB while the built-in `pool` widget still exists as a fallback:
# the only difference between the two configs is the `type` line, so any visual
# or behavioral divergence is attributable to the extraction.
#
# Requires the led-ticker-pool plugin installed (the Dockerfile installs it via
# the led_ticker.plugins entry point; `led-ticker plugins` should list the
# `pool` namespace and `pool.monitor` widget). No [plugins] block is needed —
# entry-point discovery is on by default.
#
# 160×16 logical canvas, 5× 32×16 panels chained, default_scale = 1.
# Single section, single pool widget, infinite loop — soak-test the
# title → today → 7-day → season cycle and watch the periodic INFO log
# ("pool: N stories ...") confirm update() is firing.
#
# Usage:
#   cp config/config.pool_smallsign_plugin.toml config/config.toml
#   # Make sure .env defines INFLUXDB_TOKEN (and URL/ORG/BUCKET if not default):
#   #   INFLUXDB_URL=http://10.47.0.172:8086
#   #   INFLUXDB_ORG=pool
#   #   INFLUXDB_BUCKET=pool_temps
#   #   INFLUXDB_TOKEN=...
#   docker compose up --build   # --build to bake in the plugin install

[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60
gpio_slowdown = 2
hardware_mapping = "adafruit-hat"

[[playlist.section]]
mode = "swap"
hold_time = 5
loop_count = 0  # infinite — soak test

[[playlist.section.widget]]
type = "pool.monitor"  # extracted plugin (was: type = "pool")
title = "POOL TEMPS"
units = "imperial"
update_interval = 60   # fast: prove the background fetch fires every minute
# sensor_id = "12345"  # optional; omit to use the only/first sensor in the bucket
stale_after = 14400  # 4 hours
# Icy cyan for the "Pool 24h" / "Pool 7D" / "Pool Season" prefix labels
# and separators. Matches the longboi config — default is white if omitted.
label_color = [130, 220, 255]
# Note: no `font` knob here. Smallsign uses default_scale=1 and the default
# BDF font fits the 16-tall panel cleanly. Bumping to hires Inter would
# cost CPU without a visible gain at this size. The longest screen is
# "Pool Season HI 95  LO 72" (~24 chars × 6 px BDF = 144 px) which fits
# the 160-wide panel with center=True; no scroll needed.
