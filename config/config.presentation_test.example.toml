# 14. plain-text image widget + rainbow — exercises the non-emoji
# per-char path on _BaseImageWidget._draw_text. Tripwires the C1 fix:
# without it, a gif overlay with rainbow + no `:slug:` rendered as a
# single sweeping hue. Should show per-character rainbow letters
# moving over Pikachu, just like §3 but without the taco sprites.
[[playlist.section]]
mode = "gif"
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave_transparent.gif"
fit = "pillarbox"
text = "PLAIN TEXT RAINBOW"
text_align = "scroll_over"
font_color = "rainbow"
scroll_speed_ms = 50
text_loops = 1

# 15. two-row image widget + rainbow — exercises _draw_row_text
# per-char path. Both rows get a rainbow that survives even with
# distinct text per row. Pikachu underneath; held top, scrolling
# bottom on overflow.
[[playlist.section]]
mode = "gif"
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave_transparent.gif"
fit = "pillarbox"
top_text = "TOP RAINBOW"
bottom_text = "BOTTOM RAINBOW SCROLLS"
font = "5x8"
font_color = "rainbow"
scroll_speed_ms = 50

# 16. HiresFont + emoji + per-char rainbow — the only matrix combo
# §1–§13 don't cover. Inter-Bold @ 24 with `:taco:` slugs and rainbow
# sweeping continuously across emoji boundaries (per-char index
# advances across slugs, sprites paint at hires bigsign size).
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "16: hires + emoji + rainbow"
font_color = [200, 220, 255]

[[playlist.section.widget]]
type = "message"
text = ":taco: HIRES :taco:"
font = "Inter-Bold"
font_size = 24
font_color = "rainbow"

# 17. RSS feed (1 story, rainbow) — exercises forever_scroll mode +
# the RSSFeedMonitor widget. Pulled from the smallsign config example.
# `max_stories = 1` limits the section to a single headline. The new
# `font_color = "rainbow"` knob (replaces the legacy 3-color cycle
# when set) paints every story per-character rainbow.
[[playlist.section]]
mode = "forever_scroll"
loop_count = 1

[playlist.section.title]
type = "message"
text = "Nintendo Life"
font_color = "random"

[[playlist.section.widget]]
type = "rss_feed"
feed_url = "https://www.nintendolife.com/feeds/news"
max_stories = 1
font_color = "rainbow"
update_interval = 3000
