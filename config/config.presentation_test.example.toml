# Presentation effects smoke test — Pi 5 bigsign.
#
# Validates the new font_color (color provider) + animation knobs
# on bigsign. Replaces the legacy presentation = "..." wrapper.
#
# Sections (the first four are what's NEW on this branch):
#   1. rainbow + emoji body              — per-char rainbow sweeps across :slug: boundaries
#   2. rainbow title + body              — title color = "rainbow" (provider on title)
#   3. image widget + rainbow + emoji    — gif overlay text with per-char + sprite emoji
#   4. typewriter + rainbow              — animation + per-char provider compose
#
#   5. animation = "typewriter"          — chars type out left-to-right (BDF)
#   6. font_color = "color_cycle"        — whole-string hue rotation (BDF)
#   7. font_color = "rainbow"            — per-char rainbow showcase (BDF)
#   8. font_color = {style="gradient",..} — left-to-right red→blue gradient (BDF)
#   9. font_color = "rainbow" + Countdown — different widget type (BDF)
#  10. font_color = "color_cycle" + Weather — live-data text recoloring (BDF)
#  11. HiresFont + rainbow                — Inter-Bold per-char rainbow
#  12. HiresFont + gradient               — Inter-Regular left-to-right gradient
#  13. HiresFont + typewriter             — Inter-Bold types out one char at a time
#  14. image widget + rainbow (no emoji)  — non-emoji per-char path on gif overlay
#  15. two-row image widget + rainbow     — per-row per-char path on gif overlay
#  16. HiresFont + emoji + rainbow        — full hires + per-char + sprite combo
#  17. RSS feed (1 story)                  — forever_scroll mode + RSSFeedMonitor
#
# §1 (rainbow + emoji): the rainbow sweeps continuously across
# emoji boundaries — each `:taco:` renders as the taco sprite, the
# letters between/around it get their own rainbow hues with
# char_index advancing across emoji segments without resetting.
#
# §2 (title rainbow): titles accept the same `color` shapes as widget
# `font_color` — string shorthand (`"rainbow"`, `"color_cycle"`),
# inline tables (`{style="gradient", from=[...], to=[...]}`), or the
# legacy `[r, g, b]` constant.
#
# §3 (image widget + rainbow + emoji): gif/image widgets' text overlay
# now also sweeps per-char across slugs — same fix as §1 but applied
# to `_BaseImageWidget._draw_text`. Pikachu sprite underneath, taco
# slugs render correctly as sprites, the letters between get their
# own rainbow hues.
#
# §4 (typewriter + rainbow): chars type out left-to-right AND each
# visible char carries its own rainbow hue that sweeps over time.
# Animation slices `visible_text`; the per-char provider runs against
# the slice. Final state matches §7 (full rainbow message).

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
rp1_rio = 1

[title]
delay = 0.5

[transitions]
default = "cut"
duration = 0.2
easing = "linear"
between_sections = "cut"

# 1. rainbow + emoji body — per-char sweep continues across :slug: boundaries
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "1: rainbow + emoji"
font_color = [200, 220, 255]

[[playlist.section.widget]]
type = "message"
text = ":taco: HOT TACOS :taco:"
font_color = "rainbow"

# 2. rainbow title + body — color provider on the title widget itself
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "2: TITLE RAINBOW"
font_color = "rainbow"

[[playlist.section.widget]]
type = "message"
text = "title above is animated"
font_color = [255, 220, 50]

# 3. image widget + rainbow + emoji — gif overlay text uses provider through draw_with_emoji
[[playlist.section]]
mode = "gif"
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave_transparent.gif"
fit = "pillarbox"
text = ":taco: PIKA :taco:"
text_align = "scroll_over"
font_color = "rainbow"
scroll_speed_ms = 50
text_loops = 1

# 4. typewriter + rainbow — animation slices visible_text, per-char
# rainbow runs against the slice. Each new char appears with the
# current rainbow hue at its index, and the whole pattern keeps
# sweeping over time. Final state matches §7's full rainbow.
[[playlist.section]]
mode = "swap"
