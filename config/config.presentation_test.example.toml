# Presentation effects smoke test — Pi 5 bigsign.
#
# Validates the new font_color (color provider) + animation knobs
# on bigsign. Replaces the legacy presentation = "..." wrapper.
#
# Sections:
#   1. animation = "typewriter"           — chars type out left-to-right
#   2. font_color = "color_cycle"         — whole-string hue rotation
#   3. font_color = "rainbow"             — per-char rainbow showcase
#   4. font_color = {style="gradient",..} — left-to-right red→blue gradient
#   5. font_color = "rainbow" + Countdown — different widget type
#   6. font_color = "color_cycle" + Weather — live-data text recoloring
#   7. font_color = "rainbow" + emoji     — tripwire (slug renders as letters)
#
# v1 limit: per_char providers (rainbow, gradient) don't penetrate
# `:slug:` emoji segments — slugs render as colored letters. Filed,
# not yet fixed.

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
rp1_rio = 1

[title]
delay = 0.5

[transitions]
default = "cut"
duration = 0.2
easing = "linear"
between_sections = "cut"

# 1. typewriter
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "1: typewriter"
color = [200, 220, 255]

[[playlist.section.widget]]
type = "message"
text = "TYPING NOW"
font_color = [255, 220, 50]
animation = "typewriter"

# 2. color_cycle
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "2: color_cycle"
color = [200, 220, 255]

[[playlist.section.widget]]
type = "message"
text = "WHOLE TEXT CYCLES HUE"
font_color = "color_cycle"

# 3. rainbow
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "3: rainbow"
color = [200, 220, 255]

[[playlist.section.widget]]
type = "message"
text = "RAINBOW PER-CHARACTER"
font_color = "rainbow"

# 4. gradient — left-to-right color interpolation
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "4: gradient"
color = [200, 220, 255]

[[playlist.section.widget]]
type = "message"
text = "RED TO BLUE GRADIENT"
font_color = {style = "gradient", from = [255, 0, 0], to = [0, 100, 255]}

# 5. rainbow + countdown
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "5: rainbow + countdown"
color = [200, 220, 255]

[[playlist.section.widget]]
type = "countdown"
message = "Days to NYE"
countdown_date = 2027-01-01
font_color = "rainbow"

# 6. color_cycle + weather
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "6: color_cycle + weather"
color = [200, 220, 255]

[[playlist.section.widget]]
type = "weather"
message = "Brooklyn"
location = "Brooklyn"
units = "imperial"
font_color = "color_cycle"

# 7. rainbow + emoji (tripwire — slugs render as letters)
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "7: rainbow + emoji"
color = [200, 220, 255]

[[playlist.section.widget]]
type = "message"
text = ":taco: HOT TACOS :taco:"
font_color = "rainbow"
