# Presentation effects smoke test — Pi 5 bigsign.
#
# Validates the new font_color (color provider) + animation knobs
# on bigsign. Replaces the legacy presentation = "..." wrapper.
#
# Sections:
#   1. animation = "typewriter"           — chars type out left-to-right (BDF)
#   2. font_color = "color_cycle"         — whole-string hue rotation (BDF)
#   3. font_color = "rainbow"             — per-char rainbow showcase (BDF)
#   4. font_color = {style="gradient",..} — left-to-right red→blue gradient (BDF)
#   5. font_color = "rainbow" + Countdown — different widget type (BDF)
#   6. font_color = "color_cycle" + Weather — live-data text recoloring (BDF)
#   7. font_color = "rainbow" + emoji     — rainbow over text + sprite emoji
#   8. HiresFont + rainbow                — Inter-Bold per-char rainbow
#   9. HiresFont + gradient               — Inter-Regular left-to-right gradient
#  10. HiresFont + typewriter             — Inter-Bold types out one char at a time
#
# §7 sweeps the rainbow continuously across emoji boundaries — each
# `:taco:` renders as the taco sprite, the letters between/around it
# get their own rainbow hues with char_index advancing across emoji
# segments without resetting.
#
# Hires sections (8-10) validate that ColorProvider materialization
# works on the HiresFont render path. HiresFont's draw_text reads
# .red/.green/.blue from the materialized Color (not the provider
# object), so the per-tick `provider.color_for(...) → Color` step has
# to fire correctly for these to work.

[display]
rows = 32
cols = 64
chain = 8
parallel = 1
pixel_mapper = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
slowdown_gpio = 3
gpio_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8
rp1_rio = 1

[title]
delay = 0.5

[transitions]
default = "cut"
duration = 0.2
easing = "linear"
between_sections = "cut"

# 1. typewriter
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[playlist.section.title]
type = "message"
text = "1: typewriter"
color = [200, 220, 255]

[[playlist.section.widget]]
type = "message"
text = "TYPING NOW"
font_color = [255, 220, 50]
animation = "typewriter"

# 2. color_cycle
[[playlist.section]]
