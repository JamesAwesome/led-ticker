# Rainbow border smoke test — Pi 5 bigsign.
#
# Validates the `border` field across every widget type that supports
# it. Top half (§1–§7) covers image widgets — the new feature on
# feat/image-borders, which extends border support to GifPlayer and
# StillImage across all 4 render paths. Bottom half (§8–§15) covers
# the original TickerMessage / TickerCountdown / TwoRowMessage paths
# (introduced on feat/rainbow-border).
#
# All sections use cut transitions and short hold_times so iteration
# on the bigsign is fast: edit config, restart container, observe in
# seconds instead of waiting through the full showroom playlist.
#
# Sections (image widgets — feat/image-borders):
#   1. still + rainbow border, no text         — `_play_no_text` slow path
#   2. still + constant border, no text        — `_play_no_text` fast path
#   3. still + border + scrolling text         — `_render_tick` skip-black scroll
#   4. gif + rainbow border, no text           — `_play_no_text` 50ms cadence
#   5. gif + border + held text                — `_render_tick` non-scroll path
#   6. still + rainbow border + RAINBOW text   — per-char provider on image
#   7. gif + rainbow border + COLOR_CYCLE text — whole-string animated provider
#
# Sections (text widgets — pre-existing):
#   8. defaults                      — rainbow chase, default tunables
#   9. rainbow border + rainbow text — chase against per-char rainbow letters
#  10. border + bg_color             — yellow bg, black text, rainbow frame
#  11. tuned: faster + thicker       — speed=8, char_offset=12, thickness=2
#  12. constant color border         — non-animated red ring (sanity check)
#  13. inline table form             — full kwargs in one place for reference
#  14. two-row + rainbow border      — handle + tagline + frame at scale=2
#  15. scrolling text + border       — overflow scroll keeps border animating
#  16. typewriter + loop_count=3     — visit-reset positive test (negation of §4-§7)
#  17. typewriter + rainbow border   — both compose simultaneously (per-effect counters)
#  18. rainbow border + rainbow text + typewriter — three independent frame systems
#
# Tunables to compare on hardware:
#   - speed         — degrees of hue per frame. Higher = faster chase.
#                     Default 4 ≈ 12s revolution at 50ms ticks.
#   - char_offset   — degrees of hue per perimeter-pixel. Higher = more
#                     compact rainbow, more cycles around the panel.
#                     Default 6 ≈ 60 cycles around 640-pixel bigsign.
#   - thickness     — 1 (default) or 2 pixel ring.
#
# What to watch for on §1–§7 (image-border-specific):
#   - Chase MUST stay uniform across §4, §5, §7 regardless of the
#     gif's native frame durations — the GifPlayer 50ms refactor
#     ensures the rainbow ticks at engine cadence, not gif-frame
#     cadence. If §4's chase looks slower/jerkier than §1's, the
#     refactor regressed.
#   - §2 should NOT enter a per-tick redraw loop — it's the fast
#     path (constant border, frame-invariant). If you see redraw
#     cost there, the fast-path gate regressed.
#   - §3's border must remain visible at the panel edges even where
#     the image silhouette covers the rest of the panel — border
#     paints LAST in skip-black scroll mode (image → text behind →
#     border on top).
#   - §6 and §7 exercise color providers on image widgets:
#       §6 — per-char rainbow text + rainbow border = two
#         INDEPENDENT rainbow systems on one panel. The text sweep
#         (indexed by char position) and border chase (indexed by
#         perimeter pixel) advance at different visual rates.
#       §7 — whole-string color_cycle text + rainbow border. The
#         font_color provider is `frame_invariant=False`, which
#         forces the per-tick loop on the bordered gif path —
#         catches regressions in the `color_is_static` part of the
#         fast-path gate.

[display]
rows = 32
cols = 64
chain_length = 8
parallel = 1
pixel_mapper_config = "Remap:256,64|192,32n|192,0n|128,32n|128,0n|64,32n|64,0n|0,32n|0,0n"

brightness = 60
gpio_slowdown = 3
hardware_mapping = "adafruit-hat"
default_scale = 4

pwm_bits = 8

[title]
delay = 0.5

[transitions]
default = "cut"
duration = 0.2
easing = "linear"
between_sections = "cut"

# ===========================================================================
# IMAGE WIDGET BORDERS — feat/image-borders
# ===========================================================================
# §1–§7 exercise the 4 paint sites added by the image-borders feature
# plus 2 color-provider variants:
#   - StillImage._play_no_text (§1, §2)
#   - _render_tick scroll/skip-black (§3, §6)
#   - GifPlayer._play_no_text (§4)
#   - _render_tick non-scroll (§5, §7)
#   - per-char rainbow text on bordered image (§6)
#   - whole-string color_cycle text on bordered gif (§7)
# ===========================================================================

# ---------------------------------------------------------------------------
# 1. Still + rainbow border, no text — `StillImage._play_no_text` slow path.
#    A bordered logo with no text overlay forces the new per-tick loop
#    (the fast path bypasses when border is non-frame-invariant). Watch
#    the chase advance smoothly at engine 50ms cadence over the hold.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "image"
path = "assets/bunny-transparent.png"
fit = "pillarbox"
image_align = "center"
hold_time = 7.0
border = "rainbow"

# ---------------------------------------------------------------------------
# 2. Still + constant border, no text — `_play_no_text` fast path preserved.
#    Constant border is `frame_invariant=True` so the fast path stays
#    valid: paint once, sleep, return. No per-tick loop overhead. The
#    border holds steady red while the still hangs.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "image"
path = "assets/bunny-transparent.png"
fit = "pillarbox"
image_align = "center"
hold_time = 7.0
border = [220, 50, 50]

# ---------------------------------------------------------------------------
# 3. Still + rainbow border + scrolling text — `_render_tick` skip-black
#    scroll mode. Order: text drawn → image's non-black pixels overlay
#    (text walks BEHIND silhouette) → border on top. Border MUST stay
#    visible at panel edges even where the image is opaque — if the
#    border vanishes behind the image's bounding box, the paint order
#    regressed.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "image"
path = "assets/bunny-transparent.png"
fit = "pillarbox"
image_align = "center"
text = "TEXT WALKS BEHIND THE BUNNY"
text_align = "scroll"
font = "Inter-Bold"
font_size = 16
font_color = [255, 255, 255]
scroll_speed_ms = 40
hold_time = 8.0
border = "rainbow"

# ---------------------------------------------------------------------------
# 4. GIF + rainbow border, no text — `GifPlayer._play_no_text` 50ms
#    refactor. The gif's native frame durations are typically 100ms;
#    the refactor ticks at engine 50ms regardless, picking the right
#    gif frame from elapsed wall-clock via `_pick_frame_for_elapsed`.
#    The chase here MUST advance at the same cadence as §1 (also 50ms)
#    — if it looks slower or jerkier, the cadence refactor regressed.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 3
transition = "cut"

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave_transparent.gif"
fit = "pillarbox"
image_align = "center"
play_count = 3
border = "rainbow"

# ---------------------------------------------------------------------------
# 5. GIF + rainbow border + held text — `_render_tick` non-scroll path
#    on a multi-frame source. Tests the per-tick loop (gif frames
#    advance, border chases, text holds at left). Border paints
#    AFTER image AND BEFORE text — text overlaps border on collision.
#    `loop_count = 3` × `loops = 3` exercises the visit-reset
#    fix: the rainbow chase phase MUST advance continuously across
#    the 3 inner loop iterations (no snap back to phase 0).
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 3
transition = "cut"

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave_transparent.gif"
fit = "pillarbox"
image_align = "left"
text = "PIKA"
text_align = "right"
font = "Inter-Bold"
font_size = 16
font_color = [255, 220, 80]
play_count = 3
border = "rainbow"

# ---------------------------------------------------------------------------
# 6. Still + rainbow border + RAINBOW scrolling text — per-char color
#    provider on a bordered image. Two independent rainbow systems on
#    one panel: the border's perimeter chase (indexed by perimeter
#    pixel, advancing per frame) and the text's per-char rainbow
#    (indexed by character position, also advancing per frame, but
#    with a different cycle period). Skip-black scroll mode means
#    rainbow text walks behind the bunny silhouette while the border
#    frames the panel on top. Catches regressions in either provider
#    surviving the bordered render path.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 8.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "image"
path = "assets/bunny-transparent.png"
fit = "pillarbox"
image_align = "center"
text = "DOUBLE RAINBOW THROUGH THE BUNNY"
text_align = "scroll"
font = "Inter-Bold"
font_size = 16
font_color = "rainbow"
scroll_speed_ms = 40
hold_time = 8.0
border = "rainbow"

# ---------------------------------------------------------------------------
# 7. GIF + rainbow border + COLOR_CYCLE held text — whole-string
#    animated provider on a bordered gif. ColorCycle is
#    `frame_invariant=False`, which forces the per-tick loop on the
#    bordered gif path even with held (non-scrolling) text — exercises
#    the `color_is_static` part of the fast-path gate predicate.
#    Watch the text cycle through colors smoothly while the gif
#    animates AND the border chases — three independent frame-driven
#    systems on one panel.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 3
transition = "cut"

[[playlist.section.widget]]
type = "gif"
path = "assets/pika_wave_transparent.gif"
fit = "pillarbox"
image_align = "left"
text = "CYCLE"
text_align = "right"
font = "Inter-Bold"
font_size = 16
font_color = "color_cycle"
play_count = 3
border = "rainbow"

# ===========================================================================
# TEXT WIDGET BORDERS — feat/rainbow-border (pre-existing)
# ===========================================================================
# §8–§15 are the original border smoke tests that shipped on
# feat/rainbow-border. Kept in place for regression coverage.
# ===========================================================================

# ---------------------------------------------------------------------------
# 8. Defaults — `border = "rainbow"` shorthand, plain white text inside.
#    Establishes the baseline look. Watch the chase speed and density;
#    this is what tunables in later sections diverge from.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "message"
text = "DEFAULTS"
font = "Inter-Bold"
font_size = 24
font_color = [255, 255, 255]
border = "rainbow"

# ---------------------------------------------------------------------------
# 9. Border + rainbow text — chase plays against per-char rainbow letters.
#    Two independent rainbow systems on one panel: the perimeter chase
#    (frame-driven, indexed by perimeter pixel) and the per-character
#    rainbow letters (frame-driven, indexed by char_index). They have
#    independent params; expect the chase to feel slower than the text
#    sweep at default speeds.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "message"
text = "DOUBLE RAINBOW"
font = "Inter-Bold"
font_size = 24
font_color = "rainbow"
border = "rainbow"

# ---------------------------------------------------------------------------
# 10. Border + bg_color — bright yellow fill, BLACK text, rainbow frame.
#    The §8 showroom configuration in a focused beat. Three independent
#    color systems: bg fills every non-text pixel (yellow), text reads
#    as cut-out negative (black), border chases rainbow around the edge.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 1
transition = "cut"
bg_color = [255, 230, 80]

[[playlist.section.widget]]
type = "message"
text = "BUILT TO BE SEEN"
font = "Inter-Bold"
font_size = 24
font_color = [0, 0, 0]
border = "rainbow"

# ---------------------------------------------------------------------------
# 11. Tuned variant — speed=8, char_offset=12, thickness=2.
#    Faster chase, denser rainbow, thicker ring. Compare visually
#    against §1's defaults to feel the parameter space. If you want
#    the showroom to use this tune instead of the defaults, copy the
#    inline table into showroom §8.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "message"
text = "TUNED"
font = "Inter-Bold"
font_size = 24
font_color = [255, 255, 255]
border = {style = "rainbow", speed = 8, char_offset = 12, thickness = 2}

# ---------------------------------------------------------------------------
# 12. Constant-color border — solid red ring, no animation.
#    Sanity check on the non-rainbow path. `frame_invariant=True`
#    means this border never animates — the perimeter holds steady
#    red while the text inside can do whatever (color_cycle here for
#    contrast against the static frame).
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "message"
text = "CONSTANT"
font = "Inter-Bold"
font_size = 24
font_color = "color_cycle"
border = [220, 50, 50]

# ---------------------------------------------------------------------------
# 13. Inline-table form — explicit kwargs for copy-paste reference.
#    Equivalent to `border = "rainbow"` but spells out every default.
#    Useful as a starting template if you want to fork off and tune
#    per-section without remembering the exact knob names.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 7.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "message"
text = "INLINE TABLE"
font = "Inter-Bold"
font_size = 24
font_color = [255, 255, 255]
border = {style = "rainbow", speed = 4, char_offset = 6, thickness = 1}

# ---------------------------------------------------------------------------
# 14. Two-row brand layout + rainbow border.
#    Mirrors a storefront window: handle on top, scrolling tagline on
#    bottom, rainbow chase framing the whole panel. The border paints
#    at REAL panel resolution (256x64 on bigsign) regardless of the
#    section's scale=2 wrapper — it frames the SIGN edge, not the
#    logical 128x32 canvas. `:instagram:` falls back to lowres in the
#    top row because TwoRow caps inline emoji at 8 logical rows
#    (existing `EMOJI_ROW_CAP` constraint, not a border issue) — the
#    showcase here is the border + two-row composition.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
scale = 2
content_height = 32
hold_time = 7.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "two_row"
top_text = ":instagram: @ledticker"
top_color = [225, 48, 108]
top_align = "center"
top_font = "Inter-Bold"
top_font_size = 14
bottom_text = "Storefronts, lobbies, stages"
bottom_color = [255, 240, 200]
bottom_align = "center"
bottom_font = "Inter-Regular"
bottom_font_size = 14
border = "rainbow"

# ---------------------------------------------------------------------------
# 15. Scrolling text + border — overflow behavior.
#    Text is intentionally too long for the canvas so the engine
#    enters the scroll path. Border must:
#      - keep animating during the scroll loop (advance_frame fires
#        per tick on the scroll engine path),
#      - re-paint cleanly every tick so the scroll redraw doesn't
#        leave torn-edge artifacts where the border was last frame,
#      - hold its chase phase across the pre-scroll hold → scroll
#        → post-scroll hold transitions within the section.
#    If you see the border freeze, tear, or skip phases during this
#    section, something in the engine's redraw contract regressed.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 6.0
loop_count = 1
transition = "cut"

[[playlist.section.widget]]
type = "message"
text = "A LONG SCROLLING MESSAGE TO TEST THE BORDER"
font = "Inter-Bold"
font_size = 24
font_color = [255, 255, 255]
border = "rainbow"

# ---------------------------------------------------------------------------
# 16. Typewriter + loop_count = 3 — visit-reset POSITIVE test.
#     Negation of §4/§5/§7: those sections verified that continuous-
#     phase effects (rainbow / color_cycle / RainbowChaseBorder) opt
#     OUT of visit-reset and keep their phase across loop_count
#     boundaries. This section tests the opposite: Typewriter has
#     `restart_on_visit = True` (the default), so it MUST retype on
#     each of 3 inner loops. If the message types out only once and
#     then holds for the remaining 2 loops, the visit-reset fix
#     accidentally opted typewriter out — regression on the user-
#     facing Q1 answer ("re-type each loop").
#
#     Watch for: 3 distinct typing animations, each starting from an
#     empty panel and finishing with the full message. Total runtime
#     ≈ 9s (3s × 3 loops).
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 3.0
loop_count = 3
transition = "cut"

[[playlist.section.widget]]
type = "message"
text = "TYPING ON LOOP"
font = "Inter-Bold"
font_size = 24
font_color = [255, 220, 80]
animation = "typewriter"
# Constant border: doesn't set restart_on_visit (default True via
# getattr fallback), so it does NOT block the typewriter reset.
# Visible frame around the panel without altering the test purpose.
border = [80, 200, 255]

# ---------------------------------------------------------------------------
# 17. Typewriter + RainbowChaseBorder — both effects compose
#     simultaneously after the per-effect counter refactor.
#     Watch for: 3 distinct typing animations (typewriter retypes
#     each loop) AND a continuously-advancing rainbow chase around
#     the perimeter (no phase snap-back).
#
#     This was a documented tradeoff in PR #11 ("composition rule:
#     ANY opt-out wins") that became a positive test after the per-
#     effect counter refactor landed. The widget's primary
#     `_frame_count` resets per visit (typewriter restarts), while
#     `_effect_frames["border"]` keeps climbing (chase phase
#     preserved). Both work as designed because each effect has
#     its own counter following its own restart_on_visit policy.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 3.0
loop_count = 3
transition = "cut"

[[playlist.section.widget]]
type = "message"
text = "TYPING WITH RAINBOW"
font = "Inter-Bold"
font_size = 24
font_color = [255, 255, 255]
animation = "typewriter"
border = "rainbow"

# ---------------------------------------------------------------------------
# 18. Three frame-driven systems on one widget — completeness test.
#     - Border: rainbow chase (continuous phase, restart_on_visit=False)
#     - Animation: typewriter (restart per loop, restart_on_visit=True)
#     - Color: rainbow text per-char (continuous, restart_on_visit=False)
#
#     Each system has its own per-effect counter following its own
#     restart_on_visit policy. Watch for ALL three working
#     simultaneously across `loop_count = 3`:
#       - chars type out one-by-one (typewriter retypes each loop)
#       - each char renders in continuously-sweeping rainbow colors
#         (color sweep advances across loops, no reset)
#       - perimeter chase advances continuously (no phase snap-back)
#
#     If the typewriter were affecting the color/border counters we
#     wouldn't see the smooth color sweep across loops; if the
#     border counter were affecting typewriter we wouldn't see the
#     retype. Independence verified by visual inspection.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 3.0
loop_count = 3
transition = "cut"

[[playlist.section.widget]]
type = "message"
text = "RAINBOW CHASE TYPE"
font = "Inter-Bold"
font_size = 24
font_color = "rainbow"
animation = "typewriter"
border = "rainbow"

# ---------------------------------------------------------------------------
# 19. Typewriter on image: caption types in over a held still.
#     Three-effect composition: typewriter (restart_on_visit=True) +
#     rainbow font color + rainbow border (both restart_on_visit=False)
#     on the SAME image widget. Border keeps its chase phase across
#     loop_count > 1; font rainbow sweeps continuously; caption retypes
#     each loop. The architectural payoff of PR #12 extended to image
#     widgets.
#
#     Watch for:
#       - "HELLO!" types out one char at a time, restarting each loop
#       - each char renders in continuously-sweeping rainbow (color
#         sweep advances ACROSS loops — chars don't reset to the same
#         hue on each retype)
#       - perimeter chase advances continuously (no phase snap-back
#         when typewriter restarts)
#
#     image_align = "right" pillarboxes the bunny on the right side so
#     the caption has clear panel space on the left to type into.
# ---------------------------------------------------------------------------
[[playlist.section]]
mode = "swap"
hold_time = 6
loop_count = 3
transition = "cut"

[[playlist.section.widget]]
type = "image"
path = "assets/bunny-transparent.png"
fit = "pillarbox"
image_align = "right"
text = "HELLO!"
text_align = "left"
font = "Inter-Bold"
font_size = 24
animation = "typewriter"
font_color = "rainbow"
border = "rainbow"
