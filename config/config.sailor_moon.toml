# ── Plugin dependencies ───────────────────────────────────────────────
# Requires these led-ticker plugins. Install via
# config/requirements-plugins.txt (copy requirements-plugins.example.txt)
# and rebuild before running:
#   led-ticker-arcade  arcade.sailor_moon_alternating
# Built-in widgets (message/clock/image/gif/two_row), color/border/emoji
# flair, and the foundational transitions need no plugins.
# ──────────────────────────────────────────────────────────────────────

# Sailor Moon transition testing config
# Usage: cp config/config.sailor_moon.toml config/config.toml

[display]
rows = 16
cols = 32
chain_length = 5
brightness = 60
gpio_slowdown = 2
hardware_mapping = "adafruit-hat"

[title]
delay = 5

[transitions]
default = "arcade.sailor_moon_alternating"
duration = 2.0
easing = "linear"
between_sections = {type = "arcade.sailor_moon_alternating", duration = 2.0}

# --- Messages (sailor_moon transition) ---

[[playlist.section]]
mode = "swap"
transition = "arcade.sailor_moon_alternating"
transition_duration = 2.0
hold_time = 4
loop_count = 0

[playlist.section.title]
type = "message"
text = "Sailor Moon Test"
font_color = "random"

[[playlist.section.widget]]
type = "message"
text = "In the name of the Moon, I'll punish you!"

[[playlist.section.widget]]
type = "message"
text = "Moon Prism Power, Make Up!"

[[playlist.section.widget]]
type = "message"
text = "Moon Tiara Action!"

[[playlist.section.widget]]
type = "message"
text = "Moon Healing Escalation!"
