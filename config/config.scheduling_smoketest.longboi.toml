# Plugin dependencies: none — built-in (core) widgets & transitions only.

# Visibility-scheduling smoke-test — longboi (512×64 canvas), Docker
#
# 4× Muen P2 128×64 panels chained horizontally = 512×64 physical.
# Hardware validation for widget/section `schedule = {...}` (PR #391) on the
# longboi. Bigsign variant: config.scheduling_smoketest.bigsign.toml. Every check below uses complementary AM/PM half-day
# windows (00:00–12:00 vs 12:00–00:00), so the config is observable at ANY
# time of day: exactly ONE widget of each pair matches your wall clock.
#
# THE KEY CHECK is section 1: of "AM WIDGET" / "PM WIDGET", the one matching
# the panel's local clock must show and the other must NEVER appear across
# repeated playlist cycles. If both show, the widget gate is broken; if
# neither shows, the panel should be reading section 2/3 content instead
# (an empty rotation would mean the gate dropped both — also broken).
#
# Before running: `led-ticker validate config/config.scheduling_smoketest.toml`
# must print "visibility schedules evaluate at HH:MM (America/New_York)" with
# a time that matches a wall clock in that zone — if it shows UTC-ish drift,
# fix the container TZ / [display] timezone before trusting anything below.
# (Docker containers default to UTC — this config pins [display] timezone,
# so the note must show America/New_York wall time regardless.)
#
# Usage:
#   cp config/config.scheduling_smoketest.longboi.toml config/config.toml
#   docker compose up
#
# DARK-PATH CHECK (manual, via hot-reload): edit section 1 so BOTH widgets use
# the SAME half-day window that does NOT match the current time, and comment
# out sections 2–4. Within two playlist cycles (~2s — the panel debounces one
# all-out cycle before committing, so a content flap doesn't leak a
# framebuffer) the panel must go DARK (blank, not stale/frozen) and the log
# must show ONE line:
#   "schedule: every section is outside its schedule window — panel dark"
# Revert, and it must wake with:
#   "schedule: panel waking — re-checking sections"
# A frozen last frame or log spam per second means the all-scheduled-out idle
# regressed.

[display]
rows = 64
cols = 128
chain_length = 4
brightness = 60
default_scale = 4
hardware_mapping = "adafruit-hat"
panel_type = "FM6126A"
led_rgb_sequence = "BRG"
gpio_slowdown = 5
pwm_bits = 7
limit_refresh_rate_hz = 100
# One clock for ALL schedules (visibility + brightness). Every window below is
# evaluated in this zone, not the container's TZ (usually UTC in Docker).
timezone = "America/New_York"

[title]
delay = 5

[transitions]
default = "cut"
duration = 0.5
easing = "ease_out"
between_sections = "cut"

# --- 1. WIDGET-level gate (THE key check): AM/PM pair in one section ---
# Exactly one of these two shows, matching the wall clock in [display]
# timezone. The pair is gapless (complementary windows, no days filter), so
# this section always has content and validate reports no blank intervals.

[[playlist.section]]
mode = "slideshow"
content_height = 16
hold_time = 8
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "AM WIDGET 00:00-12:00"
font = "Inter-Regular"
font_size = 24
font_threshold = 80
font_color = [0, 255, 0]
schedule = { start = "00:00", end = "12:00" }

[[playlist.section.widget]]
type = "message"
text = "PM WIDGET 12:00-00:00"
font = "Inter-Regular"
font_size = 24
font_threshold = 80
font_color = [255, 120, 0]
schedule = { start = "12:00", end = "00:00" }

# --- 2. SECTION-level gate: two whole sections, complementary windows ---
# Exactly one of "SECTION AM" / "SECTION PM" appears per playlist cycle; the
# other section is skipped at the section seam (DEBUG log: "section N
# skipped: outside its schedule window").

[[playlist.section]]
mode = "slideshow"
content_height = 16
hold_time = 8
loop_count = 1
schedule = { start = "00:00", end = "12:00" }

[[playlist.section.widget]]
type = "message"
text = "SECTION AM"
font = "Inter-Regular"
font_size = 24
font_threshold = 80
font_color = "rainbow"

[[playlist.section]]
mode = "slideshow"
content_height = 16
hold_time = 8
loop_count = 1
schedule = { start = "12:00", end = "00:00" }

[[playlist.section.widget]]
type = "message"
text = "SECTION PM"
font = "Inter-Regular"
font_size = 24
font_threshold = 80
font_color = "rainbow"

# --- 3. AND-composition: schedule × should_display (countdown) ---
# The countdown hides itself past its date (should_display) AND outside its
# window (schedule). With a far-future date + an always-active gapless window
# split across the pair below, exactly one of the two shows — same AM/PM rule
# as section 1, but on a widget that ALSO has its own visibility logic.

[[playlist.section]]
mode = "slideshow"
content_height = 16
hold_time = 8
loop_count = 1

[[playlist.section.widget]]
type = "countdown"
text = "AM COUNT 2030"
countdown_date = "2030-01-01"
font = "Inter-Regular"
font_size = 24
font_threshold = 80
font_color = [0, 200, 255]
schedule = { start = "00:00", end = "12:00" }

[[playlist.section.widget]]
type = "countdown"
text = "PM COUNT 2030"
countdown_date = "2030-01-01"
font = "Inter-Regular"
font_size = 24
font_threshold = 80
font_color = [0, 200, 255]
schedule = { start = "12:00", end = "00:00" }

# --- 4. Unscheduled control: must show EVERY cycle regardless of time ---
# If this ever disappears, the gate is dropping unscheduled widgets (the
# "no binding = always shown" contract broke).

[[playlist.section]]
mode = "slideshow"
content_height = 16
hold_time = 5
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "ALWAYS ON (no schedule)"
font = "Inter-Regular"
font_size = 24
font_threshold = 80
font_color = [255, 255, 255]

# --- FOREVER-SECTION boundary check (#394, manual) ---
# Uncomment this section (and comment out sections 1-4 above) to verify
# display-time gating in a loop_count = 0 section on hardware: the AM/PM
# pair below never leaves this section (loop_count = 0 cycles forever), so
# the ONLY thing that can flip the panel at noon/midnight is the per-pass
# widget gate. THE CHECK: at a 12:00 boundary the displayed widget must
# flip within roughly 15-30s (current widget + ~3 items in flight — 2 queued + 1 held by the parked producer — each one
# hold_time=5s show; longer on the bigsign where the text scrolls). If it
# keeps showing the pre-boundary widget for minutes, the producer backlog
# has regressed.
#
# [[playlist.section]]
# mode = "slideshow"
# content_height = 16
# hold_time = 5
# loop_count = 0
#
# [[playlist.section.widget]]
# type = "message"
# text = "FOREVER AM 00:00-12:00"
# font = "Inter-Regular"
# font_size = 24
# font_threshold = 80
# font_color = [0, 255, 0]
# schedule = { start = "00:00", end = "12:00" }
#
# [[playlist.section.widget]]
# type = "message"
# text = "FOREVER PM 12:00-00:00"
# font = "Inter-Regular"
# font_size = 24
# font_threshold = 80
# font_color = [255, 120, 0]
# schedule = { start = "12:00", end = "00:00" }
