# --- Pool Temps ---

[[playlist.section]]
mode = "swap"
hold_time = 6
loop_count = 1

[playlist.section.title]
type = "message"
text = ":droplet: Pool Temps"
font_color = "random"

# The pool widget is the `led-ticker-pool` plugin (type = "pool.monitor").
# Install it by adding it to config/requirements-plugins.txt (copy the tracked
# .example, which already lists it) and rebuild — see https://docs.ledticker.dev/plugins/ .
# The entry point auto-registers it.
[[playlist.section.widget]]
type = "pool.monitor"
title = "POOL TEMPS"
units = "imperial"
update_interval = 300
stale_after = 14400  # 4 hours
label_color = [130, 220, 255]

# --- Busy light (HTTP trigger) ---
# A persistent dot in the top-left corner, flipped on/off by an HTTP call over
# the LAN (e.g. a work Mac hotkey or a macOS Focus automation). The repo's
# compose uses network_mode: host, so the listener on :8081 is reachable at the
# Pi's address with no port mapping; bare-metal binds the host port directly.
# Toggle it with:
#   curl "http://PI-HOST:8081/busy?state=on&token=changeme"
#   curl "http://PI-HOST:8081/busy?state=off&token=changeme"
# Docs: https://docs.ledticker.dev/concepts/busy-light/
# [busy_light]
# enabled = true
# source = "http"
# http_host = "0.0.0.0"
# http_port = 8081
# token = "changeme"
# corner = "top_left"
# size = 4             # physical px; ~3-4 on the 16-tall smallsign
# color = [255, 0, 0]
# ttl_seconds = 0      # default auto-clear; 0 = stay on until explicit off
