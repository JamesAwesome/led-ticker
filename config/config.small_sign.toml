# ── Plugin dependencies ───────────────────────────────────────────────
# Requires these led-ticker plugins. Install via
# config/requirements-plugins.txt (copy requirements-plugins.example.txt)
# and rebuild before running:
#   led-ticker-weather      weather.current
#   led-ticker-rss          rss.feed
#   led-ticker-nyancat      nyancat.alternating
#   led-ticker-pacman       pacman.alternating
#   led-ticker-pokeball     pokeball.alternating
#   led-ticker-sailor_moon  sailor_moon.alternating
#   led-ticker-baseball     baseball.scores, baseball.standings, baseball.statcast, baseball.attendance, baseball.roll*, :baseball.ball:
#   led-ticker-pool         pool.monitor
# Built-in widgets (message/clock/image/gif/two_row), color/border/emoji
# flair, and the foundational transitions need no plugins.
# ──────────────────────────────────────────────────────────────────────

[display]
rows = 16
cols = 32
chain_length = 5
brightness = 60
gpio_slowdown = 2
hardware_mapping = "adafruit-hat"

[title]
delay = 5

[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = {type = "nyancat.alternating", duration = 4.0}

# --- Messages ---

[[playlist.section]]
mode = "swap"
transition = "pacman.alternating"
transition_duration = 3.0
continuous_scroll = true
loop_count = 1

[playlist.section.title]
type = "message"
text = ":bunny: #DevOps News :taco:"
font_color = "random"

[[playlist.section.widget]]
type = "message"
text = "Check out Datadog MCP!"

[[playlist.section.widget]]
type = "message"
text = "Talk to #team-foundations for all your DevOps needs!"

[[playlist.section.widget]]
type = "message"
text = "Ask me about eden review apps! :taco:"

