[display]
rows = 16
cols = 32
chain = 5
brightness = 60
slowdown_gpio = 2
gpio_mapping = "adafruit-hat"

[title]
delay = 5

[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = {type = "nyancat_alternating", duration = 4.0}

# --- Messages ---

[[playlist.section]]
mode = "swap"
transition = "pacman_alternating"
transition_duration = 3.0
continuous_scroll = true
loop_count = 1

[playlist.section.title]
type = "message"
text = ":bunny: #DevOps News :taco:"
color = "random"

[[playlist.section.widget]]
type = "message"
text = "Check out Datadog MCP!"

[[playlist.section.widget]]
type = "message"
text = "Talk to #team-foundations for all your DevOps needs!"

[[playlist.section.widget]]
type = "message"
text = "Ask me about eden review apps! :taco:"

# --- Weather ---

[[playlist.section]]
mode = "swap"
transition = "push_alternating"
hold_time = 6
loop_count = 2

[playlist.section.title]
type = "message"
text = "Weather"
color = "random"

[[playlist.section.widget]]
type = "weather"
message = "New York"
location = "New York"
units = "imperial"

[[playlist.section.widget]]
type = "weather"
message = "Philadelphia"
location = "Philadelphia"
units = "imperial"

[[playlist.section.widget]]
type = "weather"
message = "Milwaukee"
location = "Milwaukee"
units = "imperial"

[[playlist.section.widget]]
type = "weather"
message = "Minneapolis"
location = "Minneapolis"
units = "imperial"

[[playlist.section.widget]]
type = "weather"
message = "Washington DC"
location = "Washington DC"
units = "imperial"

# --- Countdowns ---

[[playlist.section]]
mode = "swap"
transition = "wipe_alternating"
loop_count = 1

[playlist.section.title]
type = "message"
text = "Count Downs"
color = "random"

[[playlist.section.widget]]
type = "countdown"
text = "4th of July"
countdown_date = 2026-07-04

[[playlist.section.widget]]
type = "countdown"
text = "Halloween"
countdown_date = 2026-10-31

[[playlist.section.widget]]
type = "countdown"
text = "Thanksgiving"
countdown_date = 2026-11-26

[[playlist.section.widget]]
type = "countdown"
text = "Christmas"
countdown_date = 2026-12-25

[[playlist.section.widget]]
type = "countdown"
text = "New Years"
countdown_date = 2027-01-01

# --- Nintendo ---

[[playlist.section]]
mode = "swap"
transition = "pokeball_alternating"
transition_duration = 2.0
continuous_scroll = true
loop_count = 1

[playlist.section.title]
type = "message"
text = "Nintendo Life"
color = "random"

[[playlist.section.widget]]
type = "rss_feed"
feed_url = "https://www.nintendolife.com/feeds/news"
update_interval = 3000  # 50 minutes

# --- MLB Scores ---

[[playlist.section]]
mode = "swap"
transition = "baseball_alternating"
transition_duration = 2.0
hold_time = 6
loop_count = 2

[playlist.section.title]
type = "message"
text = ":baseball: Oh! That's Baseball!! :baseball:"
color = "random"

[[playlist.section.widget]]
type = "mlb"
team = "PHI"
timezone = "America/New_York"

[[playlist.section.widget]]
type = "mlb"
team = "NYM"
timezone = "America/New_York"

# --- MLB Standings ---

[[playlist.section]]
mode = "swap"
transition = "baseball_alternating"
transition_duration = 2.0
hold_time = 6
loop_count = 1

[playlist.section.title]
type = "message"
text = ":baseball: MLB Standings :baseball:"
color = "random"

[[playlist.section.widget]]
type = "mlb_standings"
teams = ["PHI", "NYM"]
title = "MLB Standings"
top_n = 3
timezone = "America/New_York"

# --- Anime News Network ---

[[playlist.section]]
mode = "swap"
transition = "sailor_moon_alternating"
transition_duration = 2.0
continuous_scroll = true
loop_count = 1

[playlist.section.title]
type = "message"
text = "Anime News Network"
color = "random"

[[playlist.section.widget]]
type = "rss_feed"
feed_url = "https://www.animenewsnetwork.com/all/rss.xml?ann-edition=us"
update_interval = 3000  # 50 minutes
