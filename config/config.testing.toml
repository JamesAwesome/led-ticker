# Transition testing config — cycles through all 11 transitions
# Usage: cp config/config.testing.toml config/config.toml

[display]
rows = 16
cols = 32
chain = 5
brightness = 60
slowdown_gpio = 2
gpio_mapping = "adafruit-hat"

[title]
delay = 3

# --- push_left ---
[[playlist.section]]
mode = "swap"
transition = "push_left"
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = ">> PUSH LEFT next >>"
[[playlist.section.widget]]
type = "message"
text = "push_left DONE"

# --- push_right ---
[[playlist.section]]
