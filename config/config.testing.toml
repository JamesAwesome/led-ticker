# Transition testing config — cycles through all 13 transitions
# Usage: cp config/config.testing.toml config/config.toml

[display]
rows = 16
cols = 32
chain = 5
brightness = 60
slowdown_gpio = 2
gpio_mapping = "adafruit-hat"

[title]
delay = 3

# --- push_left ---
[[playlist.section]]
mode = "swap"
transition = "push_left"
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = ">> PUSH LEFT start"

[[playlist.section.widget]]
type = "message"
text = "The quick brown fox jumps over the lazy dog and keeps running fast across the entire LED matrix panel display"

[[playlist.section.widget]]
type = "message"
text = "push_left DONE"

# --- push_right ---
[[playlist.section]]
mode = "swap"
transition = "push_right"
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "message"
text = "<< PUSH RIGHT start"

[[playlist.section.widget]]
type = "message"
text = "A wizard quickly jinxed the gnomes before they could cast any powerful spells on the sleeping villagers nearby"

[[playlist.section.widget]]
type = "message"
text = "push_right DONE"

