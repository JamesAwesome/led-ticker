# ── Plugin dependencies ───────────────────────────────────────────────
# Requires these led-ticker plugins. Install via
# config/requirements-plugins.txt (copy requirements-plugins.example.txt)
# and rebuild before running:
#   led-ticker-weather  weather.current
#   led-ticker-rss      rss.feed
#   led-ticker-flair  nyancat.alternating
# Built-in widgets (message/clock/image/gif/two_row), color/border/emoji
# flair, and the foundational transitions need no plugins.
# ──────────────────────────────────────────────────────────────────────

# Forever scroll version — all sections use ticker mode
# Widgets scroll side-by-side as a continuous stream with bullet separators
# Usage: cp config/config.ticker.toml config/config.toml

[display]
rows = 16
cols = 32
chain_length = 5
brightness = 60
gpio_slowdown = 2
hardware_mapping = "adafruit-hat"

[title]
delay = 5

[transitions]
default = "push_left"
duration = 0.5
easing = "ease_out"
between_sections = {type = "nyancat.alternating", duration = 2.0}

# --- Messages ---

[[playlist.section]]
mode = "ticker"
loop_count = 1

[playlist.section.title]
type = "message"
text = "#DevOps News"
font_color = "random"

[[playlist.section.widget]]
type = "message"
text = "May the uptime be with you!"

[[playlist.section.widget]]
type = "message"
text = "Always be shipping!"

