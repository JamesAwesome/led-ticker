# Try-it config — the default bundled example for `make try`.
#
# `make try` uses this config when you haven't created config/config.toml yet.
# Once you create config/config.toml, `make try` previews YOUR file instead.
#
# This config runs led-ticker on any computer without a Raspberry Pi or LED
# panels. The engine renders frames in memory via the headless backend; the
# webui preview at http://localhost:8080 lets you watch the sign live in a
# browser.
#
# This config showcases two baked-in plugins (no API keys needed):
#   - rss.feed  (led-ticker-rss)   — scrolling headlines from a public RSS feed
#   - nyancat.* (led-ticker-flair) — Nyan Cat sprite-trail transitions
# Both are installed from config/requirements-plugins.try.txt inside the image.
#
# Full config-options reference: https://docs.ledticker.dev/reference/config-options/

# requires-plugins: led-ticker-flair, led-ticker-rss
# Install via config/requirements-plugins.txt (or the web UI Store), then restart.
# See https://docs.ledticker.dev/plugins/

[display]
backend = "headless"          # built-in headless renderer — no rgbmatrix required
rows = 16
cols = 32
chain_length = 5              # 5× 32×16 panels = 160×16 logical canvas (smallsign geometry)
default_scale = 1
brightness = 80

[web]
http_host = "0.0.0.0"
http_port = 8080
allow_restart = false

[transitions]
default = "dissolve"
duration = 0.6
easing = "ease_out"
between_sections = "wipe_left"

# Section 1 — two bordered, animated messages that dissolve into each other.
[[playlist.section]]
mode = "slideshow"
content_height = 16
hold_time = 5
transition = "dissolve"

[[playlist.section.widget]]
type = "message"
text = "led-ticker :sun: try it out!"
font_color = "rainbow"
border = {style = "bands", colors = "rainbow", band_width = 10}

[[playlist.section.widget]]
type = "message"
text = "No hardware needed — watch in the browser."
font_color = "color_cycle"
border = {style = "bands", colors = "candy_cane", band_width = 8}

# Section 2 — entered via a Nyan Cat sprite-trail transition (nyancat.forward
# from the led-ticker-flair plugin). The lowres 12×10 pixel-art cat works at
# this geometry (160×16, scale=1) — no bigsign/scaled canvas required.
[[playlist.section]]
mode = "slideshow"
content_height = 16
hold_time = 5
entry_transition = "nyancat.forward"

[[playlist.section.widget]]
type = "message"
text = "Open http://localhost:8080 to preview the sign live."
font_color = "rainbow"
border = {style = "bands", colors = "usa", band_width = 10, speed = -2}

# Section 3 — RSS headlines from Hacker News (no API key, public feed).
# The rss.feed widget (led-ticker-rss plugin) scrolls the latest front-page
# stories. Entered via nyancat.forward so the cat sweeps in fresh news.
# Needs an internet connection for the live feed; if it's unreachable the
# section stays blank and the others keep scrolling.
[[playlist.section]]
mode = "ticker"
content_height = 16
entry_transition = "nyancat.forward"

[[playlist.section.widget]]
type = "rss.feed"
feed_url = "https://hnrss.org/frontpage"
max_stories = 8
font_color = "color_cycle"
