# render-duration: 24
# Three messages stream side-by-side at scroll_step_ms = 35.
# Each pixel of cursor advance is 35 ms wallclock; the longest
# message ("Free coffee Friday") needs the full ~16-sec inner pass
# to clear the panel, plus a tail to show the final message reading
# stably before the loop. 24 sec gives one complete pass with margin.
[display]
rows = 16
cols = 32
chain = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "forever_scroll"
loop_count = 1
scroll_step_ms = 35

[[playlist.section.widget]]
type = "message"
text = "Open 9-5"
font_color = [225, 48, 108]

[[playlist.section.widget]]
type = "message"
text = "Free coffee Friday"
font_color = [255, 220, 0]

[[playlist.section.widget]]
type = "message"
text = "All ages welcome"
font_color = [120, 220, 255]
