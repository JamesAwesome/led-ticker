# render-duration: 28
# Each widget scrolls fully off before the next enters. With three
# widgets at scroll_step_ms = 35 and ~240 px per widget pass
# (canvas + widget width), one full cycle is ~25 sec. 28 sec
# captures the cycle plus a tail.
[display]
rows = 16
cols = 32
chain = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "infini_scroll"
loop_count = 1
scroll_step_ms = 35

[[playlist.section.widget]]
type = "message"
text = "Now Enrolling"
font_color = [225, 48, 108]

[[playlist.section.widget]]
type = "message"
text = "Spring Classes Open"
font_color = [255, 220, 0]

[[playlist.section.widget]]
type = "message"
text = "Drop-ins welcome"
font_color = [120, 220, 255]
