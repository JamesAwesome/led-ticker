# render-duration: 30
# Tutorial Chapter 1 — destination config preview.
#
# Renders the moonbunny tutorial destination so the reader sees what
# they will build toward over chapters 2–5. Mirrors the structure of
# config/config.bigsign.moonbunny.example.toml — display knobs simplified
# to chain=1 for the renderer, asset path made render-tool-relative.
#
# Cycle (one full pass through all three sections):
#   Section 1 (Welcome): 2.5s hold + 0.5s wipe = 3.0s
#   Section 2 (Brand card): bottom row scrolls full traversal
#     (~16s at scroll_speed_ms=35) + 0.5s dissolve
#   Section 3 (Info messages): 3 widgets × 2.5s + 2 wipes × 0.5s = 8.5s
#   Total ≈ 28s; render-duration=24 captures sections 1+2 with bottom
#   row scroll completing cleanly and section 3 starting.

[display]
rows = 64
cols = 256
chain = 1
brightness = 60
default_scale = 4

[title]
delay = 0

[transitions]
default = "wipe_left"
duration = 0.5
between_sections = "dissolve"

# --- Section 1: Welcome card (swap) ---

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 2.5

[[playlist.section.widget]]
type = "message"
text = "Welcome to Moonbunny"
font_color = "rainbow"
border = "rainbow"

# --- Section 2: Brand card with hi-res Instagram emoji (swap, scale=2) ---

[[playlist.section]]
mode = "swap"
scale = 2
content_height = 32
loop_count = 1
hold_time = 5.0

[[playlist.section.widget]]
type = "image"
path = "../../../config/assets/moon-transparent.png"
fit = "pillarbox"
image_align = "center"
hold_seconds = 4.0
scroll_speed_ms = 35
top_text = ":instagram: @moonbunnyaerial"
top_row_height = 16
top_font = "Inter-Bold"
top_font_size = 16
top_color = [225, 48, 108]
bottom_text = "Aerial · pole · silks · juggling · all levels · now booking"
bottom_font = "Inter-Bold"
bottom_font_size = 22
bottom_color = [255, 240, 200]

# --- Section 3: Quick info messages (swap) ---

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 2.5

[[playlist.section.widget]]
type = "message"
text = "Summer Camps start June 15"
font_color = [180, 220, 180]
border = "rainbow"

[[playlist.section.widget]]
type = "message"
text = "Open daily 10am – 8pm"
font_color = [120, 220, 255]

[[playlist.section.widget]]
type = "message"
text = "All levels · All ages"
font_color = [255, 220, 0]
