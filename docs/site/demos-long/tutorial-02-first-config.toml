# render-duration: 7
[display]
rows = 64
cols = 256
chain_length = 1
default_scale = 4
brightness = 60


[title]
delay = 0   # no title card; suppress the 5s default per-section title hold
[[playlist.section]]
mode = "forever_scroll"
loop_count = 3
hold_time = 1.0
scroll_step_ms = 15

[[playlist.section.widget]]
type = "message"
text = "Welcome to Firebird Yoga"
font_color = [225, 48, 108]
