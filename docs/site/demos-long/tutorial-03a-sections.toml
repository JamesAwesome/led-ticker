# render-duration: 12
# Demonstrates two sections in one config: a ticker section
# (continuous ticker) and a slideshow section (held messages with transitions).
# The reader sees both modes side-by-side in a single render.
#
# Timing:
#   Section 1 ticker: "Welcome to Firebird Yoga" + "Open Tuesday – Sunday  *  10am – 8pm"
#     scroll at step_ms=40 across 64 logical px → ~10s for one pass
#   Section 2 slideshow: "Open daily" (2.5s) → push_left → "10am - 8pm" (2.5s)
#     → push_left; cycle = ~6s. loop_count=1 means one pass through both.
#   Total ≈ 16s; 20s gives a comfortable tail.
[display]
rows = 64
cols = 256
chain_length = 1
default_scale = 4
brightness = 60


[title]
delay = 0   # no title card; suppress the 5s default per-section title hold
[transitions]
default = "push_left"
duration = 0.5

[[playlist.section]]
mode = "ticker"
loop_count = 3
hold_time = 1.0
scroll_step_ms = 40

[[playlist.section.widget]]
type = "message"
text = "Welcome to Firebird Yoga"
font_color = [225, 48, 108]

[[playlist.section.widget]]
type = "message"
text = "Open Tuesday – Sunday  *  10am – 8pm"
font_color = [255, 240, 200]

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 2.5
transition = "push_left"

[[playlist.section.widget]]
type = "message"
text = "Open daily"
font_color = [120, 220, 255]

[[playlist.section.widget]]
type = "message"
text = "10am – 8pm"
font_color = [225, 48, 108]
