# render-duration: 14
# Introduces the two_row widget at the simplest baseline: scale=1.
#
# The _maybe_wrap fix (PR #48) makes scale=1 work correctly:
# content_height=16 produces a 16-row logical canvas centered on the
# panel; the default 50/50 band split gives an 8-row top band + 8-row
# bottom band. The BDF 5x8 default font fits the band exactly. The
# :instagram: emoji renders as the 8×8 lo-res sprite because the band's
# emoji cap (max(EMOJI_ROW_CAP=8, top_row_height=8) = 8) is smaller
# than the 16-logical hi-res sprite — Chapter 3's hi-res section bumps
# scale to 2 and raises band height to fit the bigger sprite.
#
# Timing:
#   hold_time=1.5 lets the bottom scroll begin quickly; loop_count=3
#   cycles the scroll 3× so the gif shows continuous motion.
#   At scroll_step_ms=35 a ~300-px bottom string takes ~4s to traverse.
#   3 × (1.5s hold + ~4s scroll) ≈ 16.5s; 14s captures ~2.5 full cycles.
[display]
rows = 64
cols = 256
chain = 1
default_scale = 4
brightness = 60

[transitions]
default = "push_left"
duration = 0.5

[[playlist.section]]
mode = "swap"
scale = 1
content_height = 16
loop_count = 3
hold_time = 1.5
scroll_step_ms = 35

[[playlist.section.widget]]
type = "two_row"
top_text = ":instagram: @moonbunny"
top_color = [225, 48, 108]
top_align = "center"
bottom_text = "Aerial · pole · silks · juggling · all levels · now booking"
bottom_color = [255, 240, 200]
bottom_align = "left"
