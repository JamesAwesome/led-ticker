# render-duration: 12
# Introduces the two_row widget at scale=1 (full logical canvas = 64×16).
# Using scale=1 on the section keeps the example simple: no per-section
# scaling math, the canvas is the full 64-wide logical space, and BDF
# fonts render the same as in a message widget.
#
# The bottom row scrolls because the promo text exceeds the canvas width.
# Top row is held, center-aligned.
#
# Timing:
#   hold_time=8.0 shows the top label while the bottom scrolls.
#   At scroll_step_ms=35 a ~200-px bottom string takes ~7s to traverse.
#   8s hold + 0.5s transitions ≈ 9s; 12s gives the full scroll pass.
[display]
rows = 64
cols = 256
chain = 1
default_scale = 4
brightness = 60

[transitions]
default = "push_left"
duration = 0.5

[[playlist.section]]
mode = "swap"
scale = 1
content_height = 16
loop_count = 1
hold_time = 8.0
scroll_step_ms = 35

[[playlist.section.widget]]
type = "two_row"
top_text = "@moonbunny"
top_color = [225, 48, 108]
top_align = "center"
bottom_text = "Aerial · pole · silks · juggling · all levels · now booking"
bottom_color = [255, 240, 200]
bottom_align = "left"
