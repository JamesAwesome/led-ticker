# render-duration: 14
# The polished two_row: scale=2, content_height=24, top_row_height=16.
# Demonstrates the hi-res :instagram: emoji on the top row with an
# Inter-Bold handle, and the bottom row scrolling in BDF.
#
# Math:
#   scale × content_height = 2 × 24 = 48 real px ≤ 64 real px ✓
#   top band = 16 logical = 32 real px → fits the 32×32 hires sprite ✓
#   bottom band = 24 - 16 = 8 logical = 16 real px → fits BDF marquee ✓
#
# Timing:
#   hold_time=1.5 with scroll_step_ms=35; loop_count=3 cycles the scroll
#   3× for continuous motion. 14s captures ~2.5 full cycles.
[display]
rows = 64
cols = 256
chain_length = 1
default_scale = 4
brightness = 60

[transitions]
default = "push_left"
duration = 0.5

[[playlist.section]]
mode = "slideshow"
scale = 2
content_height = 24
loop_count = 3
hold_time = 1.5
scroll_step_ms = 35

[[playlist.section.widget]]
type = "two_row"
top_text = ":instagram: @firebird.demo"
top_row_height = 16
top_font = "Inter-Bold"
top_font_size = 22
top_color = [225, 48, 108]
top_align = "left"
bottom_text = "Vinyasa · yin · hot power · restorative · slow flow · all levels"
bottom_color = [255, 240, 200]
bottom_align = "left"
