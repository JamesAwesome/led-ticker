# render-duration: 65
# Chapter 5 — final polished config. The destination state for the
# whole tutorial. Mirrors config/config.bigsign.moonbunny.example.toml.
#
# Restructured from the 2-section transitions/borders state:
#   - Section 1 (welcome card): rainbow font + rainbow border (~3s)
#   - Section 2 (brand card): per-section scale=2 so :instagram: renders
#     as the hi-res 32×32 sprite next to the @moonbunnyaerial handle
#     (~22s with full bottom-row scroll)
#   - Section 3 (info messages): Summer Camps with rainbow border,
#     Open daily, All levels — each overflows the canvas at scale=4 and
#     scrolls once before holding (~39s total)
#
# Full cycle ≈ 65s. Long but complete — the chapter 5 final demo shows
# everything the reader has built.
[display]
rows = 64
cols = 256
chain = 1
default_scale = 4
brightness = 60

[title]
delay = 0

[transitions]
default = "wipe_left"
duration = 0.5
between_sections = "dissolve"

# --- Section 1: Welcome card with rainbow font + border ---

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 2.5

[[playlist.section.widget]]
type = "message"
text = "Welcome to Moonbunny"
font_color = "rainbow"
border = "rainbow"

# --- Section 2: Brand card with hi-res Instagram emoji (scale=2) ---

[[playlist.section]]
mode = "swap"
scale = 2
content_height = 32
loop_count = 1
hold_time = 5.0

[[playlist.section.widget]]
type = "image"
path = "../../../config/assets/moon-transparent.png"
fit = "pillarbox"
image_align = "center"
hold_time = 4.0
scroll_speed_ms = 35
top_text = ":instagram: @moonbunnyaerial"
top_row_height = 16
top_font = "Inter-Bold"
top_font_size = 16
top_color = [225, 48, 108]
bottom_text = "Aerial · pole · silks · juggling · all levels · now booking"
bottom_font = "Inter-Bold"
bottom_font_size = 22
bottom_color = [255, 240, 200]

# --- Section 3: Info messages ---

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 2.5

[[playlist.section.widget]]
type = "message"
text = "Summer Camps start June 15"
font_color = [180, 220, 180]
border = "rainbow"

[[playlist.section.widget]]
type = "message"
text = "Open daily 10am – 8pm"
font_color = [120, 220, 255]

[[playlist.section.widget]]
type = "message"
text = "All levels · All ages"
font_color = [255, 220, 0]
