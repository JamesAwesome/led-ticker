# render-duration: 20
# Chapter 5 — final polished config. Builds on tutorial-05a-transitions with:
#   1. border = "rainbow" on the Welcome message.
#   2. font_color = "rainbow" on the title message for extra colour pop.
#   3. between_sections = "dissolve" and default = "wipe_left" retained.
#
# This is the destination state that readers have assembled over the
# five tutorial chapters.
#
# Cycle matches tutorial-05a-transitions (~19.5s); 20s captures it.
[display]
rows = 64
cols = 256
chain = 1
default_scale = 4
brightness = 60

[transitions]
default = "wipe_left"
duration = 0.5
between_sections = "dissolve"

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 2.5

[[playlist.section.widget]]
type = "message"
text = "Welcome to Moonbunny"
font_color = "rainbow"
border = "rainbow"

[[playlist.section.widget]]
type = "image"
path = "../../../config/assets/moon-transparent.png"
fit = "pillarbox"
image_align = "center"
hold_seconds = 8.0
scroll_speed_ms = 35
top_text = "@moonbunny"
top_font = "5x8"
top_color = [225, 48, 108]
bottom_text = "Aerial · pole · silks · juggling · all levels · now booking"
bottom_font = "AtkinsonHyperlegible-Bold"
bottom_font_size = 22
bottom_color = [255, 240, 200]

[[playlist.section.widget]]
type = "message"
text = "Open daily 10am – 8pm"
font_color = [120, 220, 255]

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 2.5

[[playlist.section.widget]]
type = "message"
text = "Summer Camps start June 15"
font_color = [180, 220, 180]
border = "rainbow"

[[playlist.section.widget]]
type = "message"
text = "All levels · All ages"
font_color = [255, 220, 0]
