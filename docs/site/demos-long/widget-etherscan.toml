# Long demo: Etherscan ETH gas prices.
# requires-env: ETHERSCAN_API_KEY
#
# Skipped by `make render-long-demos` if ETHERSCAN_API_KEY isn't set
# in the environment. Get a free key at https://etherscan.io/apis.

[display]
rows = 16
cols = 32
chain = 5
default_scale = 1
brightness = 60

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 30.0

[[playlist.section.widget]]
type = "etherscan"
update_interval = 10
font_color = "color_cycle"
