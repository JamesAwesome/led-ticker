# Long demo: pool widget in two_row layout (bigsign-targeted).
# requires-env: INFLUXDB_TOKEN
#
# Skipped by `make render-long-demos` if INFLUXDB_TOKEN isn't set in
# the environment. Reads INFLUXDB_URL/ORG/BUCKET/TOKEN from .env.
# render-duration: 30

[display]
rows = 32
cols = 64
chain_length = 8
default_scale = 4
brightness = 60

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 5.0

[[playlist.section.widget]]
type = "pool"
title = "POOL TEMPS"
units = "imperial"
update_interval = 5
layout = "two_row"
font = "Inter-Regular"
font_size = 32
font_threshold = 80
top_font_size = 16
label_color = [130, 220, 255]
