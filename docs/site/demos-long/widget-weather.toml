# Long demo: Weather for Brooklyn.
# requires-env: WEATHERAPI_KEY
#
# Skipped by `make render-long-demos` if WEATHERAPI_KEY isn't set in
# the environment. Get a free key at https://www.weatherapi.com/.

[display]
rows = 16
cols = 32
chain = 5
default_scale = 1
brightness = 60

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 30.0

[[playlist.section.widget]]
type = "weather"
message = "Brooklyn"
location = "Brooklyn, NY"
units = "imperial"
update_interval = 5

