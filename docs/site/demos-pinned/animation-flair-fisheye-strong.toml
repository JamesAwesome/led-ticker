# render-duration: 11
# requires-plugins: led-ticker-flair (>= 0.4.0; render locally with the plugin installed)
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[[playlist.section]]
mode = "slideshow"
hold_time = 1.0

[[playlist.section.widget]]
type = "message"
text = "FLASH SALE TODAY ONLY FIFTY PERCENT OFF STOREWIDE"
font_color = [255, 140, 0]
animation = {style = "flair.fisheye", magnify = 1.33, edge_squeeze = 0.45}
