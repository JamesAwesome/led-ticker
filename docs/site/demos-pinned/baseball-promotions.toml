# render-duration: 14
# DEMO-mode baseball.promotions hero cards on a long (512x64) panel. No network,
# no API key — demo = true renders a fixed set of same-day promos.
[display]
rows = 64
cols = 128
chain_length = 4
default_scale = 4
brightness = 60

[[playlist.section]]
mode = "slideshow"
hold_time = 4
loop_count = 1

[[playlist.section.widget]]
type = "baseball.promotions"
demo = true
