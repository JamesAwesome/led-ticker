# render-duration: 12
# DEMO-mode baseball.standings hero board on a long (512x64) panel. No network,
# no API key — demo = true renders a fixed AL East board.
[display]
rows = 64
cols = 128
chain_length = 4
default_scale = 4
brightness = 60

[[playlist.section]]
mode = "slideshow"
hold_time = 8
loop_count = 1

[[playlist.section.widget]]
type = "baseball.standings"
demo = true
