# render-duration: 6
# ColorBandsBorder with the candy_cane palette — red/white bands
# marching clockwise around the perimeter.
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 5.0
scroll_step_ms = 30

[[playlist.section.widget]]
type = "message"
text = "Candy"
font = "5x8"
font_color = [255, 255, 255]
border = {style = "bands", colors = "candy_cane"}
