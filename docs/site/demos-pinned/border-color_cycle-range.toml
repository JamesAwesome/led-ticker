# render-duration: 6
# color_cycle border with from/to hue range (Firebird brand palette — §6).
# Shorter arc between flame and amber — border pulses only
# within the phoenix-warm band rather than sweeping the full wheel.
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 5.0
scroll_step_ms = 30

[[playlist.section.widget]]
type = "message"
text = "Open"
font = "5x8"
font_color = [255, 244, 214]
border = {style = "color_cycle", from = [255, 92, 38], to = [255, 183, 3], speed = 2, thickness = 2}
