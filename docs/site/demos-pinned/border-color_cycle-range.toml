# render-duration: 6
# color_cycle border with from/to hue range (Firebird brand palette).
# Shorter arc between soft pink and lavender — border pulses only
# within that purple/pink band rather than sweeping the full wheel.
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 5.0
scroll_step_ms = 30

[[playlist.section.widget]]
type = "message"
text = "Open"
font = "5x8"
font_color = [254, 255, 204]
border = {style = "color_cycle", from = [255, 176, 240], to = [189, 169, 234], speed = 2, thickness = 2}
