# render-duration: 6
# color_cycle border demo: whole-border single-hue pulse.
# Every perimeter pixel shares one color per frame; the hue cycles
# over time. Contrast with "rainbow" which offsets hue per pixel.
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 5.0
scroll_step_ms = 30

[[playlist.section.widget]]
type = "message"
text = "Open"
font = "5x8"
font_color = [255, 244, 214]
border = {style = "color_cycle", speed = 5, thickness = 2}
