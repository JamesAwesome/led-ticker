# render-duration: 7
# Lightbulb border, lit_color="rainbow" — fixed rainbow string, lit window travels.
[display]
rows = 64
cols = 256
chain_length = 1
default_scale = 4
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 7.0

[[playlist.section.widget]]
type = "message"
text = "PARTY"
border = { style = "lightbulbs", mode = "chase", lit_color = "rainbow" }
