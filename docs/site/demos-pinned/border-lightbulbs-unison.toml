# render-duration: 5
# Lightbulb border, mode="unison" — all bulbs blink on/off together.
[display]
rows = 64
cols = 256
chain_length = 1
default_scale = 4
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 5.0

[[playlist.section.widget]]
type = "message"
text = "BLINK"
border = { style = "lightbulbs", mode = "unison" }
