# Demo: clock showing the timezone ABBREVIATION via %Z. Requires an explicit
# `timezone` — %Z is only populated when the datetime is tz-aware.
# render-duration: 5
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 4.0

[[playlist.section.widget]]
type = "clock"
timezone = "America/New_York"
format = "%H:%M %Z"
font_color = "rainbow"
