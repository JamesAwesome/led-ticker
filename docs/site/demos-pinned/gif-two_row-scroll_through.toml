# render-duration: 14
# gif scroll_through demo: pikachu on the left, held top row, scrolling
# bottom row that flies through offscreen-to-offscreen.
# hold_time matches render-duration so gif_loops=0 produces enough
# source frames to keep the engine running continuously for the full
# render window — no frozen last frame at the GIF loop boundary.
[display]
rows = 16
cols = 32
chain = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 14.0
scroll_step_ms = 25

[[playlist.section.widget]]
type = "gif"
path = "../../../config/assets/pika_wave_transparent.gif"
fit = "pillarbox"
image_align = "left"
top_text = "NOW PLAYING"
top_font = "5x8"
top_color = [225, 48, 108]
bottom_text = "Pikachu Theme - The OST Collection (2026)"
bottom_font = "5x8"
bottom_color = [120, 230, 255]
bottom_text_scroll = "scroll_through"
scroll_speed_ms = 25
gif_loops = 0   # play through hold_time / scroll_through pass
