# render-duration: 14
# image scroll_through demo: phoenix on the right, held @handle on top,
# scrolling promo flies through offscreen-to-offscreen.
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 12.0
scroll_step_ms = 25

[[playlist.section.widget]]
type = "image"
path = "../../../config/assets/phoenix_transparent.png"
fit = "pillarbox"
image_align = "right"
top_text = "@firebird"
top_font = "5x8"
top_color = [225, 48, 108]
bottom_text = "Firebird Yoga — now booking spring sessions — your first class is free."
bottom_font = "5x8"
bottom_color = [255, 240, 200]
bottom_text_scroll = "scroll_through"
scroll_speed_ms = 25
hold_time = 12.0
