# render-duration: 5
# hold_time is set higher than render-duration so the captured
# window contains exactly one type-out + hold — no half-restart of
# the second cycle at the gif's loop boundary.
[display]
rows = 16
cols = 32
chain = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 8.0

[[playlist.section.widget]]
type = "image"
path = "../../../config/assets/moon-transparent.png"
fit = "pillarbox"
image_align = "left"
text = "moonbunny"
text_align = "right"
font_color = [255, 255, 255]
animation = "typewriter"
border = "rainbow"
hold_time = 8.0
