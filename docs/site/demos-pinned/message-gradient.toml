# render-duration: 5
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 4.0

[[playlist.section.widget]]
type = "message"
text = "firebird"
font_color = {style = "gradient", from = [255, 92, 38], to = [255, 183, 3]}
