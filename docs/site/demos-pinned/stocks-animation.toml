# render-duration: 14
# DEMO-mode, wide. ONE symbol held long so the animation layer is the focus:
# the Bloomberg price-flash on each change, the LIVE-chip pulse, and the
# sparkline endpoint pulse (the sparkline fills in as the demo walk runs).
[display]
rows = 64
cols = 64
chain_length = 4
default_scale = 4
brightness = 60

[[playlist.section]]
mode = "slideshow"
hold_time = 13

[[playlist.section.widget]]
type = "stocks.ticker"
symbols = ["DKS"]
demo = true
update_interval = 1
