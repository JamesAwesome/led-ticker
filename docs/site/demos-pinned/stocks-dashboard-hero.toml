# render-duration: 12
# DEMO-mode, render-safe geometry (no pixel_mapper). Real long signs (512x64)
# add their Remap block; the demo doesn't need it. Symbol: DKS.
[display]
rows = 64
cols = 128
chain_length = 4
default_scale = 4
brightness = 60

[[playlist.section]]
mode = "slideshow"
hold_time = 5

[[playlist.section.widget]]
type = "stocks.ticker"
symbols = ["DKS", "MSFT", "NVDA", "TSLA", "AMZN", "GOOGL", "META", "AMD"]
demo = true
update_interval = 1
