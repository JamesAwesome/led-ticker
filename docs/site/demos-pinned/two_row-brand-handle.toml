# render-duration: 12
[display]
rows = 64
cols = 256
chain_length = 1
default_scale = 4
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
scale = 2
content_height = 16
loop_count = 1
hold_time = 1.5
scroll_step_ms = 35

[[playlist.section.widget]]
type = "two_row"
top_text = "@moonbunny :instagram:"
top_color = [225, 48, 108]
top_align = "center"
bottom_text = "Aerial · pole · silks · juggling · all levels · now booking"
bottom_color = [255, 240, 200]
bottom_align = "left"
