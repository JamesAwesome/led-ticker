# render-duration: 8
[display]
rows = 64
cols = 256
chain = 1
default_scale = 4
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
scale = 2
content_height = 16
loop_count = 1
hold_time = 7.0

[[playlist.section.widget]]
type = "two_row"
top_text = "@moonbunny :instagram:"
top_color = [225, 48, 108]
top_align = "center"
bottom_text = "Aerial & pole · all levels · now booking"
bottom_color = [255, 240, 200]
bottom_align = "left"
scroll_speed_ms = 30
