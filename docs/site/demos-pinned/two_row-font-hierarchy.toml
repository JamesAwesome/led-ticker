# render-duration: 8
[display]
rows = 64
cols = 256
chain_length = 1
default_scale = 4
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "slideshow"
scale = 2
content_height = 24
loop_count = 1
hold_time = 7.0

[[playlist.section.widget]]
type = "two_row"
top_text = "@firebird.demo"
top_font = "Inter-Bold"
top_font_size = 18
top_color = [225, 48, 108]
bottom_text = "Firebird Yoga — now booking spring sessions — your first class is free."
bottom_font = "Inter-Regular"
bottom_font_size = 14
bottom_color = [255, 240, 200]
