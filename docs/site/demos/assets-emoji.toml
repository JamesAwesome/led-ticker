# Demo: a row of inline emoji on a single message.
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 4.0

[[playlist.section.widget]]
type = "message"
text = ":taco: :star: :flower: :sun:"
font_color = [255, 240, 200]
