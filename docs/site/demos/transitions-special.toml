# Demo: dissolve between two messages.
# Picked dissolve from the special family since its TV-static effect is
# the most visually distinct in a 5-second auto-render window. Cut is
# instant (nothing to show), split / color_flash / scroll are easier to
# read on hardware than in a captured gif.
[display]
rows = 16
cols = 32
chain = 5
default_scale = 1
brightness = 60

[transitions]
default = "dissolve"
duration = 0.6

[[playlist.section]]
mode = "swap"
loop_count = 2
hold_time = 1.5

[[playlist.section.widget]]
type = "message"
text = "First"

[[playlist.section.widget]]
type = "message"
text = "Second"
