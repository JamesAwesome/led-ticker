# Demo: calendar widget (next layout) reading a committed sample .ics offline.
# Three DAILY events at spread UTC times ensure there is always a near-future
# occurrence regardless of render time — the demo stays evergreen.
# layout="next" shows the single soonest upcoming event as a countdown line.
# render-duration: 6
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 4.0

[[playlist.section.widget]]
type = "calendar"
ics_url = "file://docs/site/demos/calendar_next_sample.ics"
layout = "next"
timezone = "UTC"
font_color = "rainbow"
