# Demo: calendar widget (agenda layout) reading a committed sample .ics offline.
# All events use RRULE:FREQ=DAILY so an occurrence always falls in the lookahead
# window regardless of render date — the demo stays evergreen.
# lookahead_days=1 keeps one occurrence per event; max_events=4 caps the list,
# ensuring variety: one amber "1:1 with Sam" (highlighted) + rainbow others.
# render-duration: 7
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[transitions]
default = "cut"

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 1.5

[[playlist.section.widget]]
type = "calendar"
ics_url = "file://docs/site/demos/calendar_sample.ics"
layout = "agenda"
timezone = "UTC"
highlight = ["1:1"]
font_color = "rainbow"
lookahead_days = 1
max_events = 4
