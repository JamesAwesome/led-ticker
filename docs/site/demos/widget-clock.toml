# Demo: clock widget. A custom strftime format with seconds so the gif visibly
# advances over the capture window (the engine redraws every 50ms and the clock
# recomputes the time each draw), demonstrating that it is a live clock.
# render-duration: 6
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[[playlist.section]]
mode = "slideshow"
loop_count = 1
hold_time = 6.0

[[playlist.section.widget]]
type = "clock"
format = "%H:%M:%S"
font_color = "rainbow"
