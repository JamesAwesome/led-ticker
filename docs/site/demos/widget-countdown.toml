# Demo: countdown widget targeting a fixed near-future date.
[display]
rows = 16
cols = 32
chain_length = 5
default_scale = 1
brightness = 60

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 4.0

[[playlist.section.widget]]
type = "countdown"
text = "Until Summer"
countdown_date = 2026-06-21
font_color = "rainbow"
