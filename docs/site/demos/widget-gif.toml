# Demo: gif widget with pikachu wave + scrolling text overlay.
# Uses a bundled asset from config/assets/. Path is relative to this
# TOML file's location (docs/site/demos/) — three levels up to repo
# root, then config/assets/.
# render-duration: 6
# ↑ One full "Hello!" marquee pass at scroll_speed_ms=25 takes ~5s; the
#   extra second lets the captured gif loop cleanly without cutting the
#   text mid-traversal.
[display]
rows = 16
cols = 32
chain = 5
default_scale = 1
brightness = 60

[[playlist.section]]
mode = "swap"
loop_count = 1
hold_time = 6.0

[[playlist.section.widget]]
type = "gif"
path = "../../../config/assets/pika_wave_transparent.gif"
fit = "pillarbox"
image_align = "left"
text = "Hello!"
text_align = "scroll_over"
# Default scroll_speed_ms (50) means ~20 px/sec — too slow to finish the
# traversal in the renderer's 5-sec capture window. 25 lets the full
# scroll fit (and renders as a mild slow-motion gif which actually
# helps readers see the effect).
scroll_speed_ms = 25
gif_loops = 999
font_color = [255, 80, 200]   # magenta — reads cleanly over yellow pikachu
