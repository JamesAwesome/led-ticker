# Demo: two_row at scale=1 on the small-sign-flavored renderer.
# Real bigsign deployments use scale=2 + content_height=16 for the
# extra logical width to hold @handles. The demo is small-sign-flavored
# (160x16) so the renderer's stub canvas can show the layout.
[display]
rows = 16
cols = 32
chain = 5
default_scale = 1
brightness = 60

[[playlist.section]]
mode = "swap"
scale = 1
content_height = 16
loop_count = 1
hold_time = 4.0

[[playlist.section.widget]]
type = "two_row"
top_text = "@example"
top_color = [225, 48, 108]
top_align = "center"
bottom_text = "Now booking — all levels welcome! Drop in this Saturday for a free intro class at 11am."
bottom_color = [255, 240, 200]
bottom_align = "left"
